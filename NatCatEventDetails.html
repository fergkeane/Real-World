<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nat Cat Event Details — Real World</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  .scroll-thin::-webkit-scrollbar{width:5px}.scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
  /* Left analytics panel */
  .analytics-panel{width:300px;min-width:300px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;position:relative}
  .analytics-panel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:#2563eb}
  /* Map */
  #detail-map{position:absolute;inset:0}
  .leaflet-control-zoom,.leaflet-bar{border:1px solid #e2e8f0!important;box-shadow:0 1px 2px rgba(15,23,42,.08)!important;border-radius:8px!important;overflow:hidden}
  .leaflet-bar a{background:#fff!important;color:#334155!important;line-height:30px!important}
  .leaflet-bar a:hover{background:#f1f5f9!important}
  /* Damage bar animation */
  @keyframes growBar { from { width:0 } to { width:var(--bar-w) } }
  .dmg-fill { animation: growBar 700ms cubic-bezier(.34,1.1,.64,1) both; }
  .dmg-fill{height:100%;border-radius:999px}
  /* Map btn */
  .map-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid #e2e8f0;border-radius:8px;color:#334155;box-shadow:0 1px 2px rgba(15,23,42,.08);cursor:pointer;transition:background .1s}
  .map-btn:hover{background:#f1f5f9}
  /* Global view btn */
  .global-view-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1.5px solid #2563eb;border-radius:8px;background:#fff;color:#2563eb;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
  .global-view-btn:hover{background:#eff6ff}
  /* Download btn */
  .download-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 16px;background:#2563eb;color:#fff;border:0;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
  .download-btn:hover{background:#1d4ed8}
  /* Responsive */
  @media(max-width:767px){
    .analytics-panel{width:100%!important;min-width:0!important;border-right:0;border-bottom:1px solid #e2e8f0;max-height:55vh;}
    .detail-main{flex-direction:column!important;}
    .map-right{height:45vh!important;}
  }
</style>
</head>
<body class="bg-slate-100 text-slate-900">
<div id="app" class="h-screen w-full flex overflow-hidden"></div>

<script>
window.PAGE = { id:'events', title:'Event Details', crumb:'Event Details' };
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density":"compact","accent":"blue","sidebarExpanded":false
}/*EDITMODE-END*/;
</script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="shared/chrome.js?v=6"></script>
<script>
const SC = window.sharedChrome;

/* ── Event type config ─────────────────────────────────────────────────────── */
const TYPE_CFG = {
  cyclone:    { color:'#06b6d4', light:'#ecfeff', label:'Cyclone' },
  wildfire:   { color:'#f97316', light:'#fff7ed', label:'Wildfire' },
  hurricane:  { color:'#dc2626', light:'#fef2f2', label:'Hurricane' },
  flood:      { color:'#0ea5e9', light:'#f0f9ff', label:'Flood' },
  earthquake: { color:'#8b5cf6', light:'#f5f3ff', label:'Earthquake' },
};

const ICON_SVG = {
  cyclone:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>`,
  wildfire:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`,
  hurricane:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>`,
  flood:      `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2c1.3 0 1.9.5 2.5 1"/><path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2c1.3 0 1.9.5 2.5 1"/><path d="M12 2v9m-4-4 4-4 4 4"/></svg>`,
  earthquake: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
};

/* ── Per-event enriched data ───────────────────────────────────────────────── */
const EVENT_DETAILS = {
  1:  { people:'12,000',    area:'890',     rdsClass:'Medium',  rdsExp:'$1.2B',  props:1850,  damage:[35,40,18,7],  desc:'Cyclone Gezani struck the eastern coast of Madagascar on February 10, 2026 as a Category 3 tropical cyclone. The storm made landfall near Toamasina, causing significant flooding and wind damage across the port city and surrounding coastal communities.', lat:-18.1, lng:49.4 },
  2:  { people:'180,000',   area:'23,000',  rdsClass:'Extreme', rdsExp:'$28.4B', props:12400, damage:[15,25,38,22], desc:'The Palisades Fire erupted in Pacific Palisades on January 7, 2025, driven by powerful Santa Ana winds gusting up to 100 mph. It rapidly became one of the most destructive wildfires in California history, destroying thousands of homes and forcing mass evacuations across Los Angeles.', lat:34.0, lng:-118.5 },
  3:  { people:'45,000',    area:'1,800',   rdsClass:'High',    rdsExp:'$3.6B',  props:3450,  damage:[40,35,20,5],  desc:'Hurricane Idalia made landfall near Horseshoe Beach, Florida on August 30, 2023 as a powerful Category 3 hurricane with maximum sustained winds of 125 mph. The storm brought catastrophic storm surge of 7-12 feet along Florida\'s Big Bend coastline, inundating coastal communities.', lat:29.4, lng:-83.3 },
  4:  { people:'12,000',    area:'2,170',   rdsClass:'High',    rdsExp:'$5.5B',  props:2200,  damage:[10,18,35,37], desc:'The Lahaina wildfire on Maui began on August 8, 2023 and became one of the deadliest U.S. disasters in over a century. Driven by strong trade winds and drought conditions, the fire destroyed most of the historic town of Lahaina, killing over 100 people.', lat:20.9, lng:-156.7 },
  5:  { people:'2,100,000', area:'35,000',  rdsClass:'Medium',  rdsExp:'$890M',  props:8900,  damage:[42,30,20,8],  desc:'Heavy monsoon rainfall caused severe flooding in the Sylhet division of northeastern Bangladesh in June 2023. The floods displaced millions and submerged large areas of agricultural land, disrupting livelihoods across the region.', lat:24.9, lng:91.9 },
  6:  { people:'140,000',   area:'67,000',  rdsClass:'Extreme', rdsExp:'$74.2B', props:18500, damage:[22,28,32,18], desc:'Hurricane Ian made landfall near Fort Myers, Florida on September 28, 2022 as a Category 4 storm. It caused catastrophic damage across southwest Florida with record storm surge exceeding 18 feet in some areas, and was among the costliest natural disasters in U.S. history.', lat:26.6, lng:-81.9 },
  7:  { people:'40,000',    area:'341,735', rdsClass:'High',    rdsExp:'$3.4B',  props:7200,  damage:[30,28,26,16], desc:'The Hermit\'s Peak-Calf Canyon Fire started in early April 2022 in New Mexico. It became the largest wildfire in New Mexico state history, burning over 341,000 acres and destroying thousands of structures across multiple counties.', lat:35.6, lng:-105.2 },
  8:  { people:'3,800,000', area:'525,000', rdsClass:'Extreme', rdsExp:'$34.2B', props:42000, damage:[28,22,30,20], desc:'A devastating magnitude 7.8 earthquake struck southern Turkey and northern Syria on February 6, 2023. The disaster caused massive destruction across multiple cities, killing over 50,000 people and collapsing thousands of buildings across two countries.', lat:37.6, lng:36.8 },
  9:  { people:'500,000',   area:'180,000', rdsClass:'High',    rdsExp:'$2.1B',  props:9800,  damage:[35,30,25,10], desc:'Tropical Cyclone Freddy made multiple landfalls across southern Africa in early 2023, setting the record for the longest-lasting tropical cyclone ever recorded. Mozambique, Malawi, and Madagascar experienced severe flooding and wind damage.', lat:-17.9, lng:36.9 },
  10: { people:'90,000',    area:'59,000',  rdsClass:'Extreme', rdsExp:'$25.1B', props:15600, damage:[15,20,35,30], desc:'Hurricane Michael made landfall near Mexico Beach, Florida on October 10, 2018 as a Category 5 storm—the strongest on record to hit the Florida Panhandle. It caused catastrophic devastation along a narrow corridor of the coast with winds of 160 mph at landfall.', lat:29.9, lng:-85.4 },
};

/* ── Load event ────────────────────────────────────────────────────────────── */
let ev = null;
try { ev = JSON.parse(sessionStorage.getItem('selectedNatCatEvent') || 'null'); } catch(e) {}
if (!ev) {
  ev = { id:3, name:'Hurricane — Idalia', type:'hurricane', location:'Horseshoe Beach, Florida', dateStart:'08/30/2023', dateEnd:'', cat:3, updated:'Sep 4, 2023, 2:21 UTC' };
}

const det  = EVENT_DETAILS[ev.id] || EVENT_DETAILS[3];
const cfg  = TYPE_CFG[ev.type] || TYPE_CFG.hurricane;

const DMG_LABELS  = ['Undamaged','Minor Damage','Major Damage','Completely Destroyed'];
const DMG_COLORS  = ['#16a34a','#eab308','#f97316','#dc2626'];

/* ── SVG icons ─────────────────────────────────────────────────────────────── */
const IC = {
  chevLeft: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  people:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  area:     `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`,
  download: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  cloud:    `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>`,
  layers:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`,
  filter:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>`,
  tag:      `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`,
  expand:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>`,
};

/* ── Analytics panel HTML ──────────────────────────────────────────────────── */
function AnalyticsPanel() {
  const dmgPairs = det.damage.map((pct, i) => {
    const barWidth = Math.max(pct, 2);
    return `
    <div style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:12px;color:#334155;">${DMG_LABELS[i]}</span>
        <span style="font-size:12px;font-weight:700;color:#334155;">${pct}%</span>
      </div>
      <div style="height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;">
        <div class="dmg-fill" style="height:100%;width:${barWidth}%;--bar-w:${barWidth}%;background:${DMG_COLORS[i]};border-radius:999px;animation-delay:${i * 120}ms;"></div>
      </div>
    </div>`;
  }).join('');

  return `
  <div style="overflow-y:auto;flex:1;" class="scroll-thin">
    <!-- Header -->
    <div style="padding:12px 16px;border-bottom:1px solid #e2e8f0;flex-shrink:0;background:#fff;">
      <div style="font-size:11px;font-weight:700;letter-spacing:.08em;color:#64748b;text-transform:uppercase;">Analytics</div>
    </div>
    <div style="padding:12px 16px 10px;border-bottom:1px solid #f1f5f9;flex-shrink:0;">
      <button class="global-view-btn" onclick="window.location.href='NatCatEvents.html'">
        ${IC.chevLeft} Global View
      </button>
    </div>

    <!-- Event info -->
    <div style="padding:16px;border-bottom:1px solid #f1f5f9;">
      <div style="font-size:18px;font-weight:800;color:${cfg.color};margin-bottom:4px;line-height:1.2;">${ev.name}</div>
      <div style="font-size:12.5px;color:#64748b;margin-bottom:2px;">${ev.location}</div>
      <div style="font-size:12.5px;color:#64748b;margin-bottom:12px;">${ev.dateStart}${ev.dateEnd?' – '+ev.dateEnd:''}</div>

      <!-- Stats row -->
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;font-size:12.5px;color:#334155;">
        <span style="display:flex;align-items:center;gap:5px;color:#475569;">${IC.people} ${det.people} Ppl</span>
        <span style="display:flex;align-items:center;gap:5px;color:#475569;">${IC.area} ${det.area} Km²</span>
      </div>

      <!-- RDS -->
      <div style="font-size:12.5px;color:#334155;margin-bottom:3px;">
        RDS Classification: <strong style="color:${det.rdsClass==='Extreme'?'#dc2626':det.rdsClass==='High'?'#d97706':det.rdsClass==='Medium'?'#2563eb':'#16a34a'}">${det.rdsClass}</strong>
      </div>
      <div style="font-size:12.5px;color:#334155;margin-bottom:8px;">
        RDS Exposure: <strong>${det.rdsExp}</strong>
      </div>
      <div style="font-size:11px;color:#94a3b8;">Updated ${ev.updated}</div>
    </div>

    <!-- Damage breakdown -->
    <div style="padding:16px;border-bottom:1px solid #f1f5f9;">
      ${dmgPairs}
      <div style="text-align:right;font-size:11.5px;color:#64748b;margin-top:6px;">
        Total Properties: ${det.props.toLocaleString()}
      </div>
    </div>

    <!-- Description -->
    <div style="padding:16px;border-bottom:1px solid #f1f5f9;font-size:12.5px;color:#475569;line-height:1.6;">
      ${det.desc}
    </div>
  </div>

  <!-- Download footer — fixed outside scroll -->
  <div style="padding:14px 16px;border-top:1px solid #e2e8f0;flex-shrink:0;background:#fff;">
    <button class="download-btn">
      ${IC.download} Download Report
    </button>
  </div>`;
}

/* ── Map right panel ───────────────────────────────────────────────────────── */
function MapPanel() {
  const legendItems = det.damage.map((pct, i) => `
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:#fff;white-space:nowrap;">
      <span style="width:9px;height:9px;border-radius:50%;background:${DMG_COLORS[i]};display:inline-block;flex-shrink:0;"></span>
      ${DMG_LABELS[i].split(' ')[0]} (${pct}%)
    </span>`).join('');

  return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <!-- Map header -->
    <div style="padding:12px 16px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:10;">
      ${IC.cloud}
      <span style="font-size:14px;font-weight:600;color:#0f172a;">Event Location</span>
    </div>

    <!-- Map container -->
    <div style="flex:1;position:relative;">
      <div id="detail-map" style="position:absolute;inset:0;"></div>

      <!-- Right map controls -->
      <div style="position:absolute;top:12px;right:12px;z-index:800;display:flex;flex-direction:column;gap:6px;">
        <button class="map-btn" id="dm-layers-btn" title="Map layers">${IC.layers}</button>
        <button class="map-btn" title="Filter">${IC.filter}</button>
        <button class="map-btn" title="Labels">${IC.tag}</button>
      </div>

      <!-- Expand btn -->
      <button class="map-btn" id="dm-expand-btn" title="Fullscreen"
        style="position:absolute;top:12px;left:12px;z-index:800;">${IC.expand}</button>

      <!-- Layers dropdown -->
      <div id="dm-layers-menu" style="display:none;position:absolute;top:12px;right:52px;z-index:900;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.12);overflow:hidden;min-width:140px;">
        ${[['satellite','Satellite'],['street','Street'],['light','Light'],['dark','Dark']].map(([t,l])=>`
        <button data-mtype="${t}" style="display:block;width:100%;padding:8px 14px;font-size:13px;text-align:left;border:0;background:${t==='satellite'?'#f1f5f9':'#fff'};color:#334155;cursor:pointer;font-family:inherit;"
          onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='${t==='satellite'?'#f1f5f9':'#fff'}">${l}</button>`).join('')}
      </div>

      <!-- Bottom legend overlay -->
      <div style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:700;background:rgba(15,23,42,.82);border-radius:9999px;padding:7px 16px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(4px);">
        ${legendItems}
      </div>
    </div>
  </div>`;
}

/* ── Main content ──────────────────────────────────────────────────────────── */
function Content() {
  return `
  <div class="flex-1 min-h-0 overflow-hidden" style="padding:16px;">
    <div class="detail-main" style="display:flex;height:100%;gap:16px;">
      <div style="width:300px;min-width:300px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 3px rgba(15,23,42,.06);overflow:hidden;display:flex;flex-direction:column;">
        ${AnalyticsPanel()}
      </div>
      <div style="flex:1;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 3px rgba(15,23,42,.06);overflow:hidden;display:flex;flex-direction:column;" class="map-right">
        ${MapPanel()}
      </div>
    </div>
  </div>`;
}

/* ── Map init ──────────────────────────────────────────────────────────────── */
let detailMap = null;
const TILE_URLS = {
  satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  street:    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  light:     'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  dark:      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
};
let activeTile = null;
let currentMapType = 'satellite';

function initDetailMap() {
  const el = document.getElementById('detail-map');
  if (!el) return;
  if (detailMap) { detailMap.remove(); detailMap = null; }

  const zoom = ['earthquake','flood'].includes(ev.type) ? 7 : ev.type === 'wildfire' ? 9 : 8;
  detailMap = L.map(el, { center:[det.lat, det.lng], zoom, zoomControl:false, scrollWheelZoom:true });
  L.control.zoom({ position:'topleft' }).addTo(detailMap);

  activeTile = L.tileLayer(TILE_URLS.satellite, { attribution:'&copy; Esri, Maxar, Earthstar Geographics', maxZoom:18 }).addTo(detailMap);

  // Push zoom control below expand btn
  setTimeout(() => {
    const zc = el.querySelector('.leaflet-control-zoom');
    if (zc) zc.style.marginTop = '44px';
    const zin  = el.querySelector('.leaflet-control-zoom-in');
    const zout = el.querySelector('.leaflet-control-zoom-out');
    if (zin)  zin.innerHTML  = `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>`;
    if (zout) zout.innerHTML = `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></span>`;
  }, 100);

  // Event marker — large circle with icon
  const markerHtml = `
    <div style="width:48px;height:48px;border-radius:50%;background:${cfg.color};border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.4);">
      ${ICON_SVG[ev.type] || ''}
    </div>`;
  const icon = L.divIcon({ className:'', html:markerHtml, iconSize:[48,48], iconAnchor:[24,24] });
  L.marker([det.lat, det.lng], { icon }).addTo(detailMap);

  // Storm track for hurricane/cyclone
  if (ev.type === 'hurricane' || ev.type === 'cyclone') {
    const trackPoints = [
      [det.lat - 8, det.lng - 3],
      [det.lat - 5, det.lng - 2],
      [det.lat - 2, det.lng],
      [det.lat, det.lng],
      [det.lat + 3, det.lng + 1],
      [det.lat + 6, det.lng + 2],
    ];
    L.polyline(trackPoints, { color:'#dc2626', weight:2.5, dashArray:'8 6', opacity:0.85 }).addTo(detailMap);
  }

  // Wildfire perimeter circle
  if (ev.type === 'wildfire') {
    L.circle([det.lat, det.lng], { radius:15000, color:cfg.color, fillColor:cfg.color, fillOpacity:0.12, weight:2, dashArray:'6 5' }).addTo(detailMap);
  }

  // Earthquake epicenter rings
  if (ev.type === 'earthquake') {
    [20000, 40000, 80000].forEach(r => {
      L.circle([det.lat, det.lng], { radius:r, color:'#8b5cf6', fillOpacity:0, weight:1.5, dashArray:'4 4', opacity:0.5 }).addTo(detailMap);
    });
  }

  // Flood extent
  if (ev.type === 'flood') {
    L.circle([det.lat, det.lng], { radius:25000, color:'#0ea5e9', fillColor:'#0ea5e9', fillOpacity:0.15, weight:2, dashArray:'6 5' }).addTo(detailMap);
  }

  // Layer switcher
  const layersMenu = document.getElementById('dm-layers-menu');
  const layersBtn  = document.getElementById('dm-layers-btn');
  if (layersBtn && layersMenu) {
    layersBtn.onclick = (e) => { e.stopPropagation(); layersMenu.style.display = layersMenu.style.display === 'none' ? 'block' : 'none'; };
    document.querySelectorAll('[data-mtype]').forEach(btn => {
      btn.onclick = () => {
        if (activeTile) detailMap.removeLayer(activeTile);
        currentMapType = btn.dataset.mtype;
        activeTile = L.tileLayer(TILE_URLS[currentMapType] || TILE_URLS.satellite, { attribution:'', maxZoom:18 }).addTo(detailMap);
        activeTile.bringToBack();
        layersMenu.style.display = 'none';
        document.querySelectorAll('[data-mtype]').forEach(b => b.style.background = b.dataset.mtype === currentMapType ? '#f1f5f9' : '#fff');
      };
    });
    document.addEventListener('click', () => { layersMenu.style.display = 'none'; });
  }

  // Expand/fullscreen
  const expandBtn  = document.getElementById('dm-expand-btn');
  const mapWrapper = el.parentElement;
  if (expandBtn && mapWrapper) {
    expandBtn.onclick = () => {
      const isFs = mapWrapper.classList.toggle('is-fs');
      if (isFs) {
        mapWrapper.style.cssText = 'position:fixed;inset:0;z-index:9999;';
      } else {
        mapWrapper.style.cssText = 'flex:1;position:relative;';
      }
      setTimeout(() => detailMap.invalidateSize(), 200);
    };
  }
}

/* ── Render ────────────────────────────────────────────────────────────────── */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      ${Content()}
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  setTimeout(initDetailMap, 60);
};

window.render();
</script>
</body>
</html>
