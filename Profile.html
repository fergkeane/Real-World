<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Profile — Real World</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  .scroll-thin::-webkit-scrollbar{width:5px}.scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
  /* Cards */
  .pcard{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:24px;box-shadow:0 1px 3px rgba(15,23,42,.06);margin-bottom:16px}
  .pcard:last-child{margin-bottom:0}
  /* Form inputs */
  .pfield{width:100%;height:38px;border:1px solid #e2e8f0;border-radius:8px;padding:0 12px;font-size:13.5px;color:#334155;background:#f8fafc;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
  .pfield:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.12);background:#fff}
  .pfield:disabled{color:#64748b;cursor:default}
  /* Radio rows */
  .radio-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:border-color .1s,background .1s;margin-bottom:8px}
  .radio-row:last-child{margin-bottom:0}
  .radio-row.selected{border-color:#2563eb;background:#f8fbff}
  .radio-row:hover:not(.selected){border-color:#cbd5e1;background:#fafafa}
  .radio-dot{width:18px;height:18px;border-radius:50%;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s}
  .radio-dot.on{border-color:#2563eb;background:#2563eb}
  .radio-dot.on::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff}
  /* Setting rows */
  .setting-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #f1f5f9}
  .setting-row:last-child{border-bottom:0}
  .setting-btn{height:30px;padding:0 14px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;font-size:12.5px;font-weight:600;color:#334155;cursor:pointer;font-family:inherit;transition:background .1s,border-color .1s}
  .setting-btn:hover{background:#f1f5f9;border-color:#cbd5e1}
</style>
</head>
<body class="bg-slate-100 text-slate-900">
<div id="app" class="h-screen w-full flex overflow-hidden"></div>

<script>
window.PAGE = { id:'profile', title:'My Profile', crumb:'Profile' };
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "accent": "blue",
  "sidebarExpanded": false,
  "showSparklines": true
}/*EDITMODE-END*/;
</script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="shared/chrome.js?v=6"></script>
<script>
const SC = window.sharedChrome;

/* ── State ────────────────────────────────────────────────────────────────── */
let ST = {
  selectedOrg:   'skytek',
  selectedTheme: SC.getTheme(),
  editMode: false,
};

const ORGS = [
  { id:'skytek',  name:'Skytek Limited',                desc:'Maritime Technology Solutions'  },
  { id:'maersk',  name:'Maersk Group',                  desc:'Global Shipping & Logistics'    },
  { id:'hapag',   name:'Hapag-Lloyd AG',                desc:'Container Shipping Company'     },
  { id:'msc',     name:'Mediterranean Shipping Company',desc:'International Shipping'         },
  { id:'cosco',   name:'COSCO Shipping Lines',          desc:'Chinese State-Owned Shipping'   },
];

const THEMES = [
  { id:'light', label:'Light'           },
  { id:'dark',  label:'Dark'            },
  { id:'sky',   label:'Sky (Default)'   },
];

/* ── SVGs ─────────────────────────────────────────────────────────────────── */
const PIN_ICO = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
const CAL_ICO = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
const SET_ICO = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 1 0-14.14 14.14"/></svg>`;
const BLD_ICO = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>`;

/* ── Content ──────────────────────────────────────────────────────────────── */
function Content() {
  return `
  <div class="scroll-thin" style="flex:1;overflow-y:auto;padding:20px 16px">
  <div style="max-width:660px;margin:0 auto">

    <!-- Profile Header -->
    <div class="pcard" style="text-align:center;padding:32px 24px">
      <div style="width:80px;height:80px;border-radius:50%;overflow:hidden;margin:0 auto 14px;border:3px solid #e2e8f0;box-shadow:0 2px 8px rgba(15,23,42,.12)">
        <img src="images/avatar-paul-kiernan.avif" alt="Paul Kiernan" style="width:100%;height:100%;object-fit:cover" />
      </div>
      <h2 style="font-size:20px;font-weight:700;color:#0f172a;margin-bottom:4px">Paul Kiernan</h2>
      <div style="font-size:14px;color:#64748b;margin-bottom:8px">Chief Technology Officer</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:14px;font-size:13px;color:#64748b;margin-bottom:16px">
        <span style="display:flex;align-items:center;gap:5px">${PIN_ICO} London, UK</span>
        <span style="display:flex;align-items:center;gap:5px">${CAL_ICO} Joined March 2022</span>
      </div>
      <button id="edit-profile-btn" style="display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 18px;border-radius:8px;background:#2563eb;color:#fff;font-size:13px;font-weight:600;border:0;cursor:pointer;font-family:inherit;transition:background .15s" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">
        ${SET_ICO} Edit Profile
      </button>
    </div>

    <!-- Personal Information -->
    <div class="pcard">
      <h3 style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:4px">Personal Information</h3>
      <p style="font-size:13px;color:#64748b;margin-bottom:18px">Update your personal details and contact information.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div>
          <label style="display:block;font-size:12.5px;font-weight:600;color:#334155;margin-bottom:5px">First Name</label>
          <input class="pfield" type="text" value="Paul" ${!ST.editMode?'disabled':''} id="fn-input" />
        </div>
        <div>
          <label style="display:block;font-size:12.5px;font-weight:600;color:#334155;margin-bottom:5px">Last Name</label>
          <input class="pfield" type="text" value="Kiernan" ${!ST.editMode?'disabled':''} />
        </div>
        <div>
          <label style="display:block;font-size:12.5px;font-weight:600;color:#334155;margin-bottom:5px">Email</label>
          <input class="pfield" type="email" value="paul.kiernan@realworld.com" ${!ST.editMode?'disabled':''} />
        </div>
        <div>
          <label style="display:block;font-size:12.5px;font-weight:600;color:#334155;margin-bottom:5px">Phone</label>
          <input class="pfield" type="tel" value="+44 20 7946 0958" ${!ST.editMode?'disabled':''} />
        </div>
        <div>
          <label style="display:block;font-size:12.5px;font-weight:600;color:#334155;margin-bottom:5px">Location</label>
          <input class="pfield" type="text" value="London, UK" ${!ST.editMode?'disabled':''} />
        </div>
        <div>
          <label style="display:block;font-size:12.5px;font-weight:600;color:#334155;margin-bottom:5px">Department</label>
          <input class="pfield" type="text" value="Maritime Risk Analysis" ${!ST.editMode?'disabled':''} />
        </div>
      </div>
      ${ST.editMode ? `
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
        <button id="cancel-edit" style="height:34px;padding:0 14px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:13px;font-weight:600;color:#475569;cursor:pointer;font-family:inherit">Cancel</button>
        <button style="height:34px;padding:0 14px;border-radius:8px;border:0;background:#2563eb;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Save Changes</button>
      </div>` : ''}
    </div>

    <!-- Organisations -->
    <div class="pcard">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">${BLD_ICO}<h3 style="font-size:15px;font-weight:700;color:#0f172a">Organisations</h3></div>
      <p style="font-size:13px;color:#64748b;margin-bottom:16px">Select which organisation to view data for.</p>
      ${ORGS.map(o => {
        const sel = ST.selectedOrg === o.id;
        return `<div class="radio-row ${sel?'selected':''}" data-org="${o.id}">
          <div class="radio-dot ${sel?'on':''}"></div>
          <div>
            <div style="font-size:14px;font-weight:600;color:#0f172a">${o.name}</div>
            <div style="font-size:12.5px;color:#64748b">${o.desc}</div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Theme -->
    <div class="pcard">
      <h3 style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:4px">Theme</h3>
      <p style="font-size:13px;color:#64748b;margin-bottom:16px">Select your preferred theme for the application.</p>
      ${THEMES.map(t => {
        const sel = ST.selectedTheme === t.id;
        return `<div class="radio-row ${sel?'selected':''}" data-theme="${t.id}">
          <div class="radio-dot ${sel?'on':''}"></div>
          <div style="font-size:14px;font-weight:600;color:#0f172a">${t.label}</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Account Settings -->
    <div class="pcard">
      <h3 style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:4px">Account Settings</h3>
      <p style="font-size:13px;color:#64748b;margin-bottom:4px">Manage your account preferences and security settings.</p>
      <div class="setting-row">
        <div>
          <div style="font-size:14px;font-weight:600;color:#0f172a">Change Password</div>
          <div style="font-size:12.5px;color:#64748b;margin-top:2px">Update your account password</div>
        </div>
        <button class="setting-btn">Change</button>
      </div>
      <div class="setting-row">
        <div>
          <div style="font-size:14px;font-weight:600;color:#0f172a">Two-Factor Authentication</div>
          <div style="font-size:12.5px;color:#64748b;margin-top:2px">Add an extra layer of security</div>
        </div>
        <button class="setting-btn">Enable</button>
      </div>
      <div class="setting-row">
        <div>
          <div style="font-size:14px;font-weight:600;color:#0f172a">Email Notifications</div>
          <div style="font-size:12.5px;color:#64748b;margin-top:2px">Manage your notification preferences</div>
        </div>
        <button class="setting-btn">Configure</button>
      </div>
    </div>

  </div>
  </div>`;
}

/* ── Wire ─────────────────────────────────────────────────────────────────── */
let _main = null;

function rc() {
  if (!_main) return;
  _main.innerHTML = Content();
  wire();
}

function wire() {
  /* Edit profile */
  const editBtn = document.getElementById('edit-profile-btn');
  if (editBtn) editBtn.addEventListener('click', () => { ST.editMode = true; rc(); });
  const cancelBtn = document.getElementById('cancel-edit');
  if (cancelBtn) cancelBtn.addEventListener('click', () => { ST.editMode = false; rc(); });

  /* Org selection */
  document.querySelectorAll('[data-org]').forEach(row => {
    row.addEventListener('click', () => { ST.selectedOrg = row.dataset.org; rc(); });
  });

  /* Theme selection */
  document.querySelectorAll('[data-theme]').forEach(row => {
    row.addEventListener('click', () => {
      ST.selectedTheme = row.dataset.theme;
      SC.setTheme(row.dataset.theme);
      rc();
    });
  });
}

/* ── Main render ──────────────────────────────────────────────────────────── */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      <main id="profile-main" class="flex-1 min-h-0 overflow-hidden flex flex-col bg-slate-100"></main>
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  _main = document.getElementById('profile-main');
  rc();
};

window.render();
</script>
</body>
</html>
