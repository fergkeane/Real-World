<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Organisations — Real World</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  .scroll-thin::-webkit-scrollbar{width:5px}.scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
  /* Table */
  .org-tbl{width:100%;border-collapse:collapse;min-width:900px}
  .org-tbl th{padding:10px 16px;font-size:12px;font-weight:600;color:var(--text-muted,#6B7280);text-align:left;border-bottom:1px solid #f1f5f9;white-space:nowrap;background:var(--slate-50,#F9FAFB);text-transform:uppercase;letter-spacing:.04em}
  .org-tbl td{padding:13px 16px;font-size:13px;color:#334155;border-bottom:1px solid #f1f5f9;vertical-align:middle}
  .org-tbl tr:last-child td{border-bottom:0}
  .org-tbl tbody tr:hover td{background:#fafafa}
  /* Status badges */
  .sbadge{font-size:12px;font-weight:500;padding:3px 10px;border-radius:6px;display:inline-block;white-space:nowrap}
  .sb-active  {background:#f0fdf4;color:#16a34a}
  .sb-pending {background:#fefce8;color:#ca8a04}
  .sb-inactive{background:#fef2f2;color:#e11d48}
  /* Access chips */
  .chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;display:inline-block;margin:1px 2px 1px 0;white-space:nowrap}
  .chip-ports  {background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
  .chip-weather{background:#f0fdf4;color:#059669;border:1px solid #86efac}
  .chip-risk   {background:#fff7ed;color:#c2410c;border:1px solid #fdba74}
  /* Header controls */
  .hbtn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 12px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;font-size:13px;font-weight:500;color:#334155;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .1s,border-color .1s}
  .hbtn:hover{background:#f8fafc;border-color:#cbd5e1}
  .hbtn.hactive{background:#eff6ff;border-color:#bfdbfe;color:#2563eb}
  /* Dropdowns */
  .fdrop{position:absolute;top:calc(100% + 5px);left:0;min-width:170px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.12);z-index:9999;overflow:hidden}
  .fdrop-item{padding:8px 12px;font-size:13px;color:#334155;cursor:pointer}.fdrop-item:hover{background:#f8fafc}.fdrop-item.fsel{color:#2563eb;font-weight:600;background:#eff6ff}
  /* Action buttons */
  .actbtn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;border:0;background:transparent;cursor:pointer;color:#94a3b8;transition:background .1s,color .1s}
  .actbtn:hover{background:#f1f5f9;color:#334155}
  .actbtn.danger:hover{background:#fef2f2;color:#e11d48}
  /* Pagination */
  .pgbtn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;color:#334155;cursor:pointer;transition:background .1s}
  .pgbtn:hover:not([disabled]){background:#f1f5f9}.pgbtn[disabled]{opacity:.4;cursor:not-allowed}
  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.3);z-index:500;display:flex;justify-content:flex-end;animation:fadein 150ms ease}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .modal-panel{width:460px;max-width:100vw;background:#fff;height:100%;display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(15,23,42,.14);animation:slidein 200ms cubic-bezier(.22,.1,.36,1)}
  @keyframes slidein{from{transform:translateX(100%)}to{transform:translateX(0)}}
  .form-label{font-size:11px;font-weight:700;color:#64748b;margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
  .form-input{width:100%;height:36px;padding:0 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;color:#0f172a;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s;background:#fff}
  .form-input:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
  .form-select{width:100%;height:36px;padding:0 28px 0 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;color:#0f172a;outline:none;font-family:inherit;background:#fff;appearance:none;-webkit-appearance:none;cursor:pointer}
  .form-select:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
  .access-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:background .1s,border-color .1s;margin-bottom:6px}
  .access-row:last-child{margin-bottom:0}
  .access-row:hover{background:#f8fafc}
  .access-row.checked-ports   {background:#eff6ff;border-color:#bfdbfe}
  .access-row.checked-weather {background:#f0fdf4;border-color:#86efac}
  .access-row.checked-risk    {background:#fff7ed;border-color:#fdba74}
</style>
</head>
<body class="bg-slate-100 text-slate-900">
<div id="app" class="h-screen w-full flex overflow-hidden"></div>

<script>
window.PAGE = { id:'orgs', title:'Organisations', crumb:'All Organisations' };
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "accent": "blue",
  "sidebarExpanded": false,
  "showSparklines": true
}/*EDITMODE-END*/;
</script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="shared/chrome.js?v=11"></script>
<link rel="stylesheet" href="shared/pagination.css" />
<script src="shared/pagination.js"></script>
<script>
const SC = window.sharedChrome;

/* ── Data ─────────────────────────────────────────────────────────────────── */
const ORGS = [
  { name:'Asia Pacific Shipping',    slug:'apac-shipping',     currency:'USD', locale:'en_SG', email:'info@apacshipping.com',     status:'Pending',  users:12,  portfolios:3,  access:['Ports'],                 created:'6/15/2023'  },
  { name:'Atlantic Marine Services', slug:'atlantic-marine',   currency:'CAD', locale:'en_CA', email:'contact@atlanticmarine.ca', status:'Active',   users:89,  portfolios:34, access:['Ports','Weather','Risk'], created:'7/1/2023'   },
  { name:'Global Shipping Corp',     slug:'global-shipping',   currency:'GBP', locale:'en_GB', email:'info@globalshipping.com',   status:'Active',   users:156, portfolios:45, access:['Ports','Risk'],          created:'3/5/2023'   },
  { name:'Maritime Solutions Inc',   slug:'maritime-solutions', currency:'USD',locale:'en_US', email:'admin@maritimesolutions.com',status:'Active',   users:78,  portfolios:23, access:['Ports','Weather','Risk'], created:'2/10/2023'  },
  { name:'Mediterranean Fleet',      slug:'med-fleet',         currency:'EUR', locale:'es_ES', email:'admin@medfleet.es',         status:'Active',   users:67,  portfolios:28, access:['Ports','Weather','Risk'], created:'5/8/2023'   },
  { name:'Nordic Marine Group',      slug:'nordic-marine',     currency:'NOK', locale:'nb_NO', email:'contact@nordicmarine.no',   status:'Active',   users:34,  portfolios:15, access:['Ports','Weather','Risk'], created:'4/12/2023'  },
  { name:'Ocean Logistics',          slug:'ocean-logistics',   currency:'EUR', locale:'fr_FR', email:'support@oceanlogistics.com',status:'Inactive', users:23,  portfolios:8,  access:['Weather'],               created:'11/20/2022' },
  { name:'Skytek Limited',           slug:'skytek-ltd',        currency:'EUR', locale:'en_IE', email:'contact@skytek.ie',         status:'Active',   users:45,  portfolios:12, access:['Ports','Weather','Risk'], created:'1/15/2023'  },
];

/* ── Sort options ─────────────────────────────────────────────────────────── */
const SORT_OPTS = [
  { col:'name',       dir:'asc',  label:'Name (A–Z)'          },
  { col:'name',       dir:'desc', label:'Name (Z–A)'          },
  { col:'created',    dir:'desc', label:'Created (Newest)'    },
  { col:'created',    dir:'asc',  label:'Created (Oldest)'    },
  { col:'users',      dir:'desc', label:'Users (Most)'        },
  { col:'portfolios', dir:'desc', label:'Portfolios (Most)'   },
];

/* ── State ────────────────────────────────────────────────────────────────── */
let ST = {
  query:'', filterStatus:'all', sortCol:'name', sortDir:'asc',
  page:1, perPage:10, openDrop:null, showModal:false,
  form:{ name:'', slug:'', currency:'USD', locale:'en_US', email:'', status:'Active', access:[], _slugEdited:false },
};

/* ── SVG icons ────────────────────────────────────────────────────────────── */
const SVG = {
  search:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  chevDown: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
  chevLeft: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  chevRight:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  eye:      `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  edit:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
  x:        `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  plus:     `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  check:    `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
};

/* ── Helpers ──────────────────────────────────────────────────────────────── */
function statusBadge(s) {
  const cls = { Active:'sb-active', Pending:'sb-pending', Inactive:'sb-inactive' }[s] || 'sb-active';
  return `<span class="sbadge ${cls}">${s}</span>`;
}
function accessChips(arr) {
  const cls = { Ports:'chip-ports', Weather:'chip-weather', Risk:'chip-risk' };
  return arr.map(a => `<span class="chip ${cls[a] || ''}">${a}</span>`).join('');
}
function toSlug(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

/* ── Filter / sort ────────────────────────────────────────────────────────── */
function getFiltered() {
  let rows = [...ORGS];
  const q = ST.query.trim().toLowerCase();
  if (q) rows = rows.filter(o =>
    o.name.toLowerCase().includes(q) || o.email.toLowerCase().includes(q) || o.slug.toLowerCase().includes(q)
  );
  if (ST.filterStatus !== 'all') rows = rows.filter(o => o.status === ST.filterStatus);
  rows.sort((a, b) => {
    let va, vb;
    if      (ST.sortCol === 'name')       { va = a.name.toLowerCase();  vb = b.name.toLowerCase(); }
    else if (ST.sortCol === 'created')    { va = new Date(a.created);   vb = new Date(b.created); }
    else if (ST.sortCol === 'users')      { va = a.users;               vb = b.users; }
    else if (ST.sortCol === 'portfolios') { va = a.portfolios;          vb = b.portfolios; }
    else                                  { va = a.name.toLowerCase();  vb = b.name.toLowerCase(); }
    return (va < vb ? -1 : va > vb ? 1 : 0) * (ST.sortDir === 'asc' ? 1 : -1);
  });
  return rows;
}

/* ── Modal HTML ───────────────────────────────────────────────────────────── */
function renderModal() {
  if (!ST.showModal) return '';
  const f = ST.form;
  const ACCESS_META = { Ports:'Vessel & port intelligence', Weather:'Weather overlays & alerts', Risk:'Risk & compliance tools' };
  const ACCESS_CLS  = { Ports:'chip-ports', Weather:'chip-weather', Risk:'chip-risk' };
  const ROW_CLS     = { Ports:'checked-ports', Weather:'checked-weather', Risk:'checked-risk' };

  return `<div class="modal-bg" id="modal-bg">
    <div class="modal-panel" id="modal-panel">

      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 shrink-0">
        <div>
          <div class="text-base font-bold text-slate-900">Create New Organisation</div>
          <div class="text-xs text-slate-400 mt-0.5">Set up a new client organisation on Real World</div>
        </div>
        <button id="modal-close" style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:0;background:transparent;cursor:pointer;color:#94a3b8;transition:background .1s,color .1s" onmouseover="this.style.background='#f1f5f9';this.style.color='#334155'" onmouseout="this.style.background='transparent';this.style.color='#94a3b8'">${SVG.x}</button>
      </div>

      <!-- Body -->
      <div class="flex-1 overflow-y-auto scroll-thin px-6 py-5" style="display:flex;flex-direction:column;gap:16px">

        <!-- Name -->
        <div>
          <label class="form-label">Organisation Name</label>
          <input class="form-input" id="form-name" type="text" placeholder="e.g. Acme Maritime Ltd" value="${f.name.replace(/"/g, '&quot;')}" />
        </div>

        <!-- Slug -->
        <div>
          <label class="form-label">Slug</label>
          <input class="form-input" id="form-slug" type="text" placeholder="auto-generated from name" value="${f.slug.replace(/"/g, '&quot;')}" style="color:#64748b" />
          <div style="font-size:11px;color:#94a3b8;margin-top:4px">Used in URLs and API references.</div>
        </div>

        <!-- Currency + Locale -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <label class="form-label">Currency</label>
            <div style="position:relative">
              <select class="form-select" id="form-currency">
                ${['USD','EUR','GBP','CAD','NOK','SGD','AUD'].map(c => `<option${f.currency === c ? ' selected' : ''}>${c}</option>`).join('')}
              </select>
              <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:#64748b;display:flex">${SVG.chevDown}</span>
            </div>
          </div>
          <div>
            <label class="form-label">Locale</label>
            <div style="position:relative">
              <select class="form-select" id="form-locale">
                ${['en_US','en_GB','en_IE','en_SG','en_CA','en_AU','fr_FR','es_ES','nb_NO'].map(l => `<option${f.locale === l ? ' selected' : ''}>${l}</option>`).join('')}
              </select>
              <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:#64748b;display:flex">${SVG.chevDown}</span>
            </div>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="form-label">Contact Email</label>
          <input class="form-input" id="form-email" type="email" placeholder="contact@organisation.com" value="${f.email.replace(/"/g, '&quot;')}" />
        </div>

        <!-- Status -->
        <div>
          <label class="form-label">Initial Status</label>
          <div style="display:flex;gap:8px">
            ${['Active','Pending'].map(s => {
              const sel = f.status === s;
              return `<label style="display:flex;align-items:center;gap:7px;cursor:pointer;padding:7px 14px;border:1.5px solid ${sel ? '#2563eb' : '#e2e8f0'};border-radius:8px;background:${sel ? '#eff6ff' : '#fff'};flex:1;justify-content:center;transition:all .1s">
                <input type="radio" name="form-status" value="${s}" ${sel ? 'checked' : ''} style="accent-color:#2563eb;width:14px;height:14px;flex-shrink:0" />
                <span style="font-size:13px;font-weight:600;color:${sel ? '#2563eb' : '#475569'}">${s}</span>
              </label>`;
            }).join('')}
          </div>
        </div>

        <!-- Access -->
        <div>
          <label class="form-label">Access Modules</label>
          ${['Ports','Weather','Risk'].map(a => {
            const checked = f.access.includes(a);
            return `<div class="access-row ${checked ? ROW_CLS[a] : ''}" data-access-row="${a}">
              <div style="width:18px;height:18px;border-radius:5px;border:${checked ? '0' : '1.5px solid #cbd5e1'};background:${checked ? '#2563eb' : 'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s">
                ${checked ? `<span style="color:#fff;display:flex">${SVG.check}</span>` : ''}
              </div>
              <span class="chip ${ACCESS_CLS[a]}">${a}</span>
              <span style="font-size:12px;color:#64748b">${ACCESS_META[a]}</span>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Footer -->
      <div class="shrink-0 px-6 py-4 border-t border-slate-100 flex items-center gap-3">
        <button id="modal-cancel" style="flex:1;height:36px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:13px;font-weight:500;color:#475569;cursor:pointer;font-family:inherit;transition:background .1s" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='#fff'">Cancel</button>
        <button id="modal-create" style="flex:1;height:36px;border-radius:8px;border:0;background:#2563eb;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .1s" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">Create Organisation</button>
      </div>
    </div>
  </div>`;
}

/* ── Page render ──────────────────────────────────────────────────────────── */
function renderPage() {
  const rows       = getFiltered();
  const total      = rows.length;
  const totalPages = Math.max(1, Math.ceil(total / ST.perPage));
  if (ST.page > totalPages) ST.page = totalPages;
  const start      = (ST.page - 1) * ST.perPage;
  const pageRows   = rows.slice(start, start + ST.perPage);
  const curSort    = SORT_OPTS.find(o => o.col === ST.sortCol && o.dir === ST.sortDir) || SORT_OPTS[0];

  return `
  <!-- White card -->
  <div class="flex-1 min-h-0 m-4 bg-white rounded-xl border border-slate-200 flex flex-col overflow-hidden" style="box-shadow:0 1px 3px rgba(15,23,42,.06)">

    <!-- Header row -->
    <div class="shrink-0 px-5 py-3 border-b border-slate-100 flex items-center gap-3 flex-wrap">
      <div class="text-sm font-semibold text-slate-900">
        Organisations <span class="font-normal text-slate-400">(${total})</span>
      </div>
      <div style="flex:1;min-width:16px"></div>

      <!-- Search -->
      <div style="position:relative">
        <span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none;display:flex">${SVG.search}</span>
        <input id="org-search" type="text" placeholder="Search organisations..."
          value="${ST.query.replace(/"/g, '&quot;')}"
          style="height:34px;width:210px;padding:0 10px 0 30px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;color:#0f172a;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s" />
      </div>

      <!-- Status filter -->
      <div style="position:relative">
        <button class="hbtn ${ST.filterStatus !== 'all' ? 'hactive' : ''}" data-drop-btn="status">
          ${ST.filterStatus === 'all' ? 'All Status' : ST.filterStatus} ${SVG.chevDown}
        </button>
        ${ST.openDrop === 'status' ? `
        <div class="fdrop">
          ${[['all','All Status'],['Active','Active'],['Pending','Pending'],['Inactive','Inactive']].map(([v,l]) =>
            `<div class="fdrop-item ${ST.filterStatus === v ? 'fsel' : ''}" data-drop-item="status" data-val="${v}">${l}</div>`
          ).join('')}
        </div>` : ''}
      </div>

      <!-- Sort -->
      <div style="position:relative">
        <button class="hbtn" data-drop-btn="sort">${curSort.label} ${SVG.chevDown}</button>
        ${ST.openDrop === 'sort' ? `
        <div class="fdrop">
          ${SORT_OPTS.map(o =>
            `<div class="fdrop-item ${ST.sortCol === o.col && ST.sortDir === o.dir ? 'fsel' : ''}" data-drop-sort data-col="${o.col}" data-dir="${o.dir}">${o.label}</div>`
          ).join('')}
        </div>` : ''}
      </div>

      <!-- Create -->
      <button id="create-org-btn" style="display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:8px;background:#2563eb;color:#fff;font-size:13px;font-weight:600;border:0;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">
        ${SVG.plus} Create New Organisation
      </button>
    </div>

    <!-- Table -->
    <div class="flex-1 min-h-0 overflow-auto scroll-thin">
      <table class="org-tbl">
        <thead>
          <tr>
            <th style="min-width:240px">Organisation</th>
            <th style="min-width:200px">Contact</th>
            <th style="min-width:100px">Status</th>
            <th style="min-width:70px">Users</th>
            <th style="min-width:90px">Portfolios</th>
            <th style="min-width:190px">Access</th>
            <th style="min-width:110px">Created</th>
            <th style="min-width:110px">Actions</th>
          </tr>
        </thead>
        <tbody>
          ${pageRows.length === 0 ? `
            <tr><td colspan="8" style="text-align:center;padding:64px 0;color:#94a3b8;font-size:13px">No organisations match your search.</td></tr>
          ` : pageRows.map(o => `
          <tr>
            <td>
              <div style="font-size:13px;font-weight:600;color:#0f172a">${o.name}</div>
              <div style="font-size:11px;color:#94a3b8;margin-top:2px">${o.slug} · ${o.currency} · ${o.locale}</div>
            </td>
            <td style="color:#64748b">${o.email}</td>
            <td>${statusBadge(o.status)}</td>
            <td style="font-variant-numeric:tabular-nums;font-weight:500">${o.users}</td>
            <td style="font-variant-numeric:tabular-nums;font-weight:500">${o.portfolios}</td>
            <td>${accessChips(o.access)}</td>
            <td style="color:#64748b">${o.created}</td>
            <td>
              <div style="display:flex;align-items:center;gap:1px">
                <button class="actbtn" title="View">${SVG.eye}</button>
                <button class="actbtn" title="Edit">${SVG.edit}</button>
                <button class="actbtn danger" title="Delete" style="color:#fca5a5">${SVG.trash}</button>
              </div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    ${dsPagination({
      page: ST.page,
      totalPages,
      totalItems: total,
      perPage: ST.perPage,
      perPageOptions: [10, 20, 50],
      label: 'organisations',
    })}
  </div>

  ${renderModal()}`;
}

/* ── Wire interactions ────────────────────────────────────────────────────── */
let _orgMain = null;
let _outsideBound = false;

function rc() {
  if (!_orgMain) return;
  const wasFocused = document.activeElement && document.activeElement.id === 'org-search';
  const selS = wasFocused ? document.activeElement.selectionStart : null;
  const selE = wasFocused ? document.activeElement.selectionEnd : null;
  _orgMain.innerHTML = renderPage();
  wireOrgs();
  if (wasFocused) {
    const el = document.getElementById('org-search');
    if (el) { el.focus(); try { el.setSelectionRange(selS, selE); } catch(e) {} }
  }
}

function wireOrgs() {
  /* Search */
  const si = document.getElementById('org-search');
  if (si) {
    si.addEventListener('input', e => { ST.query = e.target.value; ST.page = 1; rc(); });
    si.addEventListener('focus', e => { e.target.style.borderColor = '#93c5fd'; e.target.style.boxShadow = '0 0 0 3px rgba(59,130,246,.12)'; });
    si.addEventListener('blur',  e => { e.target.style.borderColor = '#e2e8f0'; e.target.style.boxShadow = ''; });
  }

  /* Dropdowns open */
  document.querySelectorAll('[data-drop-btn]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.dropBtn;
      ST.openDrop = ST.openDrop === id ? null : id;
      rc();
    });
  });

  /* Status filter items */
  document.querySelectorAll('[data-drop-item="status"]').forEach(item => {
    item.addEventListener('click', e => {
      e.stopPropagation();
      ST.filterStatus = item.dataset.val; ST.page = 1; ST.openDrop = null; rc();
    });
  });

  /* Sort items */
  document.querySelectorAll('[data-drop-sort]').forEach(item => {
    item.addEventListener('click', e => {
      e.stopPropagation();
      ST.sortCol = item.dataset.col;
      ST.sortDir = item.dataset.dir;
      ST.page = 1; ST.openDrop = null; rc();
    });
  });

  /* Per page */
  const pp = document.getElementById('per-page');
  if (pp) pp.addEventListener('change', () => { ST.perPage = parseInt(pp.value); ST.page = 1; rc(); });

  /* Pagination (DS-compliant) */
  dsWirePagination(document.querySelector('.ds-pagination-wrap'), {
    onPage:    (p) => { ST.page = p; rc(); },
    onPerPage: (n) => { ST.perPage = n; ST.page = 1; rc(); },
  });

  /* Open create modal */
  const createBtn = document.getElementById('create-org-btn');
  if (createBtn) createBtn.addEventListener('click', e => {
    e.stopPropagation();
    ST.showModal = true; ST.openDrop = null;
    ST.form = { name:'', slug:'', currency:'USD', locale:'en_US', email:'', status:'Active', access:[], _slugEdited:false };
    rc();
  });

  /* Modal */
  const closeBtn  = document.getElementById('modal-close');
  const cancelBtn = document.getElementById('modal-cancel');
  const modalBg   = document.getElementById('modal-bg');
  const modalPanel= document.getElementById('modal-panel');
  const closeModal = () => { ST.showModal = false; rc(); };

  if (closeBtn)   closeBtn.addEventListener('click',   e => { e.stopPropagation(); closeModal(); });
  if (cancelBtn)  cancelBtn.addEventListener('click',  e => { e.stopPropagation(); closeModal(); });
  if (modalBg)    modalBg.addEventListener('click',    e => { if (e.target === modalBg) closeModal(); });
  if (modalPanel) modalPanel.addEventListener('click', e => e.stopPropagation());

  /* Form: name → auto-slug */
  const fName = document.getElementById('form-name');
  const fSlug = document.getElementById('form-slug');
  if (fName) fName.addEventListener('input', e => {
    ST.form.name = e.target.value;
    if (!ST.form._slugEdited && fSlug) {
      const s = toSlug(e.target.value);
      ST.form.slug = s;
      fSlug.value = s;
    }
  });
  if (fSlug) fSlug.addEventListener('input', e => { ST.form.slug = e.target.value; ST.form._slugEdited = true; });

  /* Other form inputs */
  const fEmail    = document.getElementById('form-email');
  const fCurrency = document.getElementById('form-currency');
  const fLocale   = document.getElementById('form-locale');
  if (fEmail)    fEmail.addEventListener('input',    e => { ST.form.email    = e.target.value; });
  if (fCurrency) fCurrency.addEventListener('change',e => { ST.form.currency = e.target.value; });
  if (fLocale)   fLocale.addEventListener('change',  e => { ST.form.locale   = e.target.value; });

  /* Status radio */
  document.querySelectorAll('input[name="form-status"]').forEach(r => {
    r.addEventListener('change', e => { ST.form.status = e.target.value; rc(); });
  });

  /* Access toggle rows */
  document.querySelectorAll('[data-access-row]').forEach(row => {
    row.addEventListener('click', e => {
      e.stopPropagation();
      const a = row.dataset.accessRow;
      if (ST.form.access.includes(a)) ST.form.access = ST.form.access.filter(x => x !== a);
      else ST.form.access.push(a);
      rc();
    });
  });

  /* Create action */
  const createAction = document.getElementById('modal-create');
  if (createAction) createAction.addEventListener('click', e => {
    e.stopPropagation();
    const f = ST.form;
    if (!f.name.trim()) { alert('Please enter an organisation name.'); return; }
    const today = new Date();
    ORGS.unshift({
      name:       f.name.trim(),
      slug:       f.slug || toSlug(f.name),
      currency:   f.currency,
      locale:     f.locale,
      email:      f.email,
      status:     f.status,
      users:      0,
      portfolios: 0,
      access:     [...f.access],
      created:    `${today.getMonth()+1}/${today.getDate()}/${today.getFullYear()}`,
    });
    ST.showModal = false;
    rc();
  });

  /* Outside click closes dropdowns */
  if (!_outsideBound) {
    _outsideBound = true;
    document.addEventListener('click', () => {
      if (ST.openDrop) { ST.openDrop = null; rc(); }
    });
  }
}

/* ── Main render ──────────────────────────────────────────────────────────── */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      <main id="org-main" class="flex-1 min-h-0 overflow-hidden flex flex-col bg-slate-100"></main>
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  _orgMain = document.getElementById('org-main');
  rc();
};

window.render();
</script>
</body>
</html>
