/* Vessels on the map — varied types scattered across the globe, oriented by heading. */
const VESSEL_TYPES = [
  { k:'Container',         color:'#2563eb' },
  { k:'Bulk Carrier',      color:'#3b82f6' },
  { k:'Tanker',            color:'#ef4444' },

  { k:'Yacht',             color:'#f59e0b' },
];
const POLICY_TYPES = ['Hull','Cargo','Liability','War','Cyber','Hull & War'];
function randV(seed){ // tiny LCG
  let s = seed;
  return () => { s = (s*9301 + 49297) % 233280; return s/233280; };
}
function makeVessels() {
  const types = VESSEL_TYPES.map(t => ({ k: t.k, color: t.color }));
  const NAMES = ['SEA BREEZE','OCEAN PIONEER','NORDIC STAR','ATLANTIC PEARL','PACIFIC DAWN','BLUE HORIZON','SILVER WAVE','NORTHERN LIGHT','SOUTHERN CROSS','MARITIME GLORY','COASTAL RUNNER','DEEP EXPLORER','TIDAL FORCE','HARBOR MASTER','GULF VOYAGER','ARCTIC WIND','BOREAL QUEEN','EQUINOX','MERIDIAN','CELESTIAL','MIRAMAR','LA PEROUSE','KON-TIKI','AMBER TRADER','IRON DUKE','SEASPRITE','GOLDEN GATE','CAPE HORN','LONG BEACH','YOKOHAMA BAY'];
  const FLAGS = [
    {cc:'ng', name:'Nigeria'},{cc:'pa', name:'Panama'},{cc:'lr', name:'Liberia'},{cc:'mh', name:'Marshall Islands'},
    {cc:'hk', name:'Hong Kong'},{cc:'sg', name:'Singapore'},{cc:'mt', name:'Malta'},{cc:'cy', name:'Cyprus'},
    {cc:'gr', name:'Greece'},{cc:'no', name:'Norway'},{cc:'gb', name:'United Kingdom'},{cc:'jp', name:'Japan'},
    {cc:'kr', name:'South Korea'},{cc:'us', name:'United States'},{cc:'bs', name:'Bahamas'},{cc:'tr', name:'Turkey'}
  ];
  const PORTS = [
    {cc:'sa', code:'SA', name:'Ras Tanura'},{cc:'nl', code:'NL', name:'Lagos'},
    {cc:'sg', code:'SG', name:'Singapore'},{cc:'cn', code:'CN', name:'Shanghai'},
    {cc:'ae', code:'AE', name:'Jebel Ali'},{cc:'us', code:'US', name:'Los Angeles'},
    {cc:'us', code:'US', name:'Houston'},{cc:'br', code:'BR', name:'Santos'},
    {cc:'za', code:'ZA', name:'Durban'},{cc:'gb', code:'GB', name:'Felixstowe'},
    {cc:'de', code:'DE', name:'Hamburg'},{cc:'nl', code:'NL', name:'Rotterdam'},
    {cc:'jp', code:'JP', name:'Yokohama'},{cc:'kr', code:'KR', name:'Busan'},
    {cc:'hk', code:'HK', name:'Hong Kong'},{cc:'in', code:'IN', name:'Mumbai'},
    {cc:'pa', code:'PA', name:'Balboa'},{cc:'eg', code:'EG', name:'Port Said'}
  ];
  const NAVS = ['Underway Using Engine','Under Sail','At Anchor','Moored','Restricted Maneuverability'];
  const POLICIES = ['Liability','Hull & Machinery','Cargo','War Risks','P&I'];
  // Anchor routes so vessels look like they're on real sea lanes
  const lanes = [
    [{lat:51,lng:2},{lat:50,lng:-5},{lat:45,lng:-20},{lat:40,lng:-40},{lat:38,lng:-60},{lat:35,lng:-75}], // N. Atl
    [{lat:36,lng:-6},{lat:36,lng:14},{lat:34,lng:25},{lat:31,lng:32},{lat:12,lng:43},{lat:8,lng:77},{lat:1,lng:104}], // Suez-Malacca
    [{lat:22,lng:114},{lat:31,lng:121},{lat:35,lng:139},{lat:20,lng:150},{lat:-10,lng:170},{lat:-35,lng:175}], // E. Asia-SW Pac
    [{lat:33,lng:-118},{lat:20,lng:-140},{lat:10,lng:-160},{lat:-5,lng:170},{lat:-20,lng:155}], // Trans-Pac
    [{lat:-34,lng:18},{lat:-10,lng:40},{lat:5,lng:55},{lat:24,lng:56},{lat:26,lng:56}], // Indian Ocean
    [{lat:-23,lng:-43},{lat:-35,lng:-55},{lat:-48,lng:-60},{lat:-55,lng:-70}], // S. Atl
    [{lat:18,lng:-67},{lat:25,lng:-80},{lat:30,lng:-87},{lat:29,lng:-94}], // Caribbean/Gulf
  ];
  const r = randV(42);
  const list = [];
  let id = 0;
  for (const lane of lanes) {
    const samples = 8 + Math.floor(r()*6);
    for (let i=0; i<samples; i++) {
      const t = r();
      const idx = Math.min(lane.length-2, Math.floor(t * (lane.length-1)));
      const frac = t*(lane.length-1) - idx;
      const a = lane[idx], b = lane[idx+1];
      const lat = a.lat + (b.lat-a.lat)*frac + (r()-0.5)*2.5;
      const lng = a.lng + (b.lng-a.lng)*frac + (r()-0.5)*2.5;
      const heading = Math.atan2(b.lat-a.lat, b.lng-a.lng) * 180/Math.PI;
      const type = types[Math.floor(r()*types.length)];
      // Pick two distinct ports for origin/destination
      const pFrom = PORTS[Math.floor(r()*PORTS.length)];
      let pTo = PORTS[Math.floor(r()*PORTS.length)];
      if (pTo === pFrom) pTo = PORTS[(PORTS.indexOf(pFrom)+1)%PORTS.length];
      const flag = FLAGS[Math.floor(r()*FLAGS.length)];
      const name = NAMES[Math.floor(r()*NAMES.length)];
      const nav = NAVS[Math.floor(r()*NAVS.length)];
      const policy = POLICIES[Math.floor(r()*POLICIES.length)];
      const speed = Math.round((8 + r()*14)*10)/10;       // 8.0–22.0 knots
      const course = Math.round(((heading+360)%360)*10)/10;
      const draught = Math.round((8 + r()*12)*100)/100;   // 8.00–20.00 m
      const maxD  = Math.round((draught+0.4+r()*1.2)*100)/100;
      const durH = 6 + Math.floor(r()*40);                // 6-46h
      const durM = Math.floor(r()*60);
      const distNm = Math.round(200 + r()*1600);
      const adtH = Math.floor(r()*24), adtM = Math.floor(r()*60);
      const adtDay = 1 + Math.floor(r()*28);
      const etaDay = 5 + Math.floor(r()*20);
      const etaH = Math.floor(r()*24), etaM = Math.floor(r()*60);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const adtMonth = months[Math.floor(r()*12)];
      const etaMonth = months[Math.floor(r()*12)];
      const portfolio = PORTFOLIOS[Math.floor(r()*PORTFOLIOS.length)].name;
      const cr = r();
      const compliance = cr > 0.88 ? 'Sanctioned' : cr > 0.7 ? 'Warning' : 'Ok';
      const policyType = POLICY_TYPES[Math.floor(r()*POLICY_TYPES.length)];
      list.push({
        id:++id, lat, lng, heading, type:type.k, color:type.color, portfolio, compliance, policyType,
        name, flag,
        from: pFrom, to: pTo,
        adt: `${String(adtDay).padStart(2,'0')} ${adtMonth}, ${String(adtH).padStart(2,'0')}:${String(adtM).padStart(2,'0')}`,
        eta: `${String(etaDay).padStart(2,'0')} ${etaMonth}, ${String(etaH).padStart(2,'0')}:${String(etaM).padStart(2,'0')}`,
        durH, durM, distNm,
        nav, speed, course, draught, maxD, policy,
        ts: `About ${(r()*5).toFixed(1)} hours ago`,
      });
    }
  }
  return list;
}

// Flag icon helper — ISO 3166-1 alpha-2 code → flagcdn.com image.
// Pass size 'sm' (h-3.5 / list) or 'md' (h-5 / alert row).
function flag(cc, size='sm') {
  if (!cc) return '';
  const h = size === 'md' ? 20 : 14;
  const w = size === 'md' ? 28 : 20;
  return `<img src="https://flagcdn.com/w40/${cc}.png" srcset="https://flagcdn.com/w80/${cc}.png 2x" alt="${cc.toUpperCase()}" width="${w}" height="${h}" class="inline-block rounded-[2px] ring-1 ring-ink-200/80 object-cover" style="width:${w}px;height:${h}px" loading="lazy" />`;
}

function tabs(tabs, active, groupAttr) {
  return `
  <div class="ds-tabs is-stretch" data-tab-group="${groupAttr}">
    <span class="ds-tab-pill is-init" data-tab-pill></span>
    ${tabs.map(t => `
      <button ${groupAttr}="${t}" aria-selected="${t===active}" class="ds-tab" style="font-size:12px; padding:6px 12px;">
        <span class="ds-tab-label">${t}</span>
      </button>
    `).join('')}
  </div>`;
}
function positionTabPills() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.ds-tabs').forEach(group => {
      const pill   = group.querySelector('[data-tab-pill]');
      const active = group.querySelector('.ds-tab[aria-selected="true"]');
      if (!pill || !active) return;
      const gRect = group.getBoundingClientRect();
      const aRect = active.getBoundingClientRect();
      if (!aRect.width) return;
      pill.style.width     = aRect.width + 'px';
      pill.style.transform = `translateX(${aRect.left - gRect.left}px)`;
      requestAnimationFrame(() => pill.classList.remove('is-init'));
    });
  });
}

/* ----------- RENDER + WIRING ----------- */
/* vessel popup (matches designed tooltip) */

}
function vesselTooltipHTML(v) {
  return `<span class="vtip-row"><img class="vtip-flag" src="https://flagcdn.com/w40/${v.flag.cc}.png" srcset="https://flagcdn.com/w80/${v.flag.cc}.png 2x" width="18" height="13" alt="${v.flag.name}" /><span class="vtip-name">${v.name}</span></span><span class="vtip-type">${vesselTypeLabel(v.type)} \u00b7 ${v.flag.name}</span>`;
}
function vesselPopupHTML(v) {
  const typeLabel = vesselTypeLabel(v.type);
  const latStr = `${v.lat.toFixed(2)}${v.lat>=0?'N':'S'}`;
  const lngStr = `${Math.abs(v.lng).toFixed(2)}${v.lng>=0?'E':'W'}`;
  const flagImg = `<img src="https://flagcdn.com/w40/${v.flag.cc}.png" srcset="https://flagcdn.com/w80/${v.flag.cc}.png 2x" width="18" height="13" alt="${v.flag.name}" style="display:inline-block;border-radius:2px;vertical-align:middle;margin-right:4px;" />`;
  const fromFlag = `<img src="https://flagcdn.com/w40/${v.from.cc}.png" width="16" height="12" alt="" style="display:inline-block;border-radius:2px;margin-right:4px;vertical-align:middle;" />`;
  const toFlag = `<img src="https://flagcdn.com/w40/${v.to.cc}.png" width="16" height="12" alt="" style="display:inline-block;border-radius:2px;margin-right:4px;vertical-align:middle;" />`;
  return `
  <div class="vp">
    <div class="vp-header">
      <div class="vp-header-main">
        <div class="vp-title">${fromFlag}${v.name}</div>
        <div class="vp-subtitle">${typeLabel}</div>
      </div>
    </div>
    <div class="vp-route">
      <div class="vp-port">
        <div class="vp-port-code">${v.from.code}</div>
        <div class="vp-port-name">${v.from.name}</div>
        <div class="vp-port-time">ADT: ${v.adt}</div>
      </div>
      <div class="vp-arrow">→</div>
      <div class="vp-port vp-port-right">
        <div class="vp-port-code">${v.to.code}</div>
        <div class="vp-port-name">${v.to.name}</div>
        <div class="vp-port-time">ETA (UTC): ${v.eta}</div>
      </div>
    </div>
    <div class="vp-grid">
      <div><div class="vp-k">Estimated Duration:</div><div class="vp-v">${v.durH}h ${v.durM}m</div></div>
      <div><div class="vp-k">Distance:</div><div class="vp-v">${v.distNm} nm</div></div>
      <div><div class="vp-k">Lat/Lng:</div><div class="vp-v vp-strong">${latStr} /<br>${lngStr}</div></div>
      <div><div class="vp-k">Flag:</div><div class="vp-v">${flagImg}${v.flag.name}</div></div>
      <div class="vp-span"><div class="vp-k">Nav status:</div><div class="vp-v vp-nav">${v.nav}</div></div>
      <div><div class="vp-k">Speed (Knots):</div><div class="vp-v"><span class="vp-strong">${v.speed}</span> Knots</div></div>
      <div><div class="vp-k">Course over ground:</div><div class="vp-v">${v.course}</div></div>
      <div><div class="vp-k">Draught (m):</div><div class="vp-v"><span class="vp-strong">${v.draught.toFixed(2)}</span><br><span class="vp-muted">(max ${v.maxD.toFixed(2)})</span></div></div>
      <div><div class="vp-k">Heading (deg):</div><div class="vp-v">${Math.round(v.course)}</div></div>
      <div class="vp-span"><div class="vp-k">Timestamp:</div><div class="vp-v">${v.ts}</div></div>
      <div class="vp-span"><div class="vp-k">Policy Type:</div><div class="vp-v vp-strong">${v.policy}</div></div>
    </div>
    <a href="VesselDetails.html" class="vp-cta" style="text-decoration:none; text-align:center;">View Full Vessel Details</a>
  </div>`;
}

let mapInstance = null;

function vesselIcon(color, heading, nav) {
  // Stationary vessels (Moored / At Anchor) are drawn as a circle with no heading rotation.
  const stationary = nav === 'Moored' || nav === 'At Anchor';
  const shape = stationary
    ? `<svg viewBox="0 0 24 24" width="16" height="16" style="color:${color};" fill="currentColor" stroke="#fff" stroke-width="1.5"><circle cx="12" cy="12" r="7.5"/></svg>`
    : `<svg viewBox="0 0 24 24" width="16" height="16" style="color:${color};" fill="currentColor" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"><path d="M12 2 L19 20 L12 16 L5 20 Z"/></svg>`;
  // Filter-menu shape: a teardrop (rotated 45deg). Rotate by heading + 45 so heading 0 points east.
  const rot = stationary ? '' : `transform: rotate(${heading + 45}deg); transform-origin: center;`;
  const html = `<div class="vessel-marker" style="${rot}">${shape}</div>`;
  return L.divIcon({ html, className:'', iconSize:[16,16], iconAnchor:[8,8] });
}

function labelIcon(name) {
  const html = `<div class="vessel-label">${name}</div>`;
  return L.divIcon({ html, className:'vessel-label-wrap', iconSize:[0,0], iconAnchor:[-10, 7] });
}

function initMap() {
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
  const map = L.map('marine-map', {
    center: [25, 10], zoom: 2, minZoom: 2, maxZoom: 7,
    worldCopyJump: true, zoomControl: true, attributionControl: true,
  });
  mapInstance = map;
  // Tile layer options (Satellite default; Street via OSM; Dark via CartoDB).
  const TILES = {
    satellite: {
      url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      attr: 'Tiles © Esri — Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
    },
    street: {
      url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      attr: '© OpenStreetMap contributors',
    },
    dark: {
      url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      attr: '© OpenStreetMap contributors © CARTO',
    },
    light: {
      url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
      attr: '© OpenStreetMap contributors © CARTO',
    },
  };
  let currentTileLayer = L.tileLayer(TILES.satellite.url, { attribution: TILES.satellite.attr, maxZoom: 19 }).addTo(map);
  let currentType = 'satellite';

  function setMapType(type) {
    if (type === currentType || !TILES[type]) return;
    if (currentTileLayer) map.removeLayer(currentTileLayer);
    currentTileLayer = L.tileLayer(TILES[type].url, { attribution: TILES[type].attr, maxZoom: 19 }).addTo(map);
    currentType = type;
    // Re-sync background color for gaps between tiles
    document.getElementById('marine-map').style.background =
      type === 'street' ? '#e2e8f0' :
      type === 'dark'   ? '#0b0f1a' :
      type === 'light'  ? '#f1f5f9' : '#0b1e2e';
    // Update menu active state (checkmark + bold label)
    document.querySelectorAll('[data-map-type]').forEach(b => {
      const isOn = b.dataset.mapType === type;
      const lbl   = b.querySelector('[data-label]');
      const check = b.querySelector('[data-check]');
      if (lbl)   { lbl.style.color = isOn ? '#2563eb' : '#334155'; lbl.style.fontWeight = isOn ? '600' : '500'; }
      if (check) { check.style.opacity = isOn ? '1' : '0'; }
    });
  }
  setTimeout(() => setMapType('satellite'), 0); // prime active state

  const vessels = makeVessels();
  const vesselMarkers = [];
  const labelMarkers  = [];
  vessels.forEach(v => {
    const m = L.marker([v.lat, v.lng], { icon: vesselIcon(v.color, v.heading, v.nav) })
      .bindPopup(vesselPopupHTML(v), { className:'vessel-popup', maxWidth: 320, minWidth: 300, closeButton:true, autoPanPadding:[30,30] })
      .bindTooltip(vesselTooltipHTML(v), { className:'vessel-tip', direction:'top', offset:[0,-12], opacity:1 });
    m._vtype = v.type;
    m._portfolio = v.portfolio;
    m._compliance = v.compliance;
    m._policyType = v.policyType;
    m._tipHTML = vesselTooltipHTML(v);
    m.addTo(map);
    vesselMarkers.push(m);

    const lbl = L.marker([v.lat, v.lng], { icon: labelIcon(v.name), interactive:false, keyboard:false });
    lbl._vtype = v.type;
    lbl._portfolio = v.portfolio;
    lbl._compliance = v.compliance;
    lbl._policyType = v.policyType;
    labelMarkers.push(lbl);
  });

  // Keep the selection ring visible on the marker whose popup is open
  map.on('popupopen', e => {
    const m = e.popup && e.popup._source;
    if (m && m._icon) m._icon.classList.add('is-selected');
  });
  map.on('popupclose', e => {
    const m = e.popup && e.popup._source;
    if (m && m._icon) m._icon.classList.remove('is-selected');
  });

  function applyVesselFilter() {
    vesselMarkers.forEach(m => {
      const show = state.vesselFilter.has(m._vtype) && state.portfolioFilter.has(m._portfolio) && state.complianceFilter.has(m._compliance) && state.policyTypeFilter.has(m._policyType);
      if (show && !map.hasLayer(m)) m.addTo(map);
      if (!show && map.hasLayer(m)) map.removeLayer(m);
    });
    applyLabels();
  }
  // Labels only appear at the 3rd-highest zoom level and above (maxZoom 7 → 5, 6, 7).
  const LABEL_MIN_ZOOM = 5;
  function applyLabels() {
    const zoomOK = map.getZoom() >= LABEL_MIN_ZOOM;
    labelMarkers.forEach(lbl => {
      const shouldShow = state.showLabels && zoomOK && state.vesselFilter.has(lbl._vtype) && state.portfolioFilter.has(lbl._portfolio) && state.complianceFilter.has(lbl._compliance) && state.policyTypeFilter.has(lbl._policyType);
      if (shouldShow && !map.hasLayer(lbl)) lbl.addTo(map);
      if (!shouldShow && map.hasLayer(lbl)) map.removeLayer(lbl);
    });
    // Suppress hover tooltips only while labels are actually visible on the map
    const labelsVisible = state.showLabels && zoomOK;
    vesselMarkers.forEach(m => {
      if (labelsVisible) {
        if (m.getTooltip()) m.unbindTooltip();
      } else if (!m.getTooltip() && m._tipHTML) {
        m.bindTooltip(m._tipHTML, { className:'vessel-tip', direction:'top', offset:[0,-12], opacity:1 });
      }
    });
  }
  // Re-evaluate label visibility whenever the zoom level changes.
  map.on('zoomend', applyLabels);

  // Swap Leaflet's default "+/−" text glyphs for Lucide Plus/Minus icons.
  const zin = document.querySelector('.leaflet-control-zoom-in');
  const zout = document.querySelector('.leaflet-control-zoom-out');
  if (zin)  zin.innerHTML  = `<span class="inline-flex items-center justify-center h-full w-full">${Ico.plus}</span>`;
  if (zout) zout.innerHTML = `<span class="inline-flex items-center justify-center h-full w-full">${Ico.minus}</span>`;

  // Fullscreen toggle — expand the map card to fill the viewport
  const fsBtn = document.getElementById('map-fullscreen');
  const container = document.getElementById('map-container');
  if (fsBtn && container) {
    fsBtn.onclick = () => {
      const isFs = container.classList.toggle('is-fullscreen');
      fsBtn.innerHTML = isFs ? Ico.minimize : Ico.maximize;
      fsBtn.title = isFs ? 'Exit fullscreen' : 'Toggle fullscreen';
      document.body.style.overflow = isFs ? 'hidden' : '';
      setTimeout(() => map.invalidateSize(), 260);
    };
    // Esc to exit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && container.classList.contains('is-fullscreen')) fsBtn.onclick();
    });
  }

  // Layers menu
  const layersBtn  = document.getElementById('map-layers-btn');
  const layersMenu = document.getElementById('map-layers-menu');
  if (layersBtn && layersMenu) {
    layersBtn.onclick = (e) => { e.stopPropagation(); layersMenu.classList.toggle('hidden'); filtersMenu && filtersMenu.classList.add('hidden'); pfMenu && pfMenu.classList.add('hidden'); csMenu && csMenu.classList.add('hidden'); ptMenu && ptMenu.classList.add('hidden'); };
    layersMenu.querySelectorAll('[data-map-type]').forEach(opt => {
      opt.onclick = (e) => { e.stopPropagation(); setMapType(opt.dataset.mapType); layersMenu.classList.add('hidden'); };
    });
  }

  // Filters menu
  const filtersBtn  = document.getElementById('map-filters-btn');
  const filtersMenu = document.getElementById('map-filters-menu');
  function syncFilterUI() {
    filtersMenu.querySelectorAll('.vf-row').forEach(row => {
      const on = state.vesselFilter.has(row.dataset.vtype);
      row.querySelector('.vf-cb').checked = on;
    });
  }
  if (filtersBtn && filtersMenu) {
    filtersBtn.onclick = (e) => { e.stopPropagation(); filtersMenu.classList.toggle('hidden'); layersMenu && layersMenu.classList.add('hidden'); pfMenu && pfMenu.classList.add('hidden'); csMenu && csMenu.classList.add('hidden'); ptMenu && ptMenu.classList.add('hidden'); };
    filtersMenu.querySelectorAll('.vf-row').forEach(row => {
      row.onclick = (e) => {
        e.stopPropagation();
        const t = row.dataset.vtype;
        if (state.vesselFilter.has(t)) state.vesselFilter.delete(t); else state.vesselFilter.add(t);
        syncFilterUI(); applyVesselFilter();
      };
    });
    const allBtn  = document.getElementById('vf-all');
    const noneBtn = document.getElementById('vf-none');
    if (allBtn)  allBtn.onclick  = (e) => { e.stopPropagation(); state.vesselFilter = new Set(VESSEL_TYPES.map(t=>t.k)); syncFilterUI(); applyVesselFilter(); };
    if (noneBtn) noneBtn.onclick = (e) => { e.stopPropagation(); state.vesselFilter = new Set();                        syncFilterUI(); applyVesselFilter(); };
  }

  // Portfolio filter menu
  const pfBtn  = document.getElementById('map-portfolio-btn');
  const pfMenu = document.getElementById('map-portfolio-menu');
  function syncPortfolioUI() {
    pfMenu.querySelectorAll('.pf-row').forEach(row => {
      row.querySelector('.pf-cb').checked = state.portfolioFilter.has(row.dataset.portfolio);
    });
  }
  if (pfBtn && pfMenu) {
    pfBtn.onclick = (e) => {
      e.stopPropagation();
      pfMenu.classList.toggle('hidden');
      layersMenu && layersMenu.classList.add('hidden');
      filtersMenu && filtersMenu.classList.add('hidden');
      csMenu && csMenu.classList.add('hidden');
      ptMenu && ptMenu.classList.add('hidden');
    };
    pfMenu.querySelectorAll('.pf-row').forEach(row => {
      row.onclick = (e) => {
        e.stopPropagation();
        const p = row.dataset.portfolio;
        if (state.portfolioFilter.has(p)) state.portfolioFilter.delete(p); else state.portfolioFilter.add(p);
        syncPortfolioUI(); applyVesselFilter();
      };
    });
    const pfAll  = document.getElementById('pf-all');
    const pfNone = document.getElementById('pf-none');
    if (pfAll)  pfAll.onclick  = (e) => { e.stopPropagation(); state.portfolioFilter = new Set(PORTFOLIOS.map(p=>p.name)); syncPortfolioUI(); applyVesselFilter(); };
    if (pfNone) pfNone.onclick = (e) => { e.stopPropagation(); state.portfolioFilter = new Set();                          syncPortfolioUI(); applyVesselFilter(); };
  }

  // Compliance filter menu
  const csBtn  = document.getElementById('map-compliance-btn');
  const csMenu = document.getElementById('map-compliance-menu');
  function syncComplianceUI() {
    csMenu.querySelectorAll('.cs-row').forEach(row => {
      row.querySelector('.cs-cb').checked = state.complianceFilter.has(row.dataset.compliance);
    });
  }
  if (csBtn && csMenu) {
    csBtn.onclick = (e) => {
      e.stopPropagation();
      csMenu.classList.toggle('hidden');
      layersMenu && layersMenu.classList.add('hidden');
      filtersMenu && filtersMenu.classList.add('hidden');
      pfMenu && pfMenu.classList.add('hidden');
      ptMenu && ptMenu.classList.add('hidden');
    };
    csMenu.querySelectorAll('.cs-row').forEach(row => {
      row.onclick = (e) => {
        e.stopPropagation();
        const s = row.dataset.compliance;
        if (state.complianceFilter.has(s)) state.complianceFilter.delete(s); else state.complianceFilter.add(s);
        syncComplianceUI(); applyVesselFilter();
      };
    });
    const csAll  = document.getElementById('cs-all');
    const csNone = document.getElementById('cs-none');
    if (csAll)  csAll.onclick  = (e) => { e.stopPropagation(); state.complianceFilter = new Set(['Ok','Warning','Sanctioned']); syncComplianceUI(); applyVesselFilter(); };
    if (csNone) csNone.onclick = (e) => { e.stopPropagation(); state.complianceFilter = new Set();                              syncComplianceUI(); applyVesselFilter(); };
  }

  // Policy type filter menu
  const ptBtn  = document.getElementById('map-policy-btn');
  const ptMenu = document.getElementById('map-policy-menu');
  function syncPolicyUI() {
    ptMenu.querySelectorAll('.pt-row').forEach(row => {
      row.querySelector('.pt-cb').checked = state.policyTypeFilter.has(row.dataset.policy);
    });
  }
  if (ptBtn && ptMenu) {
    ptBtn.onclick = (e) => {
      e.stopPropagation();
      ptMenu.classList.toggle('hidden');
      layersMenu && layersMenu.classList.add('hidden');
      filtersMenu && filtersMenu.classList.add('hidden');
      pfMenu && pfMenu.classList.add('hidden');
      csMenu && csMenu.classList.add('hidden');
    };
    ptMenu.querySelectorAll('.pt-row').forEach(row => {
      row.onclick = (e) => {
        e.stopPropagation();
        const p = row.dataset.policy;
        if (state.policyTypeFilter.has(p)) state.policyTypeFilter.delete(p); else state.policyTypeFilter.add(p);
        syncPolicyUI(); applyVesselFilter();
      };
    });
    const ptAll  = document.getElementById('pt-all');
    const ptNone = document.getElementById('pt-none');
    if (ptAll)  ptAll.onclick  = (e) => { e.stopPropagation(); state.policyTypeFilter = new Set(POLICY_TYPES); syncPolicyUI(); applyVesselFilter(); };
    if (ptNone) ptNone.onclick = (e) => { e.stopPropagation(); state.policyTypeFilter = new Set();            syncPolicyUI(); applyVesselFilter(); };
  }

  // Labels menu
  const labelsBtn  = document.getElementById('map-labels-btn');
  const labelsMenu = document.getElementById('map-labels-menu');
  const labelsSw   = document.getElementById('labels-toggle');
  function syncLabelsUI() {
    if (!labelsSw) return;
    const on = !!state.showLabels;
    labelsSw.setAttribute('aria-checked', on ? 'true' : 'false');
    labelsSw.style.backgroundColor = on ? '#2563eb' : '#cbd5e1';
    const knob = labelsSw.querySelector('span');
    if (knob) knob.style.transform = on ? 'translateX(22px)' : 'translateX(2px)';
  }
  syncLabelsUI();
  if (labelsBtn && labelsMenu) {
    labelsBtn.onclick = (e) => {
      e.stopPropagation();
      labelsMenu.classList.toggle('hidden');
      layersMenu && layersMenu.classList.add('hidden');
      filtersMenu && filtersMenu.classList.add('hidden');
      pfMenu && pfMenu.classList.add('hidden');
      csMenu && csMenu.classList.add('hidden');
      ptMenu && ptMenu.classList.add('hidden');
    };
    if (labelsSw) labelsSw.onclick = (e) => {
      e.stopPropagation();
      state.showLabels = !state.showLabels;
      syncLabelsUI(); applyLabels();
    };
  }

  // Dismiss popovers on outside click
  document.addEventListener('click', (e) => {
    if (layersMenu  && !layersMenu.contains(e.target)  && e.target !== layersBtn  && !(layersBtn  && layersBtn.contains(e.target)))  layersMenu.classList.add('hidden');
    if (filtersMenu && !filtersMenu.contains(e.target) && e.target !== filtersBtn && !(filtersBtn && filtersBtn.contains(e.target))) filtersMenu.classList.add('hidden');
    if (labelsMenu  && !labelsMenu.contains(e.target)  && e.target !== labelsBtn  && !(labelsBtn  && labelsBtn.contains(e.target)))  labelsMenu.classList.add('hidden');
    if (pfMenu      && !pfMenu.contains(e.target)      && e.target !== pfBtn      && !(pfBtn      && pfBtn.contains(e.target)))      pfMenu.classList.add('hidden');
    if (csMenu      && !csMenu.contains(e.target)      && e.target !== csBtn      && !(csBtn      && csBtn.contains(e.target)))      csMenu.classList.add('hidden');
    if (ptMenu      && !ptMenu.contains(e.target)      && e.target !== ptBtn      && !(ptBtn      && ptBtn.contains(e.target)))      ptMenu.classList.add('hidden');
  });
}

window.render = function render() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col">
      ${SC.Topbar()}
      <main class="flex-1 overflow-y-auto scroll-thin bg-ink-100">${Content()}</main>
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  const wireTab = (attr, stateKey) => {
    document.querySelectorAll(`[${attr}]`).forEach(b => b.onclick = () => {
      const v = b.getAttribute(attr);
      if (state[stateKey] === v) return;
      state[stateKey] = v;
      const group = b.closest('.ds-tabs');
      if (group) {
        group.querySelectorAll('.ds-tab').forEach(t => t.setAttribute('aria-selected', String(t === b)));
        positionTabPills();
        setTimeout(() => render(), 220);
      } else { render(); }
    });
  };
  wireTab('data-portfolio-tab', 'portfolioTab');
  wireTab('data-region-tab',    'regionTab');
  wireTab('data-alert-tab',     'alertTab');

  /* Group expand/collapse */
  document.querySelectorAll('[data-group-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      const gi = parseInt(btn.dataset.groupIdx);
      if (state.expandedGroups.has(gi)) state.expandedGroups.delete(gi);
      else state.expandedGroups.add(gi);
      render();
    });
  });

  /* Portfolio name → details page */
  document.querySelectorAll('[data-pf-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.pfIdx);
      const p   = PORTFOLIOS[idx];
      sessionStorage.setItem('selectedPortfolio', JSON.stringify({
        name: p.name, policies: p.policies, exposure: p.exposure,
        activePolicies: Math.round(p.policies * 0.97),
        id: 'PF' + String(idx + 1).padStart(4,'0') + 'MAR',
      }));
      location.href = 'MarinePortfolioDetails.html';
    });
  });
  requestAnimationFrame(positionTabPills);
  window.addEventListener('resize', positionTabPills, { passive: true });
  // init map (deferred so container has size)
  setTimeout(initMap, 50);
};
window.render();
</script>
</body>
</html>
