function svg(path, size = 16, sw = 1.9) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
}
function flag(cc) {
  return `<img src="https://flagcdn.com/w40/${cc}.png" srcset="https://flagcdn.com/w80/${cc}.png 2x" alt="${cc.toUpperCase()}" width="20" height="14" class="inline-block rounded-[2px] ring-1 ring-ink-200 object-cover align-middle" style="width:20px;height:14px" loading="lazy" />`;
}
/* Sortable table helpers (Port Calls / Region tabs) */
function parseDur(s) {
  let m = 0; const d = /(\d+)d/.exec(s), h = /(\d+)h/.exec(s), mm = /(\d+)m\b/.exec(s);
  if (d) m += +d[1] * 1440; if (h) m += +h[1] * 60; if (mm) m += +mm[1];
  return m;
}
function sortHead(label, key, grp, opts = {}) {
  const s = state.sort[grp], active = s.key === key;
  const upPath = '<path d="M8 14l4-4 4 4"/>', downPath = '<path d="M8 10l4 4 4-4"/>';
  const ico = active ? svg(s.dir > 0 ? upPath : downPath, 13, 2.4) : svg(IC.sort, 13, 2);
  return `<th><button class="th-in" data-sort-grp="${grp}" data-sort-key="${key}" style="background:none;border:0;font:inherit;color:inherit;cursor:pointer;padding:0;text-transform:uppercase;letter-spacing:.04em;font-size:11px;font-weight:600;color:${active ? '#374151' : '#6b7280'};">${label} <span class="sort-ico inline-flex items-center" style="opacity:${active ? '1' : '.7'}">${ico}</span></button></th>`;
}
function vhSort(rows, grp, numKeys = [], durKeys = []) {
  const s = state.sort[grp];
  if (!s.key) return rows;
  return [...rows].sort((a, b) => {
    let x = a[s.key], y = b[s.key];
    if (numKeys.includes(s.key)) { x = parseFloat(x) || 0; y = parseFloat(y) || 0; }
    else if (durKeys.includes(s.key)) { x = parseDur(x); y = parseDur(y); }
    const c = (typeof x === 'number') ? x - y : String(x).localeCompare(String(y));
    return c * s.dir;
  });
}

function positionTabPills() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.ds-tabs').forEach(group => {
      const pill = group.querySelector('[data-tab-pill]');
      const active = group.querySelector('.ds-tab[aria-selected="true"]');
      if (!pill || !active) return;
      const g = group.getBoundingClientRect(), a = active.getBoundingClientRect();
      if (!a.width) return;
      pill.style.width = a.width + 'px';
      pill.style.transform = `translateX(${a.left - g.left}px)`;
      requestAnimationFrame(() => pill.classList.remove('is-init'));
    });
  });
}

/* ===================== DONUT ===================== */
function donut(d) {
  const total = d.segs.reduce((s, x) => s + x.v, 0);
  const size = 160, cx = 80, cy = 80, rO = 74, rI = 49, gap = 2.2;
  const polar = (r, deg) => [cx + r * Math.sin(deg * Math.PI / 180), cy - r * Math.cos(deg * Math.PI / 180)];
  let acc = 0;
  const segs = d.segs.map((s) => {
    const a0 = acc / total * 360, a1 = (acc + s.v) / total * 360;
    acc += s.v;
    const pct = Math.round(s.v / total * 100);
    const s0 = a0 + gap, s1 = a1 - gap;
    const [ox0, oy0] = polar(rO, s0), [ox1, oy1] = polar(rO, s1);
    const [ix1, iy1] = polar(rI, s1), [ix0, iy0] = polar(rI, s0);
    const large = (s1 - s0) > 180 ? 1 : 0;
    const path = `M ${ox0.toFixed(2)} ${oy0.toFixed(2)} A ${rO} ${rO} 0 ${large} 1 ${ox1.toFixed(2)} ${oy1.toFixed(2)} L ${ix1.toFixed(2)} ${iy1.toFixed(2)} A ${rI} ${rI} 0 ${large} 0 ${ix0.toFixed(2)} ${iy0.toFixed(2)} Z`;
    const [lx, ly] = polar((rO + rI) / 2, (a0 + a1) / 2);
    const label = pct >= 6 ? `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="10" font-weight="700" style="pointer-events:none;font-family:Inter,sans-serif;">${pct}%</text>` : '';
    const tip = `voySeg(event,'${s.l}',${pct},'${s.c}')`;
    return `<path class="voy-seg" d="${path}" fill="${s.c}" onmouseenter="${tip}" onmousemove="voyMove(event)" onmouseleave="voyHide()"></path>${label}`;
  }).join('');
  return `
  <div class="flex flex-col items-center gap-1">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="${d.year} activity breakdown">
      ${segs}
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" class="font-display" style="font-size:22px;font-weight:700;fill:#111827;">${d.year}</text>
    </svg>
  </div>`;
}
/* Donut segment tooltip */
function voyTipEl() {
  let t = document.getElementById('voy-tip');
  if (!t) { t = document.createElement('div'); t.id = 'voy-tip'; t.className = 'voy-tip'; document.body.appendChild(t); }
  return t;
}
function voySeg(e, label, pct, color) {
  const t = voyTipEl();
  t.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${color};margin-right:7px;vertical-align:middle;"></span><span style="vertical-align:middle;">${label} · <strong>${pct}%</strong></span>`;
  t.style.opacity = '1';
  voyMove(e);
}
function voyMove(e) { const t = voyTipEl(); t.style.left = e.clientX + 'px'; t.style.top = (e.clientY - 14) + 'px'; }
function voyHide() { const t = document.getElementById('voy-tip'); if (t) t.style.opacity = '0'; }
window.voySeg = voySeg; window.voyMove = voyMove; window.voyHide = voyHide;
function legend() {
  const item = (label, color) => `
    <div class="flex items-center gap-2">
      <span style="width:11px;height:11px;border-radius:3px;background:${color};display:inline-block;"></span>
      <span class="text-xs font-medium text-ink-700">${label}</span>
    </div>`;
  return `<div class="flex items-center justify-center gap-7 mt-4">
    ${item('Port Visit', CAT.portVisit)}${item('Loitering', CAT.loitering)}${item('Traveling', CAT.traveling)}
  </div>`;
}
/* Grouped vertical bars — one group per year, a bar per category side by side */
function bar(d) {
  const total = d.segs.reduce((s, x) => s + x.v, 0);
  const H = 180;
  const bars = d.segs.map((s) => {
    const pct = Math.round(s.v / total * 100);
    const hh = Math.max(4, s.v / total * H);
    return `
      <div class="flex flex-col items-center justify-end" style="height:${H}px;">
        <span style="font-size:10px;font-weight:700;color:#374151;margin-bottom:3px;">${pct}%</span>
        <div class="voy-seg" style="width:22px;height:${hh.toFixed(1)}px;background:${s.c};border-radius:4px 4px 0 0;"
          onmouseenter="voySeg(event,'${s.l}',${pct},'${s.c}')" onmousemove="voyMove(event)" onmouseleave="voyHide()"></div>
      </div>`;
  }).join('');
  return `
  <div class="flex flex-col items-center gap-2">
    <div class="flex items-end gap-3" style="height:${H}px;">${bars}</div>
    <span class="font-display" style="font-size:16px;font-weight:700;color:#111827;">${d.year}</span>
  </div>`;
}

/* ===================== MAP ===================== */
let map = null, tileLayer = null;
const MAP_TYPES = {
  street:    { url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', sub:'abcd' },
  satellite: { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', sub:'abc' },
  light:     { url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', sub:'abcd' },
  dark:      { url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', sub:'abcd' },
};
let currentMapType = 'street';
function setMapType(type) {
  if (!map || !MAP_TYPES[type]) return;
  currentMapType = type;
  if (tileLayer) map.removeLayer(tileLayer);
  const t = MAP_TYPES[type];
  tileLayer = L.tileLayer(t.url, { maxZoom:19, subdomains:t.sub, attribution:'' }).addTo(map);
  document.querySelectorAll('[data-map-type]').forEach(b => {
    const chk = b.querySelector('[data-check]'); if (chk) chk.style.opacity = b.dataset.mapType === type ? '1' : '0';
  });
}
function initMap() {
  const c = document.getElementById('voyage-map');
  if (!c) return;
  if (map) {
    if (!document.body.contains(map.getContainer())) { map.remove(); map = null; }
    else { map.invalidateSize(); return; }
  }
  const current = [8.5667, 76.8833];   // current position (off SW India)
  map = L.map(c, { center: current, zoom: 4, zoomControl:true, scrollWheelZoom:true, attributionControl:false });
  setMapType('street');
  const singapore = [1.29, 103.85], rotterdam = [51.95, 4.14];
  // Travelled (solid) Singapore → current
  L.polyline([singapore, [6.0, 95.0], [7.0, 82.0], current], { color:'#2d7ffb', weight:3, opacity:0.9 }).addTo(map);
  // Remaining (dashed) current → Rotterdam
  L.polyline([current, [12.0, 60.0], [12.5, 43.0], [30.0, 32.5], [37.0, 11.0], rotterdam], { color:'#2d7ffb', weight:2.5, opacity:0.7, dashArray:'7 6' }).addTo(map);
  const pin = (color) => L.divIcon({ className:'', html:`<div style="width:11px;height:11px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`, iconSize:[11,11], iconAnchor:[5,5] });
  L.marker(singapore, { icon:pin('#475569') }).addTo(map).bindPopup('Singapore (departure)');
  L.marker(rotterdam, { icon:pin('#111827') }).addTo(map).bindPopup('Rotterdam (destination)');
  const vesselIcon = L.divIcon({ className:'', html:`<div style="width:15px;height:15px;background:var(--brand-600,#2d7ffb);border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(45,127,251,.6)"></div>`, iconSize:[15,15], iconAnchor:[7,7] });
  const popHtml = `
    <div class="vp">
      <div class="vp-header">
        <div class="vp-header-main">
          <div class="vp-title">${flag('es')} FRESH BREEZE</div>
          <div class="vp-subtitle">Crude Oil Tanker · En Route</div>
        </div>
      </div>
      <div class="vp-grid">
        <div class="vp-span"><div class="vp-k">Completed:</div><div class="vp-v vp-strong">2,847 nm (35%)</div></div>
        <div><div class="vp-k">Avg Speed:</div><div class="vp-v"><span class="vp-strong">14.2</span> Knots</div></div>
        <div><div class="vp-k">Current Speed:</div><div class="vp-v"><span class="vp-strong">15.1</span> Knots</div></div>
        <div><div class="vp-k">Latitude:</div><div class="vp-v vp-strong">8.5667°N</div></div>
        <div><div class="vp-k">Longitude:</div><div class="vp-v vp-strong">76.8833°E</div></div>
      </div>
    </div>`;
  const vesselMarker = L.marker(current, { icon:vesselIcon })
    .addTo(map)
    .bindPopup(popHtml, { autoClose:false, closeOnClick:false, offset:[0,-4], className:'vessel-popup', maxWidth:320, minWidth:290 });
  map.fitBounds([singapore, rotterdam], { paddingTopLeft:[60,70], paddingBottomRight:[60,150] });
  // Open the vessel popup by default once the map has settled
  setTimeout(() => { if (map && document.body.contains(map.getContainer())) vesselMarker.openPopup(); }, 250);
  // Layers menu
  const lb = document.getElementById('map-layers-btn'), lm = document.getElementById('map-layers-menu');
  if (lb && lm) {
    lb.onclick = (e) => { e.stopPropagation(); lm.classList.toggle('hidden'); };
    lm.querySelectorAll('[data-map-type]').forEach(b => b.onclick = (e) => { e.stopPropagation(); setMapType(b.dataset.mapType); lm.classList.add('hidden'); });
    document.addEventListener('click', () => lm.classList.add('hidden'));
  }
}

  SC.wireChrome();

  // Tabs
  document.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => {
    const v = b.getAttribute('data-tab');
    if (state.tab === v) return;
    state.tab = v;
    const group = b.closest('.ds-tabs');
    group.querySelectorAll('.ds-tab').forEach(t => t.setAttribute('aria-selected', String(t === b)));
    positionTabPills();
    setTimeout(render, 200);
  });

  // Chart toggle
  const ct = document.getElementById('chart-toggle');
  if (ct) ct.onclick = () => { state.chartType = state.chartType === 'bar' ? 'donut' : 'bar'; render(); };

  // Details show/hide toggle
  const dt = document.getElementById('details-toggle');
  if (dt) dt.onclick = () => { state.showDetails = !state.showDetails; render(); };

  // Sortable table headers (Port Calls / Region tabs)
  document.querySelectorAll('[data-sort-grp]').forEach(b => b.onclick = () => {
    const grp = b.dataset.sortGrp, key = b.dataset.sortKey, s = state.sort[grp];
    if (s.key === key) s.dir *= -1; else { s.key = key; s.dir = 1; }
    render();
  });

  // Event search — live filter without full re-render (keeps focus)
  const si = document.getElementById('event-search');
  if (si) {
    si.oninput = () => {
      state.search = si.value;
      const q = si.value.trim().toLowerCase();
      let shown = 0;
      document.querySelectorAll('[data-event-row]').forEach(row => {
        const match = !q || row.getAttribute('data-search').includes(q);
        row.style.display = match ? '' : 'none';
        if (match) shown++;
      });
      const cnt = document.getElementById('events-count');
      if (cnt) cnt.textContent = `${shown} total items`;
    };
  }
  const pp = document.getElementById('per-page');
  if (pp) pp.onchange = () => { state.perPage = parseInt(pp.value); };

  requestAnimationFrame(positionTabPills);
  window.addEventListener('resize', positionTabPills, { passive:true });
  setTimeout(initMap, 60);
};
window.render();
</script>
</body>
</html>
