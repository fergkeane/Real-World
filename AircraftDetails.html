<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aircraft Details — Aviation — Real World</title>
<!-- v2 -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body { font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .text-ink-900{color:#0f172a}.text-ink-700{color:#334155}
  .text-ink-600{color:#475569}.text-ink-500{color:#64748b}.text-ink-400{color:#94a3b8}
  .bg-ink-100{background:#f1f5f9}.bg-ink-50{background:#f8fafc}
  .border-ink-100{border-color:#f1f5f9}.border-ink-200{border-color:#e2e8f0}
  .shadow-card{box-shadow:0 1px 2px rgba(15,23,42,.08),0 0 0 1px rgba(15,23,42,.02)}
  .text-brand-600{color:#2563eb}
  .scroll-thin::-webkit-scrollbar{width:5px}
  .scroll-thin::-webkit-scrollbar-track{background:transparent}
  .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
  .scroll-thin::-webkit-scrollbar-thumb:hover{background:#94a3b8}
  .tracking-micro{letter-spacing:0.04em}
  /* Map */
  #aircraft-map{position:absolute;inset:0;background:#0b1e2e}
  #aircraft-map .leaflet-top.leaflet-left{top:56px;left:2px}
  #aircraft-map .leaflet-top.leaflet-left .leaflet-bar{margin-left:10px!important}
  .leaflet-control-zoom,.leaflet-bar{border:1px solid #e2e8f0 !important;box-shadow:0 1px 2px rgba(15,23,42,.08) !important;border-radius:8px !important;overflow:hidden}
  .leaflet-bar a{background:#fff !important;color:#334155 !important;line-height:30px !important}
  .leaflet-bar a:hover{background:#f1f5f9 !important}
  .leaflet-top.leaflet-left{top:48px !important}
  .map-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid #e2e8f0;border-radius:8px;color:#334155;box-shadow:0 1px 2px rgb(15 23 42/.08);cursor:pointer;flex-shrink:0}
  .map-btn:hover{background:#f1f5f9}
  .shadow-card-hover{box-shadow:0 4px 16px rgba(15,23,42,.12),0 0 0 1px rgba(15,23,42,.04)}
  /* Mobile responsive */
  @media(max-width:767px){
    .aircraft-body{flex-direction:column!important;overflow-y:auto!important;}
    .aircraft-left-panel{width:100%!important;min-height:unset!important;border-right:0!important;border-bottom:1px solid #e2e8f0;flex-shrink:0!important;}
    .aircraft-right-panel{min-width:0!important;width:100%!important;}
    .dep-arr-grid{grid-template-columns:1fr!important;}
    .spec-grid{grid-template-columns:1fr 1fr!important;}
  }
  /* Spec grid */
  .spec-grid{display:grid;grid-template-columns:repeat(3,1fr)}
  .spec-cell{padding:11px 16px;border-bottom:1px solid #f1f5f9}
  .spec-cell:not(:nth-child(3n)){border-right:1px solid #f1f5f9}
  .spec-label{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .spec-value{font-size:13px;font-weight:600;color:#0f172a}
  /* Info grid */
  .info-label{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
  .info-value{font-size:12px;font-weight:600;color:#0f172a}
</style>
</head>
<body class="bg-ink-100 text-ink-900 antialiased" data-density="compact">
<div id="app" class="h-screen w-full flex overflow-hidden"></div>

<script>
window.PAGE = { id:'aviation', title:'Aviation', crumb:'Aircraft Details' };
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "accent": "blue",
  "sidebarExpanded": false,
  "showSparklines": true
}/*EDITMODE-END*/;
</script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="shared/chrome.js?v=11"></script>
<script>
const SC = window.sharedChrome;
const Ico = SC.I;

/* ---- Load aircraft from sessionStorage ---- */
const DEFAULT_AC = {
  flight:'BA 179', reg:'G-STBF', type:'Boeing 777-236(ER)',
  airline:'British Airways', status:'On Ground',
  alt:'37,375 ft', spd:'470 kts',
  from:{ code:'LHR', name:'London Heathrow' },
  to:{ code:'DXB', name:'Dubai International' },
  lat:51.47, lng:-0.45, rot:80,
  duration:'7h 15m', date:'13 Dec',
  dep:'18:27 UTC', arr:'05:55+1 UTC',
};
const AC = (() => {
  try { const r = sessionStorage.getItem('selectedAircraft'); return r ? { ...DEFAULT_AC, ...JSON.parse(r) } : DEFAULT_AC; }
  catch { return DEFAULT_AC; }
})();

/* ---- Static data ---- */
const RECENT_FLIGHTS = [
  { badge:'BA179', color:'#2563eb', from:'LHR', to:'DXB', dur:'6h 28m', date:'2024-12-07' },
  { badge:'BA178', color:'#1d4ed8', from:'DXB', to:'LHR', dur:'7h 35m', date:'2024-12-06' },
  { badge:'BA179', color:'#2563eb', from:'LHR', to:'DXB', dur:'6h 25m', date:'2024-12-04' },
  { badge:'BA178', color:'#1d4ed8', from:'DXB', to:'LHR', dur:'7h 35m', date:'2024-12-03' },
  { badge:'BA179', color:'#2563eb', from:'LHR', to:'DXB', dur:'6h 28m', date:'2024-12-01' },
];

const SPEED_ITEMS = [
  ['Ground Speed',       AC.spd || '470 kts'],
  ['True Airspeed',      'N/A'],
  ['GPS Altitude',       AC.alt || '37,375 ft'],
  ['Track',              '282°'],
  ['Indicated Airspeed', '282 kts'],
  ['Mach',               '0.84'],
  ['Wind',               'N/A'],
  ['Temperature',        'N/A'],
];

const SPECS = [
  ['Manufacturer',       'Boeing'],
  ['Model',              '777-236(ER)'],
  ['Engines',            '2 × Rolls-Royce Trent 895'],
  ['Wingspan',           '60.9 m / 199 ft 11 in'],
  ['Length',             '63.7 m / 209 ft 1 in'],
  ['Height',             '18.5 m / 60 ft 9 in'],
  ['Max Takeoff Weight', '297,600 kg / 656,000 lb'],
  ['Cruise Speed',       '905 km/h / 562 mph'],
  ['Range',              '14,260 km / 8,861 mi'],
  ['Service Ceiling',    '13,140 m / 43,100 ft'],
  ['First Flight',       '2002-03-15'],
  ['Delivered',          '2002-04-18'],
];

/* ---- Left panel cards ---- */
function CardValue() {
  return `
  <div class="bg-white rounded-xl border border-ink-200 shadow-card">
    <div class="px-3 py-2.5 flex items-center gap-2 border-b border-ink-100">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span class="text-[13px] font-semibold text-ink-900">Aircraft Current Value</span>
    </div>
    <div class="p-3">
      <div class="rounded-lg bg-blue-50 border border-blue-100 px-3 py-2.5 text-center mb-3">
        <div class="text-[10px] font-medium text-ink-500 mb-0.5">Est. Market Value</div>
        <div class="text-[22px] font-bold text-brand-600 leading-none">$106.6M</div>
      </div>
      <div class="grid grid-cols-2 gap-x-3 gap-y-2 text-[11px]">
        <div>
          <div class="info-label">Purchase Price</div>
          <div class="info-value" style="color:#0f172a">$320.0M</div>
        </div>
        <div>
          <div class="info-label">Depreciation</div>
          <div class="info-value" style="color:#ea580c">66.7%</div>
        </div>
        <div>
          <div class="info-label">Valuation Date</div>
          <div class="info-value">Dec 2024</div>
        </div>
        <div>
          <div class="info-label">Condition</div>
          <div class="info-value text-brand-600">Excellent</div>
        </div>
      </div>
    </div>
  </div>`;
}

function CardInfo() {
  const flightId = (AC.flight || 'BA 179').replace(' ','');
  return `
  <div class="bg-white rounded-xl border border-ink-200 shadow-card">
    <div class="px-3 py-2.5 flex items-center gap-2 border-b border-ink-100">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span class="text-[13px] font-semibold text-ink-900">More ${flightId} Information</span>
    </div>
    <div class="p-3">
      <div class="rounded-lg bg-blue-50 border border-blue-100 px-3 py-2 text-center mb-3">
        <div class="text-[10px] font-semibold text-ink-500 uppercase tracking-micro mb-0.5">Aircraft Type</div>
        <div class="text-sm font-bold text-brand-600">${AC.type || 'Boeing 777-236(ER)'}</div>
      </div>
      <div class="grid grid-cols-2 gap-x-3 gap-y-2.5 text-[11px]">
        <div>
          <div class="info-label">Airline Name</div>
          <div class="info-value">${AC.airline || 'British Airways'}</div>
        </div>
        <div>
          <div class="info-label">Registration</div>
          <div class="info-value">${AC.reg || 'G-STBF'}</div>
        </div>
        <div>
          <div class="info-label">Country of Reg.</div>
          <div class="info-value flex items-center gap-1">
            United Kingdom
            <img src="https://flagcdn.com/w20/gb.png" alt="GB" width="14" height="10" class="rounded-sm ring-1 ring-black/10 object-cover" style="width:14px;height:10px" />
          </div>
        </div>
        <div>
          <div class="info-label">Serial Number (MSN)</div>
          <div class="info-value">29402</div>
        </div>
        <div>
          <div class="info-label">Age</div>
          <div class="info-value">22.3 years</div>
        </div>
        <div>
          <div class="info-label">Aircraft Category</div>
          <div class="info-value">Passenger</div>
        </div>
        <div class="col-span-2">
          <div class="info-label">No. In Fleet</div>
          <div class="info-value">48 (12.4%)</div>
        </div>
        <div class="col-span-2 pt-1 border-t border-ink-100">
          <div class="info-label mb-1.5">Seating Plan:</div>
          <div class="flex items-center gap-3 text-[11px]">
            <span class="flex items-center gap-1 text-ink-700 font-medium">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="#f59e0b"><path d="M4 20v-2a8 8 0 0 1 16 0v2M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
              Business Class: 48
            </span>
            <span class="flex items-center gap-1 text-ink-700 font-medium">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="#60a5fa"><path d="M4 20v-2a8 8 0 0 1 16 0v2M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
              Economy: 218
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function CardFlights() {
  const reg = AC.reg || 'G-STBF';
  return `
  <div class="bg-white rounded-xl border border-ink-200 shadow-card">
    <div class="px-3 py-2.5 flex items-center gap-2 border-b border-ink-100">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="text-[13px] font-semibold text-ink-900">Recent ${reg} flights</span>
    </div>
    <div>
      ${RECENT_FLIGHTS.map(f => `
        <div class="px-3 py-2 flex items-center gap-2 hover:bg-ink-50 border-b border-ink-100 last:border-0">
          <span class="text-white text-[10px] font-bold px-1.5 py-0.5 rounded shrink-0 tabular-nums" style="background:${f.color};min-width:38px;text-align:center;">${f.badge}</span>
          <div class="flex-1 min-w-0">
            <div class="text-[12px] font-semibold text-ink-900">${f.from} → ${f.to}</div>
            <div class="text-[11px] text-ink-400 tabular-nums">${f.date}</div>
          </div>
          <div class="text-right shrink-0">
            <div class="text-[11px] font-semibold text-ink-700 tabular-nums">${f.dur}</div>
            <div class="text-[11px] font-medium" style="color:#10b981">Completed</div>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

function CardSpeed() {
  return `
  <div class="bg-white rounded-xl border border-ink-200 shadow-card">
    <div class="px-3 py-2.5 flex items-center gap-2 border-b border-ink-100">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="text-[13px] font-semibold text-ink-900">Speed &amp; Altitude graph</span>
    </div>
    <div class="p-3 grid grid-cols-2 gap-x-4 gap-y-2.5">
      ${SPEED_ITEMS.map(([lbl, val]) => `
        <div>
          <div class="info-label">${lbl}</div>
          <div class="info-value">${val}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

function CardFIR() {
  return `
  <div class="bg-white rounded-xl border border-ink-200 shadow-card">
    <div class="px-3 py-2.5 flex items-center gap-2 border-b border-ink-100">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
      <span class="text-[13px] font-semibold text-ink-900">FIR/UIR</span>
    </div>
    <div class="p-3">
      <div class="info-label mb-1">Current FIR</div>
      <div class="text-[13px] font-semibold text-ink-900">London Terminal Control Area</div>
    </div>
  </div>`;
}

/* ---- Right panel ---- */
function StatusBar() {
  const altIco = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 0 1 10 10M12 6a6 6 0 0 1 6 6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>`;
  const spdIco = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="15 8 19 12 15 16"/></svg>`;
  return `
  <div class="shrink-0 bg-white border-b border-ink-200 px-4 py-2.5 flex items-center gap-4 z-20">
    <span class="flex items-center gap-1.5 text-[12px] font-semibold text-ink-700">
      <span class="w-2 h-2 rounded-full bg-amber-400"></span>
      ${AC.status || 'On Ground'}
    </span>
    <span class="w-px h-4 bg-ink-200"></span>
    <span class="flex items-center gap-1 text-[12px] text-ink-600">${altIco} <span class="tabular-nums">${AC.alt || '37,375 ft'}</span></span>
    <span class="flex items-center gap-1 text-[12px] text-ink-600">${spdIco} <span class="tabular-nums">${AC.spd || '470 kts'}</span></span>
    <span class="flex-1"></span>
    <span class="text-[11px] text-ink-400">Last update: Just now</span>
  </div>`;
}

function SectionMap() {
  const pinIco = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
  const fsIco  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>`;
  const stgIco = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`;
  const altIco = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 0 1 10 10M12 6a6 6 0 0 1 6 6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>`;
  const spdIco = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="15 8 19 12 15 16"/></svg>`;
  return `
  <div class="bg-white rounded-xl border border-ink-200 shadow-card overflow-hidden">
    <div class="px-4 py-3 border-b border-ink-100 flex items-center gap-2">
      ${pinIco}
      <span class="text-sm font-semibold text-ink-900">Current Position &amp; Flight Track</span>
      <span class="w-px h-4 bg-ink-200 mx-1"></span>
      <span class="flex items-center gap-1.5 text-[11px] font-semibold text-ink-700">
        <span class="w-2 h-2 rounded-full bg-amber-400 shrink-0"></span>
        ${AC.status || 'On Ground'}
      </span>
      <span class="w-px h-4 bg-ink-200 mx-1"></span>
      <span class="flex items-center gap-1 text-[11px] text-ink-500">${altIco} <span class="tabular-nums">${AC.alt || '37,375 ft'}</span></span>
      <span class="flex items-center gap-1 text-[11px] text-ink-500">${spdIco} <span class="tabular-nums">${AC.spd || '470 kts'}</span></span>
      <span class="flex-1"></span>
      <span class="text-[11px] text-ink-400">Last update: Just now</span>
    </div>
    <div class="relative" style="height:340px;">
      <div id="aircraft-map"></div>
      <button id="ac-fs-btn" class="map-btn absolute z-[400]" style="top:12px;left:12px;" title="Fullscreen">${fsIco}</button>
        <div class="relative">
          <button id="map-layers-btn" class="map-btn" title="Map type">${stgIco}</button>
          <div id="map-layers-menu" class="hidden absolute top-0 right-[calc(100%+8px)] w-[160px] bg-white border border-ink-200 rounded-xl shadow-card-hover overflow-hidden py-1">
            ${[
              { id:'satellite', label:'Satellite' },
              { id:'street',    label:'Street' },
              { id:'dark',      label:'Dark' },
              { id:'light',     label:'Light Mode' },
            ].map(o => `
              <button data-map-type="${o.id}" class="w-full flex items-center justify-between px-3 py-2 text-sm text-ink-700 hover:bg-ink-50 transition-colors">
                <span data-label style="font-weight:500">${o.label}</span>
                <span style="color:#2563eb;opacity:0" data-check><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></span>
              </button>`).join('')}
          </div>
        </div>
      </div>
      <div class="absolute z-[400]" style="bottom:36px;left:12px;">
        <div class="bg-white/95 border border-ink-200 rounded-lg px-3 py-2 shadow-card text-[11px]">
          <div class="font-semibold text-ink-900 mb-1.5">Flight Track</div>
          <div class="flex items-center gap-2 mb-1 text-ink-600">
            <div style="width:18px;height:2px;background:#10b981;border-radius:1px;flex-shrink:0;"></div>Completed
          </div>
          <div class="flex items-center gap-2 mb-1 text-ink-600">
            <div style="width:18px;height:0;border-top:2px dashed #94a3b8;flex-shrink:0;"></div>Remaining
          </div>
          <div class="flex items-center gap-2 text-ink-600">
            <div style="width:8px;height:8px;border-radius:50%;background:#10b981;flex-shrink:0;margin:0 5px;"></div>Waypoints
          </div>
        </div>
      </div>
      <div class="absolute z-[400]" style="bottom:12px;right:12px;">
        <span class="px-2.5 py-1 rounded-md text-[11px] font-semibold text-white" style="background:rgba(15,23,42,.72);backdrop-filter:blur(4px);">${AC.status || 'On Ground'}</span>
      </div>
    </div>
  </div>`;
}

function SectionDepArr() {
  const dep = AC.from || { code:'LHR', name:'London Heathrow' };
  const arr = AC.to   || { code:'DXB', name:'Dubai International' };
  const plnIco = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>`;
  const pinIco = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
  const NAMES  = { LHR:'London Heathrow', DXB:'Dubai International', JFK:'John F. Kennedy International', LAX:'Los Angeles International', ORD:"Chicago O'Hare", SIN:'Singapore Changi', AMS:'Amsterdam Schiphol', FRA:'Frankfurt Airport', CDG:'Charles de Gaulle', HND:'Tokyo Haneda' };
  return `
  <div class="grid grid-cols-2 gap-3 dep-arr-grid">
    <div class="bg-white rounded-xl border border-ink-200 shadow-card">
      <div class="px-4 py-2.5 flex items-center gap-2 border-b border-ink-100 text-ink-600">${plnIco} <span class="text-sm font-semibold text-ink-900">Departure</span></div>
      <div class="p-4">
        <div class="text-[32px] font-bold text-ink-900 leading-none mb-1">${dep.code}</div>
        <div class="text-sm text-ink-500 mb-4">${NAMES[dep.code] || dep.name || dep.code}</div>
        <div class="flex flex-col gap-1.5 text-[13px]">
          <div><span class="font-semibold text-ink-900">Scheduled:</span> <span class="text-ink-700">${AC.dep || '18:27 UTC'}</span></div>
          <div><span class="font-semibold text-ink-900">Terminal:</span> <span class="text-ink-700">Terminal 5</span></div>
          <div><span class="font-semibold text-ink-900">Gate:</span> <span class="text-ink-700">T5-A12</span></div>
        </div>
      </div>
    </div>
    <div class="bg-white rounded-xl border border-ink-200 shadow-card">
      <div class="px-4 py-2.5 flex items-center gap-2 border-b border-ink-100 text-ink-600">${pinIco} <span class="text-sm font-semibold text-ink-900">Arrival</span></div>
      <div class="p-4">
        <div class="text-[32px] font-bold text-ink-900 leading-none mb-1">${arr.code}</div>
        <div class="text-sm text-ink-500 mb-4">${NAMES[arr.code] || arr.name || arr.code}</div>
        <div class="flex flex-col gap-1.5 text-[13px]">
          <div><span class="font-semibold text-ink-900">Scheduled:</span> <span class="text-brand-600">${AC.arr || '05:55+1 UTC'}</span></div>
          <div><span class="font-semibold text-ink-900">Terminal:</span> <span class="text-brand-600">Terminal 3</span></div>
          <div><span class="font-semibold text-ink-900">Gate:</span> <span class="text-ink-700">A15</span></div>
        </div>
      </div>
    </div>
  </div>`;
}

function SectionSpecs() {
  const gearIco = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;
  return `
  <div class="bg-white rounded-xl border border-ink-200 shadow-card overflow-hidden">
    <div class="px-4 py-3 border-b border-ink-100 flex items-center gap-2">
      ${gearIco}
      <span class="text-sm font-semibold text-ink-900">Aircraft Specifications</span>
    </div>
    <div class="spec-grid">
      ${SPECS.map(([lbl, val]) => `
        <div class="spec-cell">
          <div class="spec-label">${lbl}</div>
          <div class="spec-value">${val}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

/* ---- Content ---- */
function Content() {
  return `
  <div class="flex flex-col flex-1 min-h-0">
    <div class="flex flex-1 min-h-0 overflow-y-auto scroll-thin aircraft-body">
      <div class="shrink-0 bg-ink-50 aircraft-left-panel" style="width:316px;border-right:1px solid #e2e8f0;min-height:100%;">
        <div class="p-3 flex flex-col gap-3">
          ${CardValue()}
          ${CardInfo()}
          ${CardFlights()}
          ${CardSpeed()}
          ${CardFIR()}
        </div>
      </div>
      <div class="flex-1 min-w-0 aircraft-right-panel">
        <div class="p-4 flex flex-col gap-3">
          ${SectionMap()}
          ${SectionDepArr()}
          ${SectionSpecs()}
        </div>
      </div>
    </div>
  </div>`;
}

/* ---- Map ---- */
let acMap = null;
let acBaseTile = null;

const MAP_TILES = {
  satellite: () => L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'', maxZoom:19 }),
  street:    () => L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'', maxZoom:19 }),
  dark:      () => L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution:'', maxZoom:19 }),
  light:     () => L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution:'', maxZoom:19 }),
};

function setMapType(type) {
  if (!acMap || !MAP_TILES[type]) return;
  if (acBaseTile) { acMap.removeLayer(acBaseTile); }
  acBaseTile = MAP_TILES[type]();
  acBaseTile.addTo(acMap);
  acBaseTile.bringToBack();
  /* Update menu active state — checkmark + bold label, matching Marine Dashboard */
  document.querySelectorAll('[data-map-type]').forEach(b => {
    const isOn  = b.dataset.mapType === type;
    const lbl   = b.querySelector('[data-label]');
    const check = b.querySelector('[data-check]');
    if (lbl)   { lbl.style.color = isOn ? '#2563eb' : '#334155'; lbl.style.fontWeight = isOn ? '600' : '500'; }
    if (check) { check.style.opacity = isOn ? '1' : '0'; }
  });
}

function initMap() {
  const el = document.getElementById('aircraft-map');
  if (!el) return;
  if (acMap) { acMap.remove(); acMap = null; acBaseTile = null; }

  acMap = L.map(el, { center:[50, 2], zoom:6, zoomControl:true, scrollWheelZoom:true });
  setMapType('satellite');

  /* Fullscreen toggle */
  const acFsBtn = document.getElementById('ac-fs-btn');
  if (acFsBtn) {
    const MIN_ICO = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 0-2-2h-3m-4 0H5a2 2 0 0 0-2 2v3"/></svg>`;
    const MAX_ICO = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>`;
    acFsBtn.onclick = () => {
      const wrap = document.getElementById('aircraft-map').parentElement;
      const isFs = wrap.classList.toggle('ac-is-fs');
      if (isFs) wrap.style.cssText = 'position:fixed;inset:0;z-index:9999;';
      else wrap.style.cssText = '';
      acFsBtn.innerHTML = isFs ? MIN_ICO : MAX_ICO;
      setTimeout(() => acMap && acMap.invalidateSize(), 200);
    };
  }

  /* Layers menu — matching Marine Dashboard pattern */
  const layersBtn  = document.getElementById('map-layers-btn');
  const layersMenu = document.getElementById('map-layers-menu');
  if (layersBtn && layersMenu) {
    layersBtn.onclick = (e) => { e.stopPropagation(); layersMenu.classList.toggle('hidden'); };
    layersMenu.querySelectorAll('[data-map-type]').forEach(opt => {
      opt.onclick = (e) => { e.stopPropagation(); setMapType(opt.dataset.mapType); layersMenu.classList.add('hidden'); };
    });
    document.addEventListener('click', (e) => {
      if (!layersMenu.contains(e.target) && e.target !== layersBtn && !(layersBtn && layersBtn.contains(e.target))) {
        layersMenu.classList.add('hidden');
      }
    });
  }
  setTimeout(() => setMapType('satellite'), 0);

  /* Great-circle waypoints LHR → DXB */
  const route = [
    [51.47, -0.45], [51.1, 3.5], [50.4, 8.2], [49.0, 13.8],
    [47.0, 19.5],   [44.2, 25.0], [41.0, 30.8], [37.5, 36.5],
    [33.5, 41.5],   [29.2, 47.0], [25.25, 55.36],
  ];
  const splitAt = 3; // completed up to this index

  L.polyline(route.slice(0, splitAt + 1), { color:'#10b981', weight:2.5, opacity:1 }).addTo(acMap);
  L.polyline(route.slice(splitAt),        { color:'#94a3b8', weight:2,   opacity:.9, dashArray:'7 5' }).addTo(acMap);

  route.forEach(([lat, lng], i) => {
    if (i === 0 || i === route.length - 1) return;
    L.circleMarker([lat, lng], {
      radius:4, fillColor: i <= splitAt ? '#10b981' : '#94a3b8',
      color:'#fff', weight:1.5, fillOpacity:1,
    }).addTo(acMap);
  });

  /* Destination ring */
  L.circleMarker([25.25, 55.36], { radius:7, fillColor:'#10b981', color:'#fff', weight:2.5, fillOpacity:1 }).addTo(acMap);

  /* Plane icon */
  const rot = AC.rot || 80;
  const planeSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="#eab308"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>`;
  const icon = L.divIcon({
    className:'',
    html:`<div style="transform:rotate(${rot}deg);filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));width:22px;height:22px;">${planeSvg}</div>`,
    iconSize:[22,22], iconAnchor:[11,11],
  });
  L.marker([AC.lat || 51.47, AC.lng || -0.45], { icon }).addTo(acMap);

  const zin  = el.querySelector('.leaflet-control-zoom-in');
  const zout = el.querySelector('.leaflet-control-zoom-out');
  if (zin)  zin.innerHTML  = `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>`;
  if (zout) zout.innerHTML = `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></span>`;
}

/* ---- Render ---- */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      ${Content()}
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  setTimeout(initMap, 50);
};
window.render();
</script>
</body>
</html>
