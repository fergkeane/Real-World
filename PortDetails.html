/* ---- Bar chart SVG ---- */
function BarChart(data, prev) {
  const W=760, H=160, PAD={t:16,r:8,b:28,l:44};
  const cw = W - PAD.l - PAD.r;
  const ch = H - PAD.t - PAD.b;
  const maxVal = Math.max(...data, ...(prev||[])) * 1.1;
  const bw = cw / data.length;
  const barW = bw * 0.35;
  const gap  = bw * 0.08;
  const yTicks = [0, 70000, 140000, 210000, 280000];
  const fmt = v => v >= 1000 ? (v/1000)+'K' : v;
  const toY = v => PAD.t + ch - (v/maxVal)*ch;

  const bars = data.map((v,i) => {
    const x = PAD.l + i*bw + bw*0.12;
    const y = toY(v);
    const h = ch - (y - PAD.t);
    const xp = x + barW + gap;
    const vp = prev ? prev[i] : 0;
    const yp = prev ? toY(vp) : 0;
    const hp = prev ? ch - (yp - PAD.t) : 0;
    return `
      <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="2" fill="#3b82f6"/>
      ${prev ? `<rect x="${xp}" y="${yp}" width="${barW}" height="${hp}" rx="2" fill="#10b981"/>` : ''}
    `;
  }).join('');

  const gridLines = yTicks.map(v => `
    <line x1="${PAD.l}" y1="${toY(v)}" x2="${W-PAD.r}" y2="${toY(v)}" stroke="#f1f5f9" stroke-width="1"/>
    <text x="${PAD.l-6}" y="${toY(v)+4}" text-anchor="end" font-size="9" fill="#94a3b8">${fmt(v)}</text>
  `).join('');

  const labels = MONTHS.map((m,i) => `
    <text x="${PAD.l + i*bw + bw/2}" y="${H-6}" text-anchor="middle" font-size="9" fill="#94a3b8">${m}</text>
  `).join('');

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;">${gridLines}${bars}${labels}</svg>`;
}

/* ---- Donut chart SVG ---- */
function DonutChart(slices) {
  const cx=100, cy=100, r=70, ir=44;
  let cumAngle = -Math.PI/2;
  const paths = slices.map(s => {
    const angle = (s.pct/100) * 2*Math.PI;
    const x1 = cx + r * Math.cos(cumAngle);
    const y1 = cy + r * Math.sin(cumAngle);
    const x2 = cx + r * Math.cos(cumAngle + angle);
    const y2 = cy + r * Math.sin(cumAngle + angle);
    const ix1 = cx + ir * Math.cos(cumAngle);
    const iy1 = cy + ir * Math.sin(cumAngle);
    const ix2 = cx + ir * Math.cos(cumAngle + angle);
    const iy2 = cy + ir * Math.sin(cumAngle + angle);
    const large = angle > Math.PI ? 1 : 0;
    const d = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${ir} ${ir} 0 ${large} 0 ${ix1} ${iy1} Z`;
    cumAngle += angle;
    return `<path d="${d}" fill="${s.color}" stroke="#fff" stroke-width="1.5"/>`;
  }).join('');
  return `<svg viewBox="0 0 200 200" style="width:160px;height:160px;">${paths}</svg>`;
}

      <select style="border:1px solid #e2e8f0;border-radius:6px;padding:3px 8px;font-size:12px;font-weight:600;color:#334155;background:#fff;">
        <option>2024</option><option>2023</option><option>2022</option>
      </select>
    </div>
    <div style="overflow-x:auto;" class="scroll-thin">
      <table class="trend-table" style="min-width:900px;">
        <thead>
          <tr>
            <th></th>
            ${MONTHS.map(m => `<th>${m}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${TREND_ROWS.map((r, ri) => `
            <tr class="expandable" style="${ri===0?'color:#2563eb;':''}">
              <td style="${ri===0?'color:#2563eb;':''};padding:10px;">
                <div style="font-weight:600;font-size:12px;${ri===0?'color:#2563eb;':''}">${r.label}</div>
                <div style="font-size:10px;color:#94a3b8;">${r.unit}</div>
                ${ri===0 ? `<div style="padding:0;"><div style="font-size:11px;font-weight:700;color:#0f172a;margin-top:4px;padding:2px 0 8px;">Estimated Dry Bulk Throughput</div>${BarChart(r.data, r.prev)}</div>` : ''}
              </td>
              ${r.data.map(v => `<td>${v.toLocaleString()}</td>`).join('')}
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function CardRiskExposure() {
  const exportIco = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
  return `
  <div class="card">
    <div class="card-hdr">
      <span class="card-title">Port Side Risk Exposure</span>
      <button style="background:none;border:0;cursor:pointer;padding:4px;">${exportIco}</button>
    </div>
    <table class="risk-table">
      <thead><tr><th>Zone</th><th>Asset Type</th><th>Count/Area</th><th>Unit Value</th><th>Total Value</th></tr></thead>
      <tbody>
        ${RISK_ZONES.map(z => `
          <tr>
            <td style="font-weight:600;">${z.zone}</td>
            <td><div style="display:flex;align-items:center;gap:6px;"><div class="type-dot" style="background:${z.color};"></div><span style="font-size:12px;">${z.assetType}</span></div></td>
            <td style="tabular-nums;">${z.count}</td>
            <td style="tabular-nums;">${z.unit}</td>
            <td style="tabular-nums;font-weight:600;">${z.total}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function CardTerminals() {
  return `
  <div class="card" style="overflow:hidden;">
    <div class="card-hdr"><span class="card-title">Terminals</span></div>
    <table class="dt">
      <thead><tr><th>Name</th><th style="text-align:right;">Num Berths</th></tr></thead>
      <tbody>
        ${TERMINALS.map(t => `
          <tr>
            <td><span class="lnk">${t.name}</span></td>
            <td style="text-align:right;font-weight:600;">${t.berths}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function CardBerthPurpose() {
  return `
  <div class="card">
    <div class="card-hdr"><span class="card-title">Berth Purpose</span></div>
    <div style="padding:16px;display:flex;flex-direction:column;align-items:center;gap:16px;">
      ${DonutChart(BERTH_PURPOSE)}
      <div style="display:flex;flex-wrap:wrap;gap:8px 14px;justify-content:center;">
        ${BERTH_PURPOSE.map(s => `
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#475569;">
            <div style="width:10px;height:10px;border-radius:2px;background:${s.color};flex-shrink:0;${s.color==='#1e293b'?'border:1px solid #e2e8f0;':''}"></div>
            ${s.label}
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

/* ---- Map init ---- */
let portMap = null;
function initMap() {
  const el = document.getElementById('port-map');
  if (!el || portMap) return;
  portMap = L.map(el, { center:[PORT.lat, PORT.lng], zoom:13, zoomControl:true, scrollWheelZoom:true });
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'', maxZoom:19 }).addTo(portMap);

  /* Circle overlay */
  L.circle([PORT.lat, PORT.lng], { radius:2000, color:'#2563eb', weight:2.5, fillColor:'#2563eb', fillOpacity:0.08 }).addTo(portMap);

  /* Port marker */
  const anchorSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>`;
  const icon = L.divIcon({ className:'', html:`<div style="width:28px;height:28px;border-radius:50%;background:#2563eb;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;">${anchorSvg}</div>`, iconSize:[28,28], iconAnchor:[14,14] });
  L.marker([PORT.lat, PORT.lng], { icon }).bindPopup(`<b>${PORT.name}</b><br>${PORT.country}`).addTo(portMap);

  /* Label */
  const labelIcon = L.divIcon({ className:'', html:`<div style="background:rgba(15,23,42,.65);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;backdrop-filter:blur(2px);">${PORT.name}</div>`, iconSize:[0,0], iconAnchor:[-14,28] });
  L.marker([PORT.lat, PORT.lng], { icon:labelIcon }).addTo(portMap);

  const zin=el.querySelector('.leaflet-control-zoom-in'), zout=el.querySelector('.leaflet-control-zoom-out');
  if(zin)  zin.innerHTML=`<span style="font-size:18px;line-height:30px;display:block;text-align:center;">+</span>`;
  if(zout) zout.innerHTML=`<span style="font-size:20px;line-height:30px;display:block;text-align:center;">&minus;</span>`;
}

/* ---- Render ---- */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      <div class="flex-1 overflow-y-auto scroll-thin px-4 py-4">
        <div style="display:flex;flex-direction:column;gap:12px;">
          <!-- Row 1 -->
          <div style="display:grid;grid-template-columns:minmax(0,5fr) minmax(0,7fr);gap:12px;align-items:start;">
            ${CardExposure()}
            ${CardTrendsSummary()}
          </div>
          <!-- Row 2 -->
          <div style="display:grid;grid-template-columns:minmax(0,5fr) minmax(0,7fr);gap:12px;align-items:start;">
            ${CardVessels()}
            ${CardMap()}
          </div>
          <!-- Row 3: Trends detail -->
          ${CardTrendsDetail()}
          <!-- Row 4: Risk -->
          ${CardRiskExposure()}
          <!-- Row 5: Terminals + Berth -->
          <div style="display:grid;grid-template-columns:minmax(0,7fr) minmax(0,5fr);gap:12px;align-items:start;">
            ${CardTerminals()}
            ${CardBerthPurpose()}
          </div>
        </div>
      </div>
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  setTimeout(initMap, 80);
};
window.render();
</script>
</body>
</html>
