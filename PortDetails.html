  .card-hdr { padding:10px 16px; border-bottom:1px solid #f1f5f9; display:flex; align-items:center; justify-content:space-between; }
  .card-title { font-size:13px; font-weight:700; color:#0f172a; }
  /* Sub tabs */
  .stab { display:inline-flex; background:var(--brand-50,#eff6ff); border-radius:999px; padding:3px; gap:2px; }
  .stab-btn { font-size:11px; font-weight:700; padding:4px 12px; border-radius:999px; border:0; cursor:pointer; transition:background 120ms,color 120ms; }
  .stab-btn.active { background:var(--brand-600,#2563eb); color:#fff; }
  .stab-btn:not(.active) { background:transparent; color:var(--brand-600,#2563eb); }
  /* Tables */
  .dt { width:100%; border-collapse:collapse; }
  .dt th { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.05em; padding:8px 14px; text-align:left; border-bottom:1px solid #e2e8f0; background:#fff; white-space:nowrap; }
  .dt td { font-size:12.5px; color:#334155; padding:9px 14px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
  .dt tr:last-child td { border-bottom:0; }
  .dt tr:hover td { background:#f8fafc; }
  .lnk { color:var(--brand-600,#2563eb); font-weight:600; cursor:pointer; }
  .lnk:hover { color:var(--brand-700,#1d4ed8); }

  .stat-col-hdr { font-size:11px; font-weight:700; color:#64748b; padding:8px 14px; border-bottom:1px solid #f1f5f9; }
  .stat-row { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; border-bottom:1px solid #f1f5f9; }
  .stat-row:last-child { border-bottom:0; }
  .stat-cell { padding:10px 14px; font-size:12px; }
  .stat-cell.name { font-weight:600; }
  .stat-cell.val { color:#334155; font-size:12px; }
  .stat-cell .unit { font-size:10px; color:#94a3b8; display:block; }
  /* Trends table */

  .trend-table th { padding:8px 10px; font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid #e2e8f0; text-align:right; white-space:nowrap; }
  .trend-table th:first-child { text-align:left; width:150px; }
  .trend-table td { padding:9px 10px; border-bottom:1px solid #f1f5f9; text-align:right; color:#334155; tabular-nums; white-space:nowrap; }
  .trend-table td:first-child { text-align:left; font-weight:600; width:150px; }
  .trend-table tr.expandable td:first-child { cursor:pointer; }
  .trend-table tr.expandable td.trend-label-cell { padding:10px; }
  .trend-table tr.expandable:hover .trend-label { color:var(--brand-600,#2563eb); }
  .trend-table tr.expandable.open .trend-label { color:var(--brand-600,#2563eb); }
  .trend-table tr.expandable .tr-chev { color:#94a3b8; margin-top:1px; }
  .trend-table tr.expandable.open .tr-chev { transform:rotate(90deg); color:var(--brand-600,#2563eb); }
  .trend-table tr.trend-detail { display:none; }
  .trend-table tr.trend-detail.open { display:table-row; }
  .trend-table tr.trend-detail td { border-bottom:1px solid #f1f5f9; background:#fcfcfd; }
  .trend-detail-inner { padding:8px 0 12px; }

  .type-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  /* Map */

  .leaflet-control-zoom,.leaflet-bar { border:1px solid #e2e8f0 !important; box-shadow:0 1px 2px rgba(15,23,42,.08) !important; border-radius:8px !important; overflow:hidden; }

  .map-btn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:#fff; border:1px solid #e2e8f0; border-radius:8px; color:#334155; box-shadow:0 1px 2px rgba(15,23,42,.08); cursor:pointer; }
  .map-btn:hover { background:#f1f5f9; }

  /* Layout rows — stack to a single column on small screens */
  .pd-row { display: grid; gap: 12px; align-items: stretch; }
  .pd-row-2 { grid-template-columns: minmax(0, 5fr) minmax(0, 7fr); }
  .pd-row-3 { grid-template-columns: minmax(0, 3fr) minmax(0, 5fr) minmax(0, 5fr); }
  .pd-row-2-rev { grid-template-columns: minmax(0, 7fr) minmax(0, 5fr); }

/* ---- Bar chart SVG (grouped: 2023 / 2024 / Current Year) ---- */
const TREND_SERIES = [
  { key:'y2023', label:'2023',         color:'#6366f1' },
  { key:'y2024', label:'2024',         color:'#3b82f6' },
  { key:'cur',   label:'Current Year', color:'#10b981' },

// Build three comparable series from a row's current-year data (+ optional real prev = 2023)
function trendSeriesData(r) {
  const cur = r.data;
  const y2023 = r.prev || cur.map((v,i) => Math.round(v * (0.88 + ((i*7)%5)*0.012)));
  const y2024 = cur.map((v,i) => Math.round((y2023[i] + v) / 2));
  return { y2023, y2024, cur };
}

function niceMax(maxRaw) {
  if (maxRaw <= 0) return 4;
  const pow = Math.pow(10, Math.floor(Math.log10(maxRaw)));
  return Math.ceil(maxRaw / pow) * pow;
}
function fmtTick(v) {
  if (v >= 1e6) return (v/1e6).toFixed(v % 1e6 ? 1 : 0) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(v % 1e3 ? 1 : 0) + 'K';
  return '' + Math.round(v);
}

function BarChart(row) {
  const sd = trendSeriesData(row);
  const series = TREND_SERIES.map(s => ({ ...s, data: sd[s.key] }));
  const allVals = series.flatMap(s => s.data);
  const maxVal = niceMax(Math.max(...allVals) * 1.05);

  const ticks = [maxVal, maxVal*0.75, maxVal*0.5, maxVal*0.25, 0];
  const yLabels = ticks.map((t,k) => `<span class="tr-ytick" style="top:${(k/4*100).toFixed(2)}%">${fmtTick(t)}</span>`).join('');

  const months = MONTHS.map((m,i) => {
    const bars = series.map(s => `<span class="tr-bar" style="height:${(s.data[i]/maxVal*100).toFixed(1)}%;background:${s.color};"></span>`).join('');
    return `<div class="tr-mcell">${bars}</div>`;
  }).join('');
  const mlabels = MONTHS.map(m => `<div class="tr-mlabel">${m}</div>`).join('');

  const legend = series.map(s => `
    <span class="tr-leg"><span style="background:${s.color};"></span>${s.label}</span>`).join('');

  return `
    <div class="tr-chart-title">Estimated ${row.label} Throughput</div>
    <div class="tr-grid">
      <div class="tr-yaxis">${yLabels}</div>
      ${months}
      <div></div>
      ${mlabels}
    </div>
    <div class="tr-legend">${legend}</div>`;
}

/* ---- Donut chart SVG ---- */
function DonutChart(slices) {
  const cx=100, cy=100, r=70, ir=44;
  let cumAngle = -Math.PI/2;
  const paths = slices.map(s => {
    const angle = (s.pct/100) * 2*Math.PI;
    const x1 = cx + r * Math.cos(cumAngle);
    const y1 = cy + r * Math.sin(cumAngle);
    const x2 = cx + r * Math.cos(cumAngle + angle);
    const y2 = cy + r * Math.sin(cumAngle + angle);
    const ix1 = cx + ir * Math.cos(cumAngle);
    const iy1 = cy + ir * Math.sin(cumAngle);
    const ix2 = cx + ir * Math.cos(cumAngle + angle);
    const iy2 = cy + ir * Math.sin(cumAngle + angle);
    const large = angle > Math.PI ? 1 : 0;
    const d = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${ir} ${ir} 0 ${large} 0 ${ix1} ${iy1} Z`;
    cumAngle += angle;
    return `<path d="${d}" fill="${s.color}" stroke="#fff" stroke-width="1.5"/>`;
  }).join('');
  return `<svg viewBox="0 0 200 200" style="width:160px;height:160px;">${paths}</svg>`;
}

/* ---- Map init ---- */
let portMap = null;
function initMap() {
  const el = document.getElementById('port-map');
  if (!el || portMap) return;
  portMap = L.map(el, { center:[PORT.lat, PORT.lng], zoom:13, zoomControl:true, scrollWheelZoom:true });
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'', maxZoom:19 }).addTo(portMap);

  /* Circle overlay */
  L.circle([PORT.lat, PORT.lng], { radius:2000, color:brand(600), weight:2.5, fillColor:brand(600), fillOpacity:0.08 }).addTo(portMap);

  /* Port marker */
  const anchorSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>`;
  const icon = L.divIcon({ className:'', html:`<div style="width:28px;height:28px;border-radius:50%;background:${brand(600)};border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;">${anchorSvg}</div>`, iconSize:[28,28], iconAnchor:[14,14] });
  L.marker([PORT.lat, PORT.lng], { icon }).bindPopup(`<b>${PORT.name}</b><br>${PORT.country}`).addTo(portMap);

  /* Label */
  const labelIcon = L.divIcon({ className:'', html:`<div style="background:rgba(15,23,42,.65);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;backdrop-filter:blur(2px);">${PORT.name}</div>`, iconSize:[0,0], iconAnchor:[-14,28] });
  L.marker([PORT.lat, PORT.lng], { icon:labelIcon }).addTo(portMap);

  const zin=el.querySelector('.leaflet-control-zoom-in'), zout=el.querySelector('.leaflet-control-zoom-out');
  if(zin)  zin.innerHTML=`<span style="font-size:18px;line-height:30px;display:block;text-align:center;">+</span>`;
  if(zout) zout.innerHTML=`<span style="font-size:20px;line-height:30px;display:block;text-align:center;">&minus;</span>`;
}

/* ---- Render ---- */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      <div class="flex-1 overflow-y-auto scroll-thin px-4 py-4">
        <div style="display:flex;flex-direction:column;gap:12px;">
          <!-- Row 1 -->
          <div class="pd-row pd-row-3">
            ${CardExposureSummary()}
            ${CardExposureCargo()}
            ${CardTrendsSummary()}
          </div>
          <!-- Row 2 -->
          <div class="pd-row pd-row-2">
            ${CardVessels()}
            ${CardMap()}
          </div>
          <!-- Row 3: Trends detail -->
          ${CardTrendsDetail()}
          <!-- Row 4: Risk -->
          ${CardRiskExposure()}
          <!-- Row 5: Terminals + Berth -->
          <div class="pd-row pd-row-2-rev">
            ${CardTerminals()}
            ${CardBerthPurpose()}
          </div>
        </div>
      </div>
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  wireTrends();
  setTimeout(initMap, 80);
};

function wireTrends() {
  document.querySelectorAll('.trend-table tr.expandable').forEach(row => {
    row.querySelector('.trend-label-cell').addEventListener('click', () => {
      const i = row.getAttribute('data-trend-row');
      const detail = document.querySelector(`.trend-detail[data-trend-detail="${i}"]`);
      const open = row.classList.toggle('open');
      if (detail) detail.classList.toggle('open', open);
    });
  });
}
window.render();
</script>
