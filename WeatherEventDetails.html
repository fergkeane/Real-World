/* ── Lucide helper ──────────────────────────────────────────────────── */
function lico(name, size=16, color='currentColor', sw=2) {
  const data = window.lucide && lucide.icons && lucide.icons[name];
  if (!data) return '';
  const [tag, attrs, children] = data;
  const a = {...attrs, width:size, height:size, stroke:color, 'stroke-width':sw,
              style:'display:inline-block;vertical-align:middle;flex-shrink:0'};
  const attrStr = Object.entries(a).map(([k,v])=>`${k}="${v}"`).join(' ');
  const inner = (children||[]).map(([ct,ca])=>`<${ct} ${Object.entries(ca).map(([k,v])=>`${k}="${v}"`).join(' ')}/>`).join('');
  return `<${tag} ${attrStr}>${inner}</${tag}>`;
}

/* ── Tab pill positioning ───────────────────────────────────────────── */
function positionTabPills() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.ds-tabs').forEach(group => {
      const pill   = group.querySelector('[data-tab-pill]');
      const active = group.querySelector('.ds-tab[aria-selected="true"]');
      if (!pill || !active) return;
      const gRect = group.getBoundingClientRect();
      const aRect = active.getBoundingClientRect();
      if (!aRect.width) return;
      pill.style.width     = aRect.width + 'px';
      pill.style.transform = `translateX(${aRect.left - gRect.left}px)`;
      requestAnimationFrame(() => pill.classList.remove('is-init'));
    });
  });
}

let evtMap = null, evtTile = null;

function initEvtMap() {
  const el = document.getElementById('evt-map');
  if (!el) return;
  if (evtMap) { evtMap.remove(); evtMap = null; evtTile = null; }

  const zoom = mapView === 'Global' ? 2 : 5;
  const center = mapView === 'Global' ? [10, 30] : [STORM.lat, STORM.lng];
  evtMap = L.map(el, { center, zoom, zoomControl:false, scrollWheelZoom:true });
  evtTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution:'', maxZoom:18 }).addTo(evtMap);
  L.control.zoom({ position:'topleft' }).addTo(evtMap);

  setTimeout(() => {
    const zin  = el.querySelector('.leaflet-control-zoom-in');
    const zout = el.querySelector('.leaflet-control-zoom-out');
    if (zin)  zin.innerHTML  = `<span style="font-size:18px;line-height:30px;display:block;text-align:center">+</span>`;
    if (zout) zout.innerHTML = `<span style="font-size:20px;line-height:30px;display:block;text-align:center">&minus;</span>`;
    const zc = el.querySelector('.leaflet-control-zoom');
    if (zc) zc.style.marginTop = '44px';
  }, 100);

  /* Storm track */
  const past = (STORM.track || []).filter(t => t.kind === 'past');
  if (past.length) {
    L.polyline([...past.map(t => [t.lat,t.lng]), [STORM.lat,STORM.lng]], { color:'#94a3b8', weight:1.5, dashArray:'4 5', opacity:.65 }).addTo(evtMap);
    past.forEach(t => L.circleMarker([t.lat,t.lng], { radius:4, fillColor:'#94a3b8', fillOpacity:1, color:'#fff', weight:1.5 }).addTo(evtMap));
  }
  const fore = (STORM.track || []).filter(t => t.kind === 'forecast');
  if (fore.length) {
    L.polyline([[STORM.lat,STORM.lng], ...fore.map(t => [t.lat,t.lng])], { color:'#64748b', weight:1.5, dashArray:'4 5', opacity:.45 }).addTo(evtMap);
    fore.forEach((t, i) => {
      const blue = i >= fore.length - 2;
      L.circleMarker([t.lat,t.lng], { radius: blue?6:4, fillColor: blue?'#3b82f6':'#64748b', fillOpacity:1, color:'#fff', weight:1.5 }).addTo(evtMap);
    });
  }

  /* Storm marker */
  const d = (STORM.radius || 17) * 2;
  L.marker([STORM.lat, STORM.lng], {
    icon: L.divIcon({
      className:'',
      html:`<div style="width:${d}px;height:${d}px;border-radius:50%;background:${STORM.color};border:2.5px solid rgba(255,255,255,.85);box-shadow:0 0 0 ${Math.round((STORM.radius||17)*.55)}px ${STORM.glow},0 3px 10px rgba(0,0,0,.25)"></div>`,
      iconSize:[d,d], iconAnchor:[STORM.radius||17, STORM.radius||17],
    })
  }).bindTooltip(STORM.name, { permanent:false, direction:'top' }).addTo(evtMap);

  /* Asset markers (portfolio view only) */

        })
      }).bindTooltip(a.name, { permanent:false, direction:'top', offset:[0,-14] }).addTo(evtMap);

}

                  <td style="color:#475569;font-size:12px">${a.expiry}</td>
                  <td style="color:#475569;font-size:12px">${a.owner}</td>
                  <td style="font-variant-numeric:tabular-nums;font-weight:600">${a.exposure}</td>
                  <td style="font-variant-numeric:tabular-nums;font-weight:500">${a.market}</td>
                  <td style="color:#64748b;font-size:12px">${a.updated}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
          <div style="padding:10px 16px;border-top:1px solid #f1f5f9;font-size:12px;color:#64748b;display:flex;align-items:center;justify-content:space-between">
            <span>${ASSETS.length} results (1-${ASSETS.length} shown) &bull; Items per page: 10</span>
            <div style="display:flex;align-items:center;gap:6px">
              <button style="padding:4px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;font-size:12px;color:#94a3b8;font-family:inherit;cursor:not-allowed" disabled>Previous</button>
              <span style="min-width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;background:#2563eb;color:#fff;border-radius:6px;font-size:12px;font-weight:600">1</span>
              <button style="padding:4px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;font-size:12px;color:#94a3b8;font-family:inherit;cursor:not-allowed" disabled>Next</button>
              <span style="margin-left:4px;color:#94a3b8">Page 1 of 1</span>
            </div>
          </div>
        </div>

      </main>
    </div>
    ${SC.TweaksPanel()}
  `;

  SC.wireChrome();
  requestAnimationFrame(positionTabPills);
  setTimeout(positionTabPills, 150);
  window.addEventListener('resize', positionTabPills, { passive:true });

  /* Map view tabs */
  document.querySelectorAll('[data-mview]').forEach(btn => {
    btn.onclick = () => {
      mapView = btn.dataset.mview;
      document.querySelectorAll('[data-mview]').forEach(t => t.setAttribute('aria-selected', String(t===btn)));
      positionTabPills();
      if (evtMap) evtMap.remove(), evtMap = null, evtTile = null;
      setTimeout(initEvtMap, 50);
    };
  });

  /* Portfolio search */
  const psi = document.getElementById('pf-search');
  if (psi) {
    psi.addEventListener('input', e => { pfSearch = e.target.value; window.render(); });
    psi.addEventListener('focus', e => { e.target.style.borderColor='#93c5fd'; e.target.style.background='#fff'; });
    psi.addEventListener('blur',  e => { e.target.style.borderColor='#e2e8f0'; e.target.style.background='#f8fafc'; });
  }

  setTimeout(initEvtMap, 80);
};

window.render();
</script>
</body>
</html>
