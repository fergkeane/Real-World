/* ── Lucide icon helper ──────────────────────────────────────────────────── */
function lico(name, size = 16, color = 'currentColor', sw = 2) {
  const data = window.lucide && lucide.icons && lucide.icons[name];
  if (!data) return '';
  const [tag, attrs, children] = data;
  const a = { ...attrs, width: size, height: size, stroke: color, 'stroke-width': sw,
               style: 'display:inline-block;vertical-align:middle;flex-shrink:0' };
  const attrStr = Object.entries(a).map(([k, v]) => `${k}="${v}"`).join(' ');
  const inner = (children || []).map(([ct, ca]) =>
    `<${ct} ${Object.entries(ca).map(([k, v]) => `${k}="${v}"`).join(' ')}/>`
  ).join('');
  return `<${tag} ${attrStr}>${inner}</${tag}>`;
}

/* ── Tab pill positioning ────────────────────────────────────────────────── */
function positionTabPills() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.ds-tabs').forEach(group => {
      const pill   = group.querySelector('[data-tab-pill]');
      const active = group.querySelector('.ds-tab[aria-selected="true"]');
      if (!pill || !active) return;
      const gRect = group.getBoundingClientRect();
      const aRect = active.getBoundingClientRect();
      if (!aRect.width) return;
      const targetW = aRect.width;
      const targetX = aRect.left - gRect.left;
      // Identify this group so we can recall its previous pill position after re-render.
      const key = group.id || group.dataset.tabGroup || '';
      const prev = key && window._weatherPillCache && window._weatherPillCache[key];
      if (prev) {
        pill.classList.add('is-init');
        pill.style.width = prev.w + 'px';
        pill.style.transform = `translateX(${prev.x}px)`;
        requestAnimationFrame(() => {
          pill.classList.remove('is-init');
          requestAnimationFrame(() => {
            pill.style.width = targetW + 'px';
            pill.style.transform = `translateX(${targetX}px)`;
          });
        });
      } else {
        pill.style.width = targetW + 'px';
        pill.style.transform = `translateX(${targetX}px)`;
        requestAnimationFrame(() => pill.classList.remove('is-init'));
      }
      window._weatherPillCache = window._weatherPillCache || {};
      if (key) window._weatherPillCache[key] = { w: targetW, x: targetX };
    });
  });
}

}

/* ── State ────────────────────────────────────────────────────────────────── */
let viewMode = 'Map';
let wxMap = null;
let wxTile = null;

const MAP_TILES = {
  street:    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  light:     'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  dark:      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
};

function setMapType(type) {
  if (!wxMap) return;
  if (wxTile) wxMap.removeLayer(wxTile);
  wxTile = L.tileLayer(MAP_TILES[type], { attribution:'', maxZoom:19 }).addTo(wxMap);
  wxTile.bringToBack();
  document.querySelectorAll('.map-type-opt').forEach(b => {
    const isOn = b.dataset.mapType === type;
    const lbl   = b.querySelector('[data-label]');
    const check = b.querySelector('[data-check]');
    if (lbl)   { lbl.style.color = isOn ? '#2563eb' : '#334155'; lbl.style.fontWeight = isOn ? '600' : '500'; }
    if (check) { check.style.opacity = isOn ? '1' : '0'; }
  });
}

/* ── Init map ─────────────────────────────────────────────────────────────── */
function initMap() {
  const el = document.getElementById('weather-map');
  if (!el) return;
  if (wxMap) { wxMap.remove(); wxMap = null; wxTile = null; }

  wxMap = L.map(el, { center:[-16, 65], zoom:4, zoomControl:true, scrollWheelZoom:true });
  setMapType('satellite');

  SYSTEMS.forEach(s => {
    // Past track
    const past = s.track.filter(t => t.kind === 'past');
    if (past.length) {
      const pts = [...past.map(t => [t.lat, t.lng]), [s.lat, s.lng]];
      L.polyline(pts, { color:'#94a3b8', weight:1.5, dashArray:'4 5', opacity:.6 }).addTo(wxMap);
      past.forEach(t => L.circleMarker([t.lat, t.lng], { radius:4, fillColor:'#94a3b8', fillOpacity:1, color:'#fff', weight:1.5 }).addTo(wxMap));
    }

    // Forecast track
    const fore = s.track.filter(t => t.kind === 'forecast');
    if (fore.length) {
      const pts = [[s.lat, s.lng], ...fore.map(t => [t.lat, t.lng])];
      L.polyline(pts, { color:'#64748b', weight:1.5, dashArray:'4 5', opacity:.45 }).addTo(wxMap);
      fore.forEach((t, i) => {
        const isBlue = i >= fore.length - 2;
        L.circleMarker([t.lat, t.lng], {
          radius: isBlue ? 6 : 4,
          fillColor: isBlue ? '#3b82f6' : '#64748b',
          fillOpacity: 1, color:'#fff', weight:1.5,
        }).addTo(wxMap);
      });
    }

    // Main marker
    const d = s.radius * 2;
    const icon = L.divIcon({
      className:'',
      html:`<div style="width:${d}px;height:${d}px;border-radius:50%;background:${s.color};border:2.5px solid rgba(255,255,255,.85);box-shadow:0 0 0 ${Math.round(s.radius*.55)}px ${s.glow},0 3px 10px rgba(0,0,0,.25)"></div>`,
      iconSize:[d,d], iconAnchor:[s.radius,s.radius],
    });
    L.marker([s.lat, s.lng], { icon })
      .bindPopup(stormPopup(s), { className:'storm-popup', maxWidth:230, minWidth:230, closeButton:true })
      .addTo(wxMap);
  });

  // Custom zoom icons (match Marine Dashboard — Lucide Plus/Minus, centered)
  setTimeout(() => {
    const zin  = el.querySelector('.leaflet-control-zoom-in');
    const zout = el.querySelector('.leaflet-control-zoom-out');
    if (zin)  zin.innerHTML  = `<span class="inline-flex items-center justify-center h-full w-full">${SC.I.plus}</span>`;
    if (zout) zout.innerHTML = `<span class="inline-flex items-center justify-center h-full w-full">${SC.I.minus}</span>`;
  }, 100);

  // Wire fullscreen + layers menu via a single delegated handler (survives re-renders)
  wireMapControls();
}

/* Delegated map-control handler — attached once, works regardless of how many
   times the view re-renders and recreates the buttons. */
let wxControlsWired = false;
function wireMapControls() {
  if (wxControlsWired) return;
  wxControlsWired = true;
  document.addEventListener('click', (e) => {
    const menu = document.getElementById('wx-layers-menu');
    const fsBtn = e.target.closest('#wx-fs-btn');
    if (fsBtn) {
      const w = document.getElementById('wx-map-wrap');
      if (w) {
        const isFs = w.classList.toggle('wx-is-fs');
        w.style.cssText = isFs ? 'position:fixed;inset:0;z-index:9999;' : '';
        fsBtn.innerHTML = isFs ? SC.I.minimize : SC.I.maximize;
        setTimeout(() => wxMap && wxMap.invalidateSize(), 200);
      }
      if (menu) menu.classList.add('hidden');
      return;
    }
    if (e.target.closest('#wx-layers-btn')) {
      if (menu) menu.classList.toggle('hidden');
      return;
    }
    const opt = e.target.closest('.map-type-opt');
    if (opt) {
      setMapType(opt.dataset.mapType);
      if (menu) menu.classList.add('hidden');
      return;
    }
    // Click anywhere else closes the menu
    if (menu) menu.classList.add('hidden');
  });
}

/* ── Render ───────────────────────────────────────────────────────────────── */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      ${Content()}
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  requestAnimationFrame(positionTabPills);
  setTimeout(positionTabPills, 150);
  window.addEventListener('resize', positionTabPills, { passive: true });

  document.querySelectorAll('[data-view]').forEach(b => b.addEventListener('click', () => {
    viewMode = b.dataset.view;
    window.render();
    if (viewMode === 'Map') setTimeout(initMap, 50);
  }));

  if (viewMode === 'Map') setTimeout(initMap, 50);
};

window.render();
</script>
</body>
</html>
