<body class="bg-ink-100 text-ink-900">
<div id="app" class="min-h-screen w-full flex overflow-hidden"></div>

<script>
window.PAGE = { id:'aviation', title:'Aviation', crumb:'Portfolio Details' };
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",

<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="shared/chrome.js?v=6"></script>
<script>
const SC = window.sharedChrome;

/* ── Lucide icon helper (mirrors chrome.js pattern) ──────────────────────── */
function lico(name, size = 16, color = 'currentColor', sw = 2) {
  const data = window.lucide && lucide.icons && lucide.icons[name];
  if (!data) return '';
  const [tag, attrs, children] = data;
  const a = { ...attrs, width: size, height: size, stroke: color, 'stroke-width': sw,
               style: 'display:inline-block;vertical-align:middle;flex-shrink:0' };
  const attrStr = Object.entries(a).map(([k, v]) => `${k}="${v}"`).join(' ');
  const inner = (children || []).map(([ct, ca]) =>
    `<${ct} ${Object.entries(ca).map(([k, v]) => `${k}="${v}"`).join(' ')}/>`
  ).join('');
  return `<${tag} ${attrStr}>${inner}</${tag}>`;
}

/* ── Load portfolio from session ── */
const DEFAULT_PF = { name:'Air France / KLM', assets:312, exposure:'$28.3B' };
const PF = (() => { try { const r = sessionStorage.getItem('selectedAviationPortfolio'); return r ? {...DEFAULT_PF,...JSON.parse(r)} : DEFAULT_PF; } catch { return DEFAULT_PF; } })();

/* ── State ── */
let summaryTab  = 'Summary Statistics';
let policyView  = 'details';
let policyPage  = 1;
const PER_PAGE  = 25;
const TOTAL     = 520;

/* ── Generate policy rows ── */
function genPolicies() {
  const refs   = ['Butler-03','Butler-04','Butler-05','Butler-06','Butler-07','Butler-08','Butler-09','Butler-10','Hughes-01','Hughes-02','Avery-01','Avery-02','Kent-03','Kent-05'];
  const rows = [];
  for (let i = 0; i < PER_PAGE; i++) {
    const id   = 157014758 + i;
    const tiv  = (27.5 + i * 1.4).toFixed(1);
    const hull = (25.0 + i * 1.2).toFixed(1);
    const chw  = (14.1 + i * 0.15).toFixed(1);
    const hullw= (12.5 + i * 0.45).toFixed(1);
    const tlohw= (10.0 + i * 0.4).toFixed(1);
    const appLim = Math.round(50 + i * 1.8);
    const pass  = Math.round(100 + i * 3.5);
    const bag   = (5 + i * 0.25).toFixed(1);
    const cargo = Math.round(20 + i * 0.75);
    const crew  = (10 + i * 0.35).toFixed(1);
    const hang  = Math.round(15 + i * 0.6);
    rows.push({
      id: `Policy ${id}`,
      ref: refs[i % refs.length],
      tiv: `$${tiv}M`, hull:`$${hull}M`, chw:`$${chw}M`,
      hullw:`$${hullw}M`, tlohw:`$${tlohw}M`,
      appLim:`$${appLim}M`, pass:`$${pass}M`, bag:`$${bag}M`,
      cargo:`$${cargo}M`, crew:`$${crew}M`, hang:`$${hang}M`,
    });
  }
  return rows;
}
const POLICIES = genPolicies();

/* ── Sort icon ── */
function sortIcon() {
  return `<span class="sort-ico">
    <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
  </span>`;
}

/* ── Flag helper ── */
function flag(cc, w=18, h=13) {
  return `<img src="https://flagcdn.com/w40/${cc}.png" width="${w}" height="${h}" style="border-radius:2px;vertical-align:middle;display:inline-block;" />`;
}

/* ── Tab pill positioning ── */
function positionTabPills() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.ds-tabs').forEach(group => {
      const pill   = group.querySelector('[data-tab-pill]');
      const active = group.querySelector('.ds-tab[aria-selected="true"]');
      if (!pill || !active) return;
      const gRect = group.getBoundingClientRect();
      const aRect = active.getBoundingClientRect();
      if (!aRect.width) return;
      pill.style.width     = aRect.width + 'px';
      pill.style.transform = `translateX(${aRect.left - gRect.left}px)`;
      requestAnimationFrame(() => pill.classList.remove('is-init'));
    });
  });
}

/* ── Panel: Details ── */

/* ── Panel: Totals ── */
function PanelTotals() {

              <td class="tabular-nums">${p.tiv}</td>
              <td class="tabular-nums">${p.hull}</td>
              <td class="tabular-nums">${p.chw}</td>
              <td class="tabular-nums">${p.hullw}</td>
              <td class="tabular-nums">${p.tlohw}</td>
              <td class="tabular-nums">${p.appLim}</td>
              <td class="tabular-nums">${p.pass}</td>
              <td class="tabular-nums">${p.bag}</td>
              <td class="tabular-nums">${p.cargo}</td>
              <td class="tabular-nums">${p.crew}</td>
              <td class="tabular-nums">${p.hang}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <!-- Footer -->
    <div class="flex items-center justify-between px-4 py-3 border-t border-ink-100 text-xs text-ink-500">
      <div class="flex items-center gap-2">
        <span>${TOTAL} results (${PER_PAGE} shown) | Items per page:</span>
        <select class="sel" id="per-page-sel">
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>
      <div class="flex items-center gap-1.5 text-ink-600">
        <button id="pag-prev" class="flex items-center gap-1 px-2 py-1 rounded border border-ink-200 hover:bg-ink-50 disabled:opacity-40" ${policyPage<=1?'disabled':''}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> Previous
        </button>
        ${Array.from({length:Math.min(totalPages,5)},(_,i)=>`
          <button data-pp="${i+1}" class="w-7 h-7 rounded border text-xs font-semibold ${policyPage===i+1?'bg-blue-600 text-white border-blue-600':'border-ink-200 hover:bg-ink-50'}">${i+1}</button>`).join('')}
        ${totalPages > 5 ? `<span class="text-ink-400">…</span><button data-pp="${totalPages}" class="w-7 h-7 rounded border text-xs font-semibold border-ink-200 hover:bg-ink-50">${totalPages}</button>` : ''}
        <button id="pag-next" class="flex items-center gap-1 px-2 py-1 rounded border border-ink-200 hover:bg-ink-50 disabled:opacity-40" ${policyPage>=totalPages?'disabled':''}>
          Next <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <span class="ml-2 text-ink-400">Page ${policyPage} of ${totalPages}</span>
      </div>
    </div>
  </div>`;
}

/* ── Render ── */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      <main id="main-content" class="flex-1 overflow-y-auto scroll-thin bg-ink-100 px-4 lg:px-5 py-4">
        <!-- Top 3 panels -->
        <div class="avi-top-panels" style="display:grid;grid-template-columns:minmax(0,4fr) minmax(0,3.5fr) minmax(0,10fr);gap:12px;margin-bottom:12px;align-items:stretch;">
          ${PanelDetails()}
          ${PanelTotals()}
          ${PanelSummary()}
        </div>
        <!-- Policy section -->
        ${PolicySection()}
      </main>
    </div>
    ${SC.TweaksPanel()}
  `;

  SC.wireChrome();
  requestAnimationFrame(positionTabPills);
  setTimeout(positionTabPills, 150);
  window.addEventListener('resize', positionTabPills, { passive:true });

  /* Summary tabs */
  document.querySelectorAll('[data-stab]').forEach(btn => {
    btn.onclick = () => {
      summaryTab = btn.dataset.stab;
      const group = btn.closest('.ds-tabs');
      if (group) {
        group.querySelectorAll('.ds-tab').forEach(t => t.setAttribute('aria-selected', String(t===btn)));
        positionTabPills();
      }
    };
  });

  /* Policy view tabs */
  document.querySelectorAll('[data-pvw]').forEach(btn => {
    btn.onclick = () => {
      policyView = btn.dataset.pvw;
      const group = btn.closest('.ds-tabs');
      if (group) {
        group.querySelectorAll('.ds-tab').forEach(t => t.setAttribute('aria-selected', String(t===btn)));
        positionTabPills();
      }
    };
  });
  const pvwSel = document.getElementById('policy-view-mobile-sel');
  if (pvwSel) pvwSel.onchange = () => { policyView = pvwSel.value; window.render(); };

  /* Pagination */
  document.querySelectorAll('[data-pp]').forEach(btn => {
    btn.onclick = () => { policyPage = parseInt(btn.dataset.pp); window.render(); };
  });
  const pp = document.getElementById('pag-prev');
  const pn = document.getElementById('pag-next');
  const tp = Math.ceil(TOTAL / PER_PAGE);
  if (pp) pp.onclick = () => { if (policyPage > 1) { policyPage--; window.render(); } };
  if (pn) pn.onclick = () => { if (policyPage < tp) { policyPage++; window.render(); } };
};

window.render();
</script>
</body>
</html>
