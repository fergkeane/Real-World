/* ── Lucide icon helper (mirrors chrome.js pattern) ──────────────────────── */
function lico(name, size = 16, color = 'currentColor', sw = 2) {
  const data = window.lucide && lucide.icons && lucide.icons[name];
  if (!data) return '';
  const [tag, attrs, children] = data;
  const a = { ...attrs, width: size, height: size, stroke: color, 'stroke-width': sw,
               style: 'display:inline-block;vertical-align:middle;flex-shrink:0' };
  const attrStr = Object.entries(a).map(([k, v]) => `${k}="${v}"`).join(' ');
  const inner = (children || []).map(([ct, ca]) =>
    `<${ct} ${Object.entries(ca).map(([k, v]) => `${k}="${v}"`).join(' ')}/>`
  ).join('');
  return `<${tag} ${attrStr}>${inner}</${tag}>`;
}

/* ── Tab pill positioning ── */
function positionTabPills() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.ds-tabs').forEach(group => {
      const pill   = group.querySelector('[data-tab-pill]');
      const active = group.querySelector('.ds-tab[aria-selected="true"]');
      if (!pill || !active) return;
      const gRect = group.getBoundingClientRect();
      const aRect = active.getBoundingClientRect();
      if (!aRect.width) return;
      pill.style.width     = aRect.width + 'px';
      pill.style.transform = `translateX(${aRect.left - gRect.left}px)`;
      requestAnimationFrame(() => pill.classList.remove('is-init'));
    });
  });
}

function initAviationDetailMap() {
  const el = document.getElementById('avia-detail-map');
  if (!el) return;
  if (map) { try { map.remove(); } catch(e){} map = null; tileLayer = null; }

  map = L.map(el, { center:[30, 20], zoom:2, minZoom:2, maxZoom:6, zoomControl:true, scrollWheelZoom:true });
  setMapType(currentMapType);

  if (typeof AIRPORTS_LATLNG !== 'undefined') AIRPORTS_LATLNG.forEach(a => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="airport-icon"><svg viewBox="0 0 24 24" class="w-4 h-4 text-white" fill="currentColor"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg></div>`,
      iconSize:[32,32], iconAnchor:[16,16],
    });
    L.marker([a.lat, a.lng], { icon })
      .bindPopup(buildAirportPopupHTML(a), { className:'avia-popup', maxWidth:320, minWidth:300, closeButton:true, autoPanPadding:[30,30] })
      .on('popupopen', () => { try { sessionStorage.setItem('selectedAirport', JSON.stringify(a)); } catch(e){} })
      .addTo(map);
  });

  if (typeof PLANES !== 'undefined') PLANES.forEach(p => {
    const planeSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>';
    const icon = L.divIcon({
      className: '',
      html: '<div style="transform:rotate(' + p.rot + 'deg); color:#eab308; width:24px; height:24px; display:flex; align-items:center; justify-content:center; filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">' + planeSvg + '</div>',
      iconSize:[24,24], iconAnchor:[12,12],
    });
    L.marker([p.lat, p.lng], { icon })
      .bindPopup(buildFlightPopupHTML(p), { className:'avia-popup', maxWidth:320, minWidth:300, closeButton:true, autoPanPadding:[30,30] })
      .on('popupopen', () => { try { sessionStorage.setItem('selectedAircraft', JSON.stringify(p)); } catch(e){} })
      .addTo(map);
  });

  const fsBtn = document.getElementById('map-fs-btn');
  const container = document.getElementById('avia-map-container');
  if (fsBtn && container) {
    fsBtn.onclick = () => {
      const isFs = container.classList.toggle('is-fullscreen-avia');
      if (isFs) container.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#0b1e2e;';
      else      container.style.cssText = 'height:520px;background:#0b1e2e;';
      fsBtn.innerHTML = isFs ? Ico.minimize : Ico.maximize;
      setTimeout(() => map.invalidateSize(), 200);
    };
  }

  const layersBtn  = document.getElementById('map-layers-btn');
  const layersMenu = document.getElementById('map-layers-menu');
  if (layersBtn && layersMenu) {
    layersBtn.onclick = (e) => { e.stopPropagation(); layersMenu.classList.toggle('hidden'); };
    layersMenu.onclick = (e) => e.stopPropagation();
    layersMenu.querySelectorAll('[data-map-type]').forEach(opt => {
      opt.onclick = (e) => { e.stopPropagation(); setMapType(opt.dataset.mapType); layersMenu.classList.add('hidden'); };
    });
    document.addEventListener('click', () => layersMenu.classList.add('hidden'));
  }
  setTimeout(() => map.invalidateSize(), 60);
}

window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      <main id="main-content" class="flex-1 overflow-y-auto scroll-thin bg-ink-100 px-4 lg:px-5 py-4">
        <!-- Top 3 panels -->
        <div class="avi-top-panels" style="display:grid;grid-template-columns:minmax(0,4fr) minmax(0,3.5fr) minmax(0,10fr);gap:12px;margin-bottom:12px;align-items:stretch;">
          ${PanelDetails()}
          ${PanelTotals()}
          ${PanelSummary()}
        </div>
        <!-- Policy section -->
        ${PolicySection()}
      </main>
    </div>
    ${SC.TweaksPanel()}
  `;

  SC.wireChrome();
  requestAnimationFrame(positionTabPills);
  setTimeout(positionTabPills, 150);
  window.addEventListener('resize', positionTabPills, { passive:true });

  /* Summary tabs */
  document.querySelectorAll('[data-stab]').forEach(btn => {
    btn.onclick = () => {
      summaryTab = btn.dataset.stab;
      const group = btn.closest('.ds-tabs');
      if (group) {
        group.querySelectorAll('.ds-tab').forEach(t => t.setAttribute('aria-selected', String(t===btn)));
        positionTabPills();
      }
      // Re-render so the panel body reflects the new tab (summary vs destinations)
      setTimeout(() => window.render(), 200);
    };
  });

  /* Policy view tabs */
  document.querySelectorAll('[data-pvw]').forEach(btn => {
    btn.onclick = () => {
      policyView = btn.dataset.pvw;
      const group = btn.closest('.ds-tabs');
      if (group) {
        group.querySelectorAll('.ds-tab').forEach(t => t.setAttribute('aria-selected', String(t===btn)));
        positionTabPills();
      }
      // Re-render so the policy section reflects the new view (table vs map)
      setTimeout(() => window.render(), 200);
    };
  });
  const pvwSel = document.getElementById('policy-view-mobile-sel');
  if (pvwSel) pvwSel.onchange = () => { policyView = pvwSel.value; window.render(); };

  /* Init map when in map view */
  if (policyView === 'map') {
    setTimeout(initAviationDetailMap, 80);
  }

  /* Pagination (DS-compliant) */
  dsWirePagination(document.querySelector('.ds-pagination-wrap'), {
    onPage:    (p) => { policyPage = p; window.render(); },
    onPerPage: (n) => { policyPerPage = n; policyPage = 1; window.render(); },
  });
};

window.render();
</script>
</body>
</html>
