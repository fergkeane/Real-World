<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Extras — Real World</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  .scroll-thin::-webkit-scrollbar{width:5px}.scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
  .extra-card{background:#fff;border-radius:14px;border:1px solid #e8ecf0;padding:20px;display:flex;flex-direction:column;gap:12px;transition:box-shadow .15s,transform .15s;box-shadow:0 1px 2px rgba(15,23,42,.05)}
  .extra-card:hover{box-shadow:0 4px 16px rgba(15,23,42,.1);transform:translateY(-1px)}
  .icon-badge{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;flex-shrink:0}
  .edit-btn{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 10px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;font-size:12.5px;font-weight:500;color:#475569;cursor:pointer;font-family:inherit;transition:background .1s,border-color .1s,color .1s;width:fit-content}
  .edit-btn:hover{background:#f8fafc;border-color:#cbd5e1;color:#334155}
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.3);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadein 150ms ease}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .modal-box{background:#fff;border-radius:14px;width:440px;max-width:90vw;box-shadow:0 20px 60px rgba(15,23,42,.2);overflow:hidden;animation:popin 180ms cubic-bezier(.34,1.56,.64,1)}
  @keyframes popin{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
  .extras-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  @media(max-width:1023px){.extras-grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:599px){.extras-grid{grid-template-columns:1fr;}}
</style>
</head>
<body class="bg-slate-100 text-slate-900">
<div id="app" class="h-screen w-full flex overflow-hidden"></div>

<script>
window.PAGE = { id:'extras', title:'Extras', crumb:'Configuration Tools' };
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "accent": "blue",
  "sidebarExpanded": false,
  "showSparklines": true
}/*EDITMODE-END*/;
</script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="shared/chrome.js?v=12"></script>
<script>
const SC = window.sharedChrome;

/* ── Card data ────────────────────────────────────────────────────────────── */
const EXTRAS = [
  {
    id:'high-risk', title:'High Risk Areas',
    iconBg:'#fef2f2', iconColor:'#ef4444',
    icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    desc:'Configure and manage geographic regions with elevated security, piracy, or operational risks. Set alert thresholds and monitoring parameters for vessels entering these zones.',
  },
  {
    id:'countries', title:'Countries',
    iconBg:'#eff6ff', iconColor:'#2563eb',
    icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    desc:'Manage country-specific compliance requirements, sanctions lists, and regulatory frameworks. Configure alerts for vessels entering restricted territorial waters.',
  },
  {
    id:'sea', title:'Sea',
    iconBg:'#f0fdfa', iconColor:'#0d9488',
    icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg>`,
    desc:'Define maritime boundaries, exclusive economic zones, and sea-specific regulations. Monitor vessel activities across different oceanic regions and territorial waters.',
  },
  {
    id:'commodities', title:'Commodities',
    iconBg:'#f0fdf4', iconColor:'#16a34a',
    icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`,
    desc:'Track and manage commodity classifications, trade restrictions, and cargo monitoring. Configure alerts for sanctioned goods and regulated materials.',
  },
  {
    id:'upload-ihs', title:'Upload IHS Excel',
    iconBg:'#f5f3ff', iconColor:'#7c3aed',
    icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>`,
    desc:'Import vessel data and maritime intelligence from IHS Excel files. Bulk upload and process vessel registrations, technical specifications, and ownership information.',
  },
  {
    id:'dark-periods', title:'Find Dark Periods',
    iconBg:'#fff7ed', iconColor:'#ea580c',
    icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
    desc:'Identify and analyze periods when vessels disable AIS tracking systems. Detect potential compliance violations and suspicious maritime activities.',
  },
  {
    id:'risk-factors', title:'Risk Factors',
    iconBg:'#fefce8', iconColor:'#d97706',
    icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    desc:'Configure comprehensive risk assessment parameters including vessel age, flag state, ownership changes, and operational patterns for enhanced due diligence.',
  },
];

/* ── State ────────────────────────────────────────────────────────────────── */
let activeModal = null; // id of card being "edited"

const EDIT_SVG = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const X_SVG    = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

/* ── Modal ────────────────────────────────────────────────────────────────── */
function renderModal() {
  if (!activeModal) return '';
  const card = EXTRAS.find(e => e.id === activeModal);
  if (!card) return '';
  return `
  <div class="modal-bg" id="modal-bg">
    <div class="modal-box">
      <div style="padding:20px 24px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:12px">
        <div class="icon-badge" style="background:${card.iconBg};color:${card.iconColor}">${card.icon}</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700;color:#0f172a">${card.title}</div>
          <div style="font-size:12px;color:#94a3b8;margin-top:1px">Configuration settings</div>
        </div>
        <button id="modal-close" style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:7px;border:0;background:transparent;cursor:pointer;color:#94a3b8" onmouseover="this.style.background='#f1f5f9';this.style.color='#334155'" onmouseout="this.style.background='transparent';this.style.color='#94a3b8'">${X_SVG}</button>
      </div>
      <div style="padding:20px 24px">
        <p style="font-size:13px;color:#64748b;line-height:1.6;margin-bottom:20px">${card.desc}</p>
        <div style="background:#f8fafc;border:1px solid #f1f5f9;border-radius:10px;padding:14px;margin-bottom:20px">
          <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Configuration</div>
          <div style="font-size:13px;color:#94a3b8;text-align:center;padding:16px 0">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 8px"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 1 0-14.14 14.14"/></svg>
            Settings for this module are managed in the platform admin panel.
          </div>
        </div>
      </div>
      <div style="padding:0 24px 20px;display:flex;gap:8px">
        <button id="modal-cancel" style="flex:1;height:36px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:13px;font-weight:500;color:#475569;cursor:pointer;font-family:inherit" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='#fff'">Close</button>
        <button style="flex:1;height:36px;border-radius:8px;border:0;background:#2563eb;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">Open Settings</button>
      </div>
    </div>
  </div>`;
}

/* ── Render ───────────────────────────────────────────────────────────────── */
function renderContent() {
  return `
  <div class="flex-1 overflow-y-auto scroll-thin px-5 py-5">
    <!-- Subtitle -->
    <p style="font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.6">
      Additional tools and configuration options for maritime monitoring and compliance management.
    </p>

    <!-- Card grid -->
    <div class="extras-grid">
      ${EXTRAS.map(card => `
      <div class="extra-card">
        <!-- Header row: icon + title -->
        <div style="display:flex;align-items:center;gap:12px">
          <div class="icon-badge" style="background:${card.iconBg};color:${card.iconColor}">${card.icon}</div>
          <h3 style="font-size:14px;font-weight:700;color:#0f172a;line-height:1.3">${card.title}</h3>
        </div>
        <!-- Description -->
        <p style="font-size:13px;color:#64748b;line-height:1.6;flex:1">${card.desc}</p>
        <!-- Edit button -->
        <div>
          <button class="edit-btn" data-card-id="${card.id}">${EDIT_SVG} Edit</button>
        </div>
      </div>`).join('')}
    </div>
  </div>
  ${renderModal()}`;
}

/* ── Wire ─────────────────────────────────────────────────────────────────── */
let _main = null;

function rc() {
  if (!_main) return;
  _main.innerHTML = renderContent();
  wireExtras();
}

function wireExtras() {
  /* Edit buttons */
  document.querySelectorAll('[data-card-id]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      activeModal = btn.dataset.cardId;
      rc();
    });
  });

  /* Modal close */
  const closeBtn  = document.getElementById('modal-close');
  const cancelBtn = document.getElementById('modal-cancel');
  const modalBg   = document.getElementById('modal-bg');

  const closeModal = () => { activeModal = null; rc(); };
  if (closeBtn)  closeBtn.addEventListener('click',  e => { e.stopPropagation(); closeModal(); });
  if (cancelBtn) cancelBtn.addEventListener('click', e => { e.stopPropagation(); closeModal(); });
  if (modalBg)   modalBg.addEventListener('click',   e => { if (e.target === modalBg) closeModal(); });

  const modalBox = modalBg && modalBg.querySelector('.modal-box');
  if (modalBox) modalBox.addEventListener('click', e => e.stopPropagation());
}

/* ── Main render ──────────────────────────────────────────────────────────── */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      <main id="extras-main" class="flex-1 min-h-0 overflow-hidden flex flex-col bg-slate-100"></main>
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  _main = document.getElementById('extras-main');
  rc();
};

window.render();
</script>
</body>
</html>
