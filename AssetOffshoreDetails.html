<script>
const SC = window.sharedChrome;
const Ico = SC.I;

/* ---- Load asset from sessionStorage or use default ---- */
const DEFAULT_ASSET = {
  fullName:'Teora Lopes Elevator', assetType:'Mobile Production (MOPU)',
  operator:'Petrobras', country:'Brazil', coords:'24.80S / 44.20W',
  waterDepth:'2,150m', status:'Operational', production:'100,000 bbl/day',
  commissioned:'2017', policyType:'Cargo', field:'Santos Basin',
  lat:-24.8, lng:-44.2, color:'#ea580c'
};

const ASSET = (() => {
  try {
    const raw = sessionStorage.getItem('selectedOffshoreAsset');
    return raw ? JSON.parse(raw) : DEFAULT_ASSET;
  } catch(e) { return DEFAULT_ASSET; }
})();

/* Parse coords string "24.80S / 44.20W" → {lat, lng} */
function parseCoords(str) {
  if (!str) return { lat: ASSET.lat || -24.8, lng: ASSET.lng || -44.2 };
  const m = str.match(/(\d+\.?\d*)([NS])\s*\/\s*(\d+\.?\d*)([EW])/i);
  if (!m) return { lat: ASSET.lat || -24.8, lng: ASSET.lng || -44.2 };
  return {
    lat: parseFloat(m[1]) * (m[2].toUpperCase() === 'S' ? -1 : 1),
    lng: parseFloat(m[3]) * (m[4].toUpperCase() === 'W' ? -1 : 1),
  };
}
const GEO = parseCoords(ASSET.coords);

/* ---- Detail table rows [col1, col2, col3] ---- */
const COUNTRY_CC = {
  'Brazil':'br','Venezuela':'ve','Norway':'no','United Kingdom':'gb','United States':'us','USA':'us','Mexico':'mx','Canada':'ca',
  'Saudi Arabia':'sa','Qatar':'qa','United Arab Emirates':'ae','Nigeria':'ng','Angola':'ao','South Africa':'za','Egypt':'eg',
  'Australia':'au','Indonesia':'id','Malaysia':'my','Singapore':'sg','China':'cn','Japan':'jp','India':'in','Russia':'ru',
  'Netherlands':'nl','Germany':'de','France':'fr','Spain':'es','Italy':'it','Portugal':'pt','Greece':'gr','Türkiye':'tr','Turkey':'tr',
  'Denmark':'dk','Sweden':'se','Finland':'fi','Iceland':'is','Argentina':'ar','Chile':'cl','Colombia':'co','Trinidad and Tobago':'tt',
};
function flagImg(country) {
  const cc = COUNTRY_CC[country];
  if (!cc) return '';
  return `<img src="https://flagcdn.com/w20/${cc}.png" width="16" height="12" style="display:inline-block;border-radius:2px;vertical-align:middle;margin-right:6px;flex-shrink:0;" alt="${country}" />`;
}

const DETAIL_ROWS = [
  [['Asset Type',        ASSET.assetType],          ['Year Converted / Upgraded', 'N/A'],          ['Turbine Rating (Windfarm)',    'N/A']],
  [['Asset Name',        ASSET.fullName],            ['Flag / Registration State',  `${flagImg('Norway')}Norway`],       ['Turbine Unit Value',           'N/A']],
  [['Unit ID / CVN / IMO','HSE-2016-NOR'],           ['Class Society',              'DNV GL'],       ['Balance of Plant Value',       'N/A']],
  [['Owner',             'North Sea Energy Holdings'],['Class Notation',            'E0 DYNPOS-AUTRO'],['Project Construction Value', '$1.2B']],
  [['Operator',          ASSET.operator],            ['Hull Material',              'Steel'],         ['Installed Capacity (MW)',      'N/A']],
  [['Location',          'North Sea'],               ['Production Capacity',        '85,000 Bbl/day'],['Insured Capacity (MW)',        'N/A']],
  [['Country Jurisdiction', `${flagImg(ASSET.country)}${ASSET.country}`], ['Storage Capacity',           '1.3M Bbl'],     ['Year Built',                  '2008']],
  [['Water Depth',       ASSET.waterDepth],          ['Gross Tonnage',              '157,000 GT'],   ['Last Survey',                 'Jun 2023']],
  [['Field',             ASSET.field],               ['Length Overall',             '274m'],          ['Classification Expiry',       '2026-03-01']],
  [['Mooring Type',      'Turret'],                  ['Beam',                       '49m'],           ['IMO Number',                  '9374045']],
  [['Commissioned',      ASSET.commissioned],        ['Draft (m)',                  '22.5m'],         ['Policy Type',                 ASSET.policyType]],
];

/* ---- Ownership data ---- */
const OWNERSHIP = [
  { label:'Total E&P Norge AS',             pct:39.896, color:'var(--brand-800,#1e40af)' },
  { label:'ConocoPhillips Skandinavia AS',  pct:35.112, color:'var(--brand-600,#2563eb)' },
  { label:'Vår Energi AS',                  pct:12.388, color:'var(--brand-400,#60a5fa)' },
  { label:'Equinor Energy AS',              pct:7.604,  color:'var(--brand-500,#3b82f6)' },
  { label:'Petero AS',                      pct:5.0,    color:'var(--brand-300,#93c5fd)' },
];

/* ---- Donut as inline SVG (per-segment tooltips on hover) ---- */
function donutSVG(size = 140) {
  const r = 15.915;          // circumference ≈ 100
  const sw = 6;              // stroke width
  let offset = 0;
  const segs = OWNERSHIP.map((o, i) => {
    const seg = `
      <circle data-donut-seg="${i}" data-label="${o.label.replace(/"/g,'&quot;')}" data-pct="${o.pct}"
        cx="18" cy="18" r="${r}" fill="transparent"
        stroke="${o.color}" stroke-width="${sw}"
        stroke-dasharray="${o.pct.toFixed(3)} ${(100 - o.pct).toFixed(3)}"
        stroke-dashoffset="${(-offset).toFixed(3)}"
        style="cursor:pointer;transition:stroke-width 120ms;"
      />`;
    offset += o.pct;
    return seg;
  }).join('');
  return `
    <svg id="ownership-donut" viewBox="0 0 36 36" width="${size}" height="${size}" style="transform:rotate(-90deg);overflow:visible;">
      ${segs}
    </svg>`;
}

function wireDonutTooltips() {
  const svg = document.getElementById('ownership-donut');
  if (!svg) return;
  let tip = document.getElementById('rw-donut-tip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'rw-donut-tip';
    tip.style.cssText = [
      'position:fixed',
      'pointer-events:none',
      'background:#0f172a',
      'color:#fff',
      'font-family:Inter,sans-serif',
      'font-size:13px',
      'font-weight:600',
      'padding:8px 14px',
      'border-radius:8px',
      'box-shadow:0 4px 14px rgba(15,23,42,.35)',
      'white-space:nowrap',
      'opacity:0',
      'transform:translate(-50%,-100%)',
      'transition:opacity 120ms',
      'z-index:9999',
    ].join(';');
    tip.innerHTML = `<span data-tip-text></span><span aria-hidden="true" style="position:absolute;left:50%;top:100%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid #0f172a;"></span>`;
    document.body.appendChild(tip);
  }
  const tipText = tip.querySelector('[data-tip-text]');

  svg.querySelectorAll('[data-donut-seg]').forEach(seg => {
    seg.addEventListener('mouseenter', () => {
      seg.style.strokeWidth = '8';
      tipText.textContent = `${seg.dataset.label} (${seg.dataset.pct}%)`;
      tip.style.opacity = '1';
    });
    seg.addEventListener('mousemove', (e) => {
      tip.style.left = e.clientX + 'px';
      tip.style.top  = (e.clientY - 12) + 'px';
    });
    seg.addEventListener('mouseleave', () => {
      seg.style.strokeWidth = '6';
      tip.style.opacity = '0';
    });
  });
}

/* ---- Status colour ---- */

            </div>
            <div class="flex items-baseline gap-2">
              <span class="text-ink-500 shrink-0">Status:</span>
              <span class="font-semibold" style="color:${statusColor}">${ASSET.status}</span>
            </div>
          </div>
          <div>
            <div class="text-[11px] text-ink-500 mb-2 font-medium">Portfolios:</div>
            <div class="flex flex-col gap-2">

                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
                Offshore Energy Assets
              </a>
              <a href="#" class="text-[12px] text-brand-600 font-medium flex items-center gap-1.5 hover:underline">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
                Clarkson Portfolio

            </div>
          </div>
        </div>
      </div>

      <!-- Details -->
      <div class="bg-white rounded-xl border border-ink-200 shadow-card flex flex-col">

            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            <span>ADD TO PORTFOLIO</span>
          </button>
        </div>
      </div>

      <!-- Ownership Structure -->
      <div class="bg-white rounded-xl border border-ink-200 shadow-card">

        <div class="p-3 flex-1 overflow-y-auto scroll-thin">
          <div class="grid grid-cols-2 gap-2">
            ${[
              ['images/arvind-vallabh-rqWWhKzVCaU-unsplash.jpg', 'MOPU deck view'],
              ['images/sheng-hu-0wsMNnEFaTo-unsplash.jpg',       'Platform aerial'],
              ['images/jonathan-gong-EqFU9IjTBQQ-unsplash.jpg',  'Subsea equipment'],
              ['images/matt-brown-rEJ4CpagzV0-unsplash.jpg',     'Riser system'],
              ['images/dean-brierley-2987j1bsfxo-unsplash.jpg',  'Accommodation block'],
              ['images/zach-theo-guADzpF9pDI-unsplash.jpg',      'Flare stack'],
            ].map(([src, lbl], i) => `
              <div data-lightbox-idx="${i}" style="border-radius:8px;overflow:hidden;position:relative;height:130px;cursor:pointer;" class="ref-thumb">
                <img src="${src}" alt="${lbl}" style="width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s ease;" />
                <div style="position:absolute;bottom:0;left:0;right:0;padding:4px 7px;background:linear-gradient(transparent,rgba(15,23,42,.55));font-size:9px;font-weight:600;color:#fff;letter-spacing:.03em;">${lbl}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>

  </div>`;
}

/* ---- Map ---- */
const MAP_TYPES = {
  satellite: { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', bg:'#0b1e2e' },
  street:    { url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',                       bg:'#f8fafc' },
  dark:      { url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',                                  bg:'#0b1e2e' },
  light:     { url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',                                 bg:'#e0ebe9' },
};
let currentMapType = 'satellite';
let mapTile = null;

function setMapType(type) {
  if (!detailMap || !MAP_TYPES[type]) return;
  currentMapType = type;
  if (mapTile) detailMap.removeLayer(mapTile);
  mapTile = L.tileLayer(MAP_TYPES[type].url, { attribution:'', subdomains:'abcd', maxZoom:19 }).addTo(detailMap);
  const mapEl = document.getElementById('asset-detail-map');
  if (mapEl) mapEl.style.background = MAP_TYPES[type].bg;
  document.querySelectorAll('[data-map-type]').forEach(b => {
    const isOn = b.dataset.mapType === type;
    const c = b.querySelector('[data-check]');
    if (c) c.style.opacity = isOn ? '1' : '0';
  });
}

function buildAssetPopupHTML(m) {
  const statusColor = m.status === 'Operational' ? '#10b981' :
                      m.status === 'Under Maintenance' ? '#f59e0b' : '#94a3b8';
  const row = (label, val, color) =>
    `<div><div style="font-size:11px;color:#64748b;margin-bottom:2px;">${label}:</div><div style="font-size:13px;font-weight:600;color:${color||'#0f172a'};">${val ?? '—'}</div></div>`;
  const subtitle = m.assetType || m.type || '';
  return `
    <div style="background:var(--brand-600,#2563eb);padding:12px 36px 12px 16px;">
      <div style="color:#fff;font-weight:700;font-size:13px;line-height:1.35;">${m.fullName || m.name || ''}</div>
      <div style="color:rgba(255,255,255,.75);font-size:11px;font-weight:500;margin-top:2px;">${subtitle}</div>
    </div>
    <div style="padding:14px 16px 6px;display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;">
      ${row('Operator', m.operator)}
      ${row('Country', m.country)}
      ${row('Coordinates', m.coords)}
      ${row('Water Depth', m.waterDepth)}
      ${row('Status', m.status, statusColor)}
      ${row('Production', m.production)}
    </div>
    <div style="padding:4px 16px 14px;display:flex;flex-direction:column;gap:8px;">
      ${row('Commissioned', m.commissioned)}
      ${row('Policy Type', m.policyType)}
      ${row('Field', m.field)}
    </div>`;
}

let detailMap = null;
function initDetailMap() {
  const el = document.getElementById('asset-detail-map');
  if (!el) return;
  if (detailMap) { detailMap.remove(); detailMap = null; }

  detailMap = L.map(el, {
    center: [GEO.lat, GEO.lng],
    zoom: 6,
    zoomControl: true,
    scrollWheelZoom: true,
  });

  setMapType(currentMapType);

  const icon = L.divIcon({
    className:'',
    html:`<div style="width:14px;height:14px;border-radius:50%;background:${ASSET.color||'#ea580c'};border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.45);"></div>`,
    iconSize:[14,14], iconAnchor:[7,7],
  });
  L.marker([GEO.lat, GEO.lng], { icon })
    .bindPopup(buildAssetPopupHTML(ASSET), { className:'asset-popup', maxWidth:300, minWidth:300, closeButton:true, autoPanPadding:[30,30] })
    .addTo(detailMap);

  const zin  = el.querySelector('.leaflet-control-zoom-in');
  const zout = el.querySelector('.leaflet-control-zoom-out');
  if (zin)  zin.innerHTML  = `<span style="font-size:18px;line-height:30px;display:block;text-align:center;">+</span>`;
  if (zout) zout.innerHTML = `<span style="font-size:20px;line-height:30px;display:block;text-align:center;">&minus;</span>`;

  /* Layers menu */
  const layersBtn  = document.getElementById('map-layers-btn');
  const layersMenu = document.getElementById('map-layers-menu');
  if (layersBtn && layersMenu) {
    layersBtn.onclick = (e) => { e.stopPropagation(); layersMenu.classList.toggle('hidden'); };
    layersMenu.onclick = (e) => e.stopPropagation();
    layersMenu.querySelectorAll('[data-map-type]').forEach(opt => {
      opt.onclick = (e) => { e.stopPropagation(); setMapType(opt.dataset.mapType); layersMenu.classList.add('hidden'); };
    });
    document.addEventListener('click', () => layersMenu.classList.add('hidden'));
  }

  /* Fullscreen */
  const fsBtn = document.getElementById('map-fs-btn');
  if (fsBtn) fsBtn.onclick = () => {
    const wrap = fsBtn.closest('.relative');
    if (!wrap) return;
    const isFs = wrap.classList.toggle('fixed-fullscreen');
    if (isFs) {
      wrap.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#fff;';
      fsBtn.innerHTML = Ico.minimize;
    } else {
      wrap.style.cssText = '';
      wrap.classList.add('flex-1');
      fsBtn.innerHTML = Ico.maximize;
    }
    setTimeout(() => detailMap.invalidateSize(), 200);
  };
}

/* ---- Render ---- */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      ${Content()}
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  setTimeout(initDetailMap, 50);
  wireDonutTooltips();
};
window.render();
</script>
<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" title="Close">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <button class="lb-btn" id="lb-prev" title="Previous">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <img id="lightbox-img" alt="" />
  <button class="lb-btn" id="lb-next" title="Next">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div id="lightbox-caption"></div>
  <div id="lightbox-counter"></div>
</div>
<script>
const LB_IMAGES = [
  { src:'images/arvind-vallabh-rqWWhKzVCaU-unsplash.jpg', lbl:'MOPU deck view' },
  { src:'images/sheng-hu-0wsMNnEFaTo-unsplash.jpg',       lbl:'Platform aerial' },
  { src:'images/jonathan-gong-EqFU9IjTBQQ-unsplash.jpg',  lbl:'Subsea equipment' },
  { src:'images/matt-brown-rEJ4CpagzV0-unsplash.jpg',     lbl:'Riser system' },
  { src:'images/dean-brierley-2987j1bsfxo-unsplash.jpg',  lbl:'Accommodation block' },
  { src:'images/zach-theo-guADzpF9pDI-unsplash.jpg',      lbl:'Flare stack' },
];
let lbIdx = 0;

function lbShow(idx) {
  lbIdx = (idx + LB_IMAGES.length) % LB_IMAGES.length;
  const lb  = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  const cap = document.getElementById('lightbox-caption');
  const ctr = document.getElementById('lightbox-counter');
  img.style.opacity = '0';
  img.src = LB_IMAGES[lbIdx].src;
  img.onload = () => { img.style.opacity = '1'; };
  cap.textContent = LB_IMAGES[lbIdx].lbl;
  ctr.textContent = `${lbIdx + 1} / ${LB_IMAGES.length}`;
  lb.classList.add('is-open');
  document.body.style.overflow = 'hidden';
}

function lbClose() {
  document.getElementById('lightbox').classList.remove('is-open');
  document.body.style.overflow = '';
}

document.getElementById('lb-close').addEventListener('click', lbClose);
document.getElementById('lb-prev').addEventListener('click', () => lbShow(lbIdx - 1));
document.getElementById('lb-next').addEventListener('click', () => lbShow(lbIdx + 1));
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) lbClose(); });
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('is-open')) return;
  if (e.key === 'ArrowLeft')  lbShow(lbIdx - 1);
  if (e.key === 'ArrowRight') lbShow(lbIdx + 1);
  if (e.key === 'Escape')     lbClose();
});

/* Wire thumbnails — re-run after every render */
function wireLightbox() {
  document.querySelectorAll('[data-lightbox-idx]').forEach(el => {
    el.addEventListener('click', () => lbShow(parseInt(el.dataset.lightboxIdx)));
  });
}
// Patch into render so wiring survives re-renders
const _origRender = window.render;
window.render = function() { _origRender(); wireLightbox(); };
wireLightbox();
</script>
</body>
</html>
