  #lightbox-caption { position:absolute; bottom:32px; left:50%; transform:translateX(-50%); color:#fff; font-size:13px; font-weight:600; letter-spacing:.03em; text-shadow:0 1px 4px rgba(0,0,0,.6); white-space:nowrap; }

<script>

  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "density": "comfortable",
    "accent": "blue",

    "showSparklines": true

<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="shared/chrome.js?v=6"></script>
<script>
const SC = window.sharedChrome;
const Ico = SC.I;

/* ---- Load asset from sessionStorage or use default ---- */
const DEFAULT_ASSET = {
  fullName:'Teora Lopes Elevator', assetType:'Mobile Production (MOPU)',
  operator:'Petrobras', country:'Brazil', coords:'24.80S / 44.20W',
  waterDepth:'2,150m', status:'Operational', production:'100,000 bbl/day',
  commissioned:'2017', policyType:'Cargo', field:'Santos Basin',
  lat:-24.8, lng:-44.2, color:'#ea580c'
};

const ASSET = (() => {
  try {
    const raw = sessionStorage.getItem('selectedOffshoreAsset');
    return raw ? JSON.parse(raw) : DEFAULT_ASSET;
  } catch(e) { return DEFAULT_ASSET; }
})();

/* Parse coords string "24.80S / 44.20W" → {lat, lng} */
function parseCoords(str) {
  if (!str) return { lat: ASSET.lat || -24.8, lng: ASSET.lng || -44.2 };
  const m = str.match(/(\d+\.?\d*)([NS])\s*\/\s*(\d+\.?\d*)([EW])/i);
  if (!m) return { lat: ASSET.lat || -24.8, lng: ASSET.lng || -44.2 };
  return {
    lat: parseFloat(m[1]) * (m[2].toUpperCase() === 'S' ? -1 : 1),
    lng: parseFloat(m[3]) * (m[4].toUpperCase() === 'W' ? -1 : 1),
  };
}
const GEO = parseCoords(ASSET.coords);

/* ---- Detail table rows [col1, col2, col3] ---- */
const DETAIL_ROWS = [
  [['Asset Type',        ASSET.assetType],          ['Year Converted / Upgraded', 'N/A'],          ['Turbine Rating (Windfarm)',    'N/A']],
  [['Asset Name',        ASSET.fullName],            ['Flag / Registration State',  'Norway'],       ['Turbine Unit Value',           'N/A']],
  [['Unit ID / CVN / IMO','HSE-2016-NOR'],           ['Class Society',              'DNV GL'],       ['Balance of Plant Value',       'N/A']],
  [['Owner',             'North Sea Energy Holdings'],['Class Notation',            'E0 DYNPOS-AUTRO'],['Project Construction Value', '$1.2B']],
  [['Operator',          ASSET.operator],            ['Hull Material',              'Steel'],         ['Installed Capacity (MW)',      'N/A']],
  [['Location',          'North Sea'],               ['Production Capacity',        '85,000 Bbl/day'],['Insured Capacity (MW)',        'N/A']],
  [['Country Jurisdiction', ASSET.country],          ['Storage Capacity',           '1.3M Bbl'],     ['Year Built',                  '2008']],
  [['Water Depth',       ASSET.waterDepth],          ['Gross Tonnage',              '157,000 GT'],   ['Last Survey',                 'Jun 2023']],
  [['Field',             ASSET.field],               ['Length Overall',             '274m'],          ['Classification Expiry',       '2026-03-01']],
  [['Mooring Type',      'Turret'],                  ['Beam',                       '49m'],           ['IMO Number',                  '9374045']],
  [['Commissioned',      ASSET.commissioned],        ['Draft (m)',                  '22.5m'],         ['Policy Type',                 ASSET.policyType]],
];

/* ---- Ownership data ---- */
const OWNERSHIP = [
  { label:'Total E&P Norge AS',             pct:39.896, color:'#1e3a8a' },
  { label:'ConocoPhillips Skandinavia AS',  pct:35.112, color:'#2563eb' },
  { label:'Vår Energi AS',                  pct:12.388, color:'#60a5fa' },
  { label:'Equinor Energy AS',              pct:7.604,  color:'#1d4ed8' },
  { label:'Petero AS',                      pct:5.0,    color:'#93c5fd' },
];

/* ---- Donut via conic-gradient ---- */
function donutStyle() {
  let cumulative = 0;
  const stops = OWNERSHIP.map(o => {
    const start = cumulative;
    cumulative += o.pct;
    return `${o.color} ${start.toFixed(3)}% ${cumulative.toFixed(3)}%`;
  }).join(', ');
  return `conic-gradient(${stops})`;
}

/* ---- Status colour ---- */
const statusColor = ASSET.status === 'Operational' ? '#10b981' :
                    ASSET.status === 'Under Maintenance' ? '#f59e0b' : '#94a3b8';

/* ---- Page content ---- */
function Content() {
  return `
  <div class="flex-1 overflow-y-auto px-4 lg:px-6 py-4 space-y-3">

    <!-- Row 1: Policy Details | Details | Ownership -->
    <div class="grid gap-3" style="grid-template-columns:minmax(0,1fr) minmax(0,2fr) minmax(0,1fr); align-items:stretch;">

      <!-- Policy Details -->
      <div class="bg-white rounded-xl border border-ink-200 shadow-card">
        <div class="px-4 py-3 border-b border-ink-100">
          <div class="text-sm font-semibold text-ink-900">Policy Details</div>
        </div>
        <div class="p-4 flex flex-col gap-4">
          <div class="rounded-lg border border-blue-100 bg-blue-50 px-4 py-3 text-center">
            <div style="font-size:11px;font-weight:500;color:#64748b;margin-bottom:4px;">Total Insured Value</div>
            <div style="font-size:26px;font-weight:700;color:#2563eb;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1;">$3.5B</div>
          </div>
          <div class="flex flex-col gap-2.5 text-[12px]">
            <div class="flex items-baseline justify-between gap-2">
              <span class="text-ink-500 shrink-0">Coverage Period:</span>
              <span class="font-semibold text-brand-600 text-right tabular-nums">2024-03-01 / 2026-03-01</span>
            </div>
            <div class="flex items-baseline gap-2">
              <span class="text-ink-500 shrink-0">Status:</span>
              <span class="font-semibold" style="color:${statusColor}">${ASSET.status}</span>
            </div>
          </div>
          <div>
            <div class="text-[11px] text-ink-500 mb-2 font-medium">Portfolios:</div>
            <div class="flex flex-col gap-2">
              <a href="#" class="text-[12px] text-brand-600 font-medium flex items-center gap-1.5 hover:underline">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
                Offshore Energy Assets
              </a>
              <a href="#" class="text-[12px] text-brand-600 font-medium flex items-center gap-1.5 hover:underline">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
                Clarkson Portfolio
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Details -->
      <div class="bg-white rounded-xl border border-ink-200 shadow-card flex flex-col">
        <div class="px-4 py-3 border-b border-ink-100 shrink-0">
          <div class="text-sm font-semibold text-ink-900">Details</div>
        </div>
        <div class="overflow-y-auto scroll-thin" style="max-height:268px;">
          ${DETAIL_ROWS.map(row => `
            <div class="dt-row">
              ${row.map(([lbl, val]) => `
                <div class="dt-cell">
                  <div class="dt-label">${lbl}:</div>
                  <div class="dt-value">${val}</div>
                </div>`).join('')}
            </div>`).join('')}
        </div>
        <div class="px-4 py-2.5 border-t border-ink-100 shrink-0 flex justify-center">
          <button class="text-[12px] font-semibold text-ink-600 flex items-center gap-1.5 hover:text-ink-900 transition-colors">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            Add To Portfolio
          </button>
        </div>
      </div>

      <!-- Ownership Structure -->
      <div class="bg-white rounded-xl border border-ink-200 shadow-card">
        <div class="px-4 py-3 border-b border-ink-100">
          <div class="text-sm font-semibold text-ink-900">Ownership Structure</div>
        </div>
        <div class="p-4 flex flex-col items-center gap-4">
          <!-- Donut -->
          <div style="position:relative;width:140px;height:140px;flex-shrink:0;">
            <div style="width:100%;height:100%;border-radius:50%;background:${donutStyle()};"></div>
            <div style="position:absolute;inset:27%;border-radius:50%;background:#fff;"></div>
          </div>
          <!-- Legend -->
          <div class="w-full flex flex-col gap-1.5">
            ${OWNERSHIP.map(o => `
              <div class="flex items-center gap-1.5 text-[11px] text-ink-700 min-w-0">
                <span style="width:8px;height:8px;border-radius:50%;background:${o.color};flex-shrink:0;"></span>
                <span class="truncate">${o.label} (${o.pct}%)</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <!-- Row 2: Asset Location | Reference Images -->
    <div class="grid gap-3" style="grid-template-columns:minmax(0,1fr) minmax(0,1fr); align-items:start;">

      <!-- Asset Location -->
      <div class="bg-white rounded-xl border border-ink-200 shadow-card overflow-hidden flex flex-col" style="height:460px;">
        <div class="px-4 py-3 border-b border-ink-100 shrink-0">
          <div class="text-sm font-semibold text-ink-900">Asset Location</div>
        </div>
        <div class="relative flex-1">
          <div id="asset-detail-map"></div>
          <button class="map-ctrl-btn absolute z-[400]" style="top:12px;left:12px;" title="Fullscreen">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
          <button class="map-ctrl-btn absolute z-[400]" style="top:12px;right:12px;" title="Layers">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
          </button>
        </div>
      </div>

      <!-- Reference Images -->
      <div class="bg-white rounded-xl border border-ink-200 shadow-card flex flex-col" style="height:460px;">
        <div class="px-4 py-3 border-b border-ink-100 shrink-0">
          <div class="text-sm font-semibold text-ink-900">Reference Images</div>
        </div>
        <div class="p-3 flex-1 overflow-y-auto scroll-thin">
          <div class="grid grid-cols-2 gap-2">
            ${[
              ['images/arvind-vallabh-rqWWhKzVCaU-unsplash.jpg', 'MOPU deck view'],
              ['images/sheng-hu-0wsMNnEFaTo-unsplash.jpg',       'Platform aerial'],
              ['images/jonathan-gong-EqFU9IjTBQQ-unsplash.jpg',  'Subsea equipment'],
              ['images/matt-brown-rEJ4CpagzV0-unsplash.jpg',     'Riser system'],
              ['images/dean-brierley-2987j1bsfxo-unsplash.jpg',  'Accommodation block'],
              ['images/zach-theo-guADzpF9pDI-unsplash.jpg',      'Flare stack'],
            ].map(([src, lbl], i) => `
              <div data-lightbox-idx="${i}" style="border-radius:8px;overflow:hidden;position:relative;height:130px;cursor:pointer;" class="ref-thumb">
                <img src="${src}" alt="${lbl}" style="width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s ease;" />
                <div style="position:absolute;bottom:0;left:0;right:0;padding:4px 7px;background:linear-gradient(transparent,rgba(15,23,42,.55));font-size:9px;font-weight:600;color:#fff;letter-spacing:.03em;">${lbl}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>

  </div>`;
}

/* ---- Map ---- */
let detailMap = null;
function initDetailMap() {
  const el = document.getElementById('asset-detail-map');
  if (!el) return;
  if (detailMap) { detailMap.remove(); detailMap = null; }

  detailMap = L.map(el, {
    center: [GEO.lat, GEO.lng],
    zoom: 6,
    zoomControl: true,
    scrollWheelZoom: true,
  });

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution:'', maxZoom:19,
  }).addTo(detailMap);

  const icon = L.divIcon({
    className:'',
    html:`<div style="width:14px;height:14px;border-radius:50%;background:${ASSET.color||'#ea580c'};border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.45);"></div>`,
    iconSize:[14,14], iconAnchor:[7,7],
  });
  L.marker([GEO.lat, GEO.lng], { icon }).addTo(detailMap);

  const zin  = el.querySelector('.leaflet-control-zoom-in');
  const zout = el.querySelector('.leaflet-control-zoom-out');
  if (zin)  zin.innerHTML  = `<span style="font-size:18px;line-height:30px;display:block;text-align:center;">+</span>`;
  if (zout) zout.innerHTML = `<span style="font-size:20px;line-height:30px;display:block;text-align:center;">&minus;</span>`;
}

/* ---- Render ---- */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      ${Content()}
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  setTimeout(initDetailMap, 50);
};
window.render();
</script>
<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" title="Close">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <button class="lb-btn" id="lb-prev" title="Previous">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <img id="lightbox-img" alt="" />
  <button class="lb-btn" id="lb-next" title="Next">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div id="lightbox-caption"></div>
  <div id="lightbox-counter"></div>
</div>
<script>
const LB_IMAGES = [
  { src:'images/arvind-vallabh-rqWWhKzVCaU-unsplash.jpg', lbl:'MOPU deck view' },
  { src:'images/sheng-hu-0wsMNnEFaTo-unsplash.jpg',       lbl:'Platform aerial' },
  { src:'images/jonathan-gong-EqFU9IjTBQQ-unsplash.jpg',  lbl:'Subsea equipment' },
  { src:'images/matt-brown-rEJ4CpagzV0-unsplash.jpg',     lbl:'Riser system' },
  { src:'images/dean-brierley-2987j1bsfxo-unsplash.jpg',  lbl:'Accommodation block' },
  { src:'images/zach-theo-guADzpF9pDI-unsplash.jpg',      lbl:'Flare stack' },
];
let lbIdx = 0;

function lbShow(idx) {
  lbIdx = (idx + LB_IMAGES.length) % LB_IMAGES.length;
  const lb  = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  const cap = document.getElementById('lightbox-caption');
  const ctr = document.getElementById('lightbox-counter');
  img.style.opacity = '0';
  img.src = LB_IMAGES[lbIdx].src;
  img.onload = () => { img.style.opacity = '1'; };
  cap.textContent = LB_IMAGES[lbIdx].lbl;
  ctr.textContent = `${lbIdx + 1} / ${LB_IMAGES.length}`;
  lb.classList.add('is-open');
  document.body.style.overflow = 'hidden';
}

function lbClose() {
  document.getElementById('lightbox').classList.remove('is-open');
  document.body.style.overflow = '';
}

document.getElementById('lb-close').addEventListener('click', lbClose);
document.getElementById('lb-prev').addEventListener('click', () => lbShow(lbIdx - 1));
document.getElementById('lb-next').addEventListener('click', () => lbShow(lbIdx + 1));
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) lbClose(); });
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('is-open')) return;
  if (e.key === 'ArrowLeft')  lbShow(lbIdx - 1);
  if (e.key === 'ArrowRight') lbShow(lbIdx + 1);
  if (e.key === 'Escape')     lbClose();
});

/* Wire thumbnails — re-run after every render */
function wireLightbox() {
  document.querySelectorAll('[data-lightbox-idx]').forEach(el => {
    el.addEventListener('click', () => lbShow(parseInt(el.dataset.lightboxIdx)));
  });
}
// Patch into render so wiring survives re-renders
const _origRender = window.render;
window.render = function() { _origRender(); wireLightbox(); };
wireLightbox();
</script>
</body>
</html>
