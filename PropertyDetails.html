<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Property Details — Property — Real World</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body { font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .text-ink-900{color:#0f172a}.text-ink-700{color:#334155}
  .text-ink-600{color:#475569}.text-ink-500{color:#64748b}.text-ink-400{color:#94a3b8}
  .bg-ink-100{background:#f1f5f9}.bg-ink-50{background:#f8fafc}
  .border-ink-100{border-color:#f1f5f9}.border-ink-200{border-color:#e2e8f0}
  .shadow-card{box-shadow:0 1px 2px rgba(15,23,42,.08),0 0 0 1px rgba(15,23,42,.02)}
  .text-brand-600{color:#2563eb}
  .scroll-thin::-webkit-scrollbar{width:5px}.scroll-thin::-webkit-scrollbar-track{background:transparent}
  .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
  .tracking-micro{letter-spacing:0.04em}
  /* Property map popup */
  .prop-popup .leaflet-popup-content-wrapper { padding:0; border-radius:12px; overflow:hidden; box-shadow:0 10px 30px rgba(15,23,42,.25); }
  .prop-popup .leaflet-popup-content { margin:0; width:280px !important; font-family:'Inter',sans-serif; }
  .prop-popup .leaflet-popup-tip { background:#fff; }
  .prop-popup .leaflet-popup-close-button { color:#fff !important; top:8px !important; right:10px !important; font-size:22px !important; font-weight:300 !important; width:24px !important; height:24px !important; opacity:.85; }
  .prop-popup .leaflet-popup-close-button:hover { background:rgba(255,255,255,.2) !important; color:#fff !important; opacity:1; }
  .pp { background:#fff; color:#0f172a; }
  .pp-header { background:#2563eb; color:#fff; padding:12px 14px 10px; }
  .pp-title { font-size:14px; font-weight:700; line-height:1.2; }
  .pp-cat { font-size:11px; font-weight:500; opacity:.75; margin-left:6px; }
  .pp-body { padding:4px 0 10px; }
  .pp-row { display:flex; align-items:center; justify-content:space-between; padding:7px 14px; border-bottom:1px solid #f1f5f9; font-size:12.5px; }
  .pp-row:last-child { border-bottom:0; }
  .pp-k { color:#64748b; font-weight:500; }
  .pp-v { font-weight:600; color:#0f172a; text-align:right; }
  .pi-grid { display:grid; grid-template-columns:repeat(2,1fr); }
  .pi-cell { padding:14px 18px; border-bottom:1px solid #f1f5f9; }
  .pi-cell:not(:nth-child(2n)) { border-right:1px solid #f1f5f9; }
  .pi-label { font-size:11px; color:#64748b; font-weight:600; display:flex; align-items:center; gap:5px; margin-bottom:5px; }
  .pi-value { font-size:14px; font-weight:700; color:#0f172a; }
  .pi-value.muted { color:#94a3b8; font-weight:500; }
  /* Map */
  #prop-detail-map { position:absolute; inset:0; background:#0b1e2e; }
  .leaflet-control-zoom,.leaflet-bar { border:1px solid #e2e8f0 !important; box-shadow:0 1px 2px rgba(15,23,42,.08) !important; border-radius:8px !important; overflow:hidden; }
  .leaflet-bar a { background:#fff !important; color:#334155 !important; line-height:30px !important; }
  .leaflet-bar a:hover { background:#f1f5f9 !important; }
  .leaflet-top.leaflet-left { top:48px !important; }
  .map-btn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:#fff; border:1px solid #e2e8f0; border-radius:8px; color:#334155; box-shadow:0 1px 2px rgba(15,23,42,.08); cursor:pointer; flex-shrink:0; }
  .map-btn:hover { background:#f1f5f9; }
  /* Layers menu */
  .map-type-option:hover { background:#f8fafc; }
  /* Flag badge */
  .flag-badge { display:inline-flex; align-items:center; gap:5px; background:#eff6ff; border:1px solid #bfdbfe; border-radius:999px; padding:2px 8px 2px 4px; }
</style>
</head>
<body class="bg-ink-100 text-ink-900 antialiased" data-density="compact">
<div id="app" class="h-screen w-full flex overflow-hidden"></div>

<script>
window.PAGE = { id:'property', title:'Property', crumb:'Property Details' };
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "accent": "blue",
  "sidebarExpanded": false,
  "showSparklines": true
}/*EDITMODE-END*/;
</script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="shared/chrome.js?v=4"></script>
<script>
const SC = window.sharedChrome;
const Ico = SC.I;

/* ---- Load property from sessionStorage ---- */
const DEFAULT_PROP = {
  name:'Empire State Building', cat:'Commercial', location:'New York, USA',
  value:'$2.1B', occupancy:'94%', size:'257,211 sq ft',
  risk:'Low', riskColor:'#16a34a', status:'Operational', statusColor:'#16a34a',
  inspection:'2024-10-14', lat:40.758, lng:-73.985, type:'blue',
};
const PROP = (() => {
  try { const r = sessionStorage.getItem('selectedProperty'); return r ? { ...DEFAULT_PROP, ...JSON.parse(r) } : DEFAULT_PROP; }
  catch { return DEFAULT_PROP; }
})();

/* ---- Country code helper ---- */
const COUNTRY_MAP = {
  'USA':'US','UK':'GB','Japan':'JP','UAE':'AE','Singapore':'SG',
  'Hong Kong':'HK','Germany':'DE','Australia':'AU','France':'FR',
  'South Africa':'ZA',
};
function countryCode(loc) {
  for (const [k,v] of Object.entries(COUNTRY_MAP)) {
    if (loc && loc.includes(k)) return v;
  }
  return null;
}
function cityFromLoc(loc) {
  return loc ? loc.split(',')[0].trim() : 'N/A';
}
function countryFromLoc(loc) {
  if (!loc) return 'N/A';
  const parts = loc.split(',');
  return parts.length > 1 ? parts[parts.length - 1].trim() : loc;
}

/* ---- SVG icons (inline, small) ---- */
const icoVal   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`;
const icoDesc  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`;
const icoNav   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>`;
const icoCal   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
const icoYr    = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>`;
const icoGlobe = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
const icoPin   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
const icoCity  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/></svg>`;
const icoHome  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
const icoMail  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>`;
const icoFolder= `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;
const icoCloud = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>`;
const icoBldg  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/></svg>`;
const icoMapPin= `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

/* ---- Derived fields ---- */
const cc   = countryCode(PROP.location);
const city = cityFromLoc(PROP.location);
const ctry = countryFromLoc(PROP.location);
const desc = `${PROP.cat} property in ${city}`;
const latFmt = PROP.lat ? PROP.lat.toFixed(4) + '°' : 'N/A';
const lngFmt = PROP.lng ? PROP.lng.toFixed(4) + '°' : 'N/A';

/* ---- Cards ---- */
function CardPropertyInfo() {
  const flagHtml = cc
    ? `<span class="flag-badge"><img src="https://flagcdn.com/w20/${cc.toLowerCase()}.png" width="16" height="11" style="border-radius:2px;object-fit:cover;" /><span style="font-size:12px;font-weight:700;color:#1d4ed8;">${ctry}</span></span>`
    : `<span class="pi-value">${ctry}</span>`;

  return `
  <div class="bg-white rounded-xl border border-ink-200 shadow-card overflow-hidden">
    <div class="px-4 py-3 border-b border-ink-100 flex items-center gap-2">
      ${icoBldg}
      <span class="text-sm font-semibold text-ink-900">Property Information</span>
    </div>
    <div class="pi-grid">
      <div class="pi-cell">
        <div class="pi-label">${icoVal} Value:</div>
        <div class="pi-value">${PROP.value}</div>
      </div>
      <div class="pi-cell">
        <div class="pi-label">${icoDesc} Description:</div>
        <div class="pi-value">${desc}</div>
      </div>
      <div class="pi-cell">
        <div class="pi-label">${icoNav} Lat/Lng:</div>
        <div class="pi-value" style="font-size:13px;">${latFmt}, ${lngFmt}</div>
      </div>
      <div class="pi-cell">
        <div class="pi-label">${icoCal} Date last Modified:</div>
        <div class="pi-value">${PROP.inspection}</div>
      </div>
      <div class="pi-cell">
        <div class="pi-label">${icoYr} Year Built:</div>
        <div class="pi-value">2010</div>
      </div>
      <div class="pi-cell">
        <div class="pi-label">${icoGlobe} Country:</div>
        <div class="pi-value">${flagHtml}</div>
      </div>
      <div class="pi-cell">
        <div class="pi-label">${icoPin} State:</div>
        <div class="pi-value muted">N/A</div>
      </div>
      <div class="pi-cell">
        <div class="pi-label">${icoCity} City:</div>
        <div class="pi-value">${city}</div>
      </div>
      <div class="pi-cell">
        <div class="pi-label">${icoHome} Address:</div>
        <div class="pi-value muted">N/A</div>
      </div>
      <div class="pi-cell" style="border-bottom:0;">
        <div class="pi-label">${icoMail} Postal Code:</div>
        <div class="pi-value muted">N/A</div>
      </div>
      <div class="pi-cell" style="border-bottom:0;grid-column:span 2;">
        <div class="pi-label">${icoFolder} In portfolios:</div>
        <div class="pi-value" style="font-size:13px;">Manhattan Commercial, Global Properties</div>
      </div>
    </div>
  </div>`;
}

function CardWeatherRisk() {
  return `
  <div class="bg-white rounded-xl border border-ink-200 shadow-card overflow-hidden">
    <div class="px-4 py-3 border-b border-ink-100 flex items-center gap-2">
      ${icoCloud}
      <span class="text-sm font-semibold text-ink-900">Weather Risk</span>
    </div>
    <div class="px-4 py-4 text-sm text-ink-500">
      No weather risk to this property location at this time!
    </div>
  </div>`;
}

function CardMap() {
  const fsIco  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>`;
  const stgIco = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`;
  return `
  <div class="bg-white rounded-xl border border-ink-200 shadow-card overflow-hidden flex flex-col h-full">
    <div class="px-4 py-3 border-b border-ink-100 flex items-center gap-2 shrink-0">
      ${icoMapPin}
      <span class="text-sm font-semibold text-ink-900">Property Location</span>
    </div>
    <div class="relative flex-1" style="min-height:400px;">
      <div id="prop-detail-map"></div>
      <button class="map-btn absolute z-[400]" style="top:12px;left:12px;" title="Fullscreen">${fsIco}</button>
      <div class="absolute z-[400]" style="top:12px;right:12px;">
        <div class="relative">
          <button id="map-layers-btn" class="map-btn" title="Map type">${stgIco}</button>
          <div id="map-layers-menu" style="display:none;position:absolute;top:38px;right:0;width:150px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 4px 12px rgba(15,23,42,.12);overflow:hidden;">
            <div style="padding:6px 10px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #f1f5f9;">Map Type</div>
            <div class="map-type-option" data-type="satellite" style="padding:8px 12px;font-size:12px;font-weight:600;color:#0f172a;cursor:pointer;display:flex;align-items:center;gap:8px;"><span style="width:8px;height:8px;border-radius:2px;background:#0b1e2e;flex-shrink:0;"></span>Satellite</div>
            <div class="map-type-option" data-type="street"    style="padding:8px 12px;font-size:12px;font-weight:600;color:#0f172a;cursor:pointer;display:flex;align-items:center;gap:8px;"><span style="width:8px;height:8px;border-radius:2px;background:#a8d5a2;flex-shrink:0;"></span>Street</div>
            <div class="map-type-option" data-type="dark"      style="padding:8px 12px;font-size:12px;font-weight:600;color:#0f172a;cursor:pointer;display:flex;align-items:center;gap:8px;"><span style="width:8px;height:8px;border-radius:2px;background:#1a1a2e;flex-shrink:0;"></span>Dark</div>
            <div class="map-type-option" data-type="light"     style="padding:8px 12px;font-size:12px;font-weight:600;color:#0f172a;cursor:pointer;display:flex;align-items:center;gap:8px;"><span style="width:8px;height:8px;border-radius:2px;background:#e8e8e8;border:1px solid #ccc;flex-shrink:0;"></span>Light</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ---- Content ---- */
function Content() {
  return `
  <div class="flex-1 overflow-y-auto scroll-thin px-4 lg:px-6 py-4">
    <div class="grid gap-3 h-full" style="grid-template-columns:minmax(0,5fr) minmax(0,7fr);align-items:start;">
      <div class="flex flex-col gap-3">
        ${CardPropertyInfo()}
        ${CardWeatherRisk()}
      </div>
      <div style="height:calc(100vh - 112px);">
        ${CardMap()}
      </div>
    </div>
  </div>`;
}

/* ---- Map ---- */
let propMap = null;
let propTile = null;

const TILES = {
  satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  street:    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  dark:      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  light:     'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
};

function setMapType(type) {
  if (!propMap) return;
  if (propTile) propMap.removeLayer(propTile);
  propTile = L.tileLayer(TILES[type], { attribution:'', maxZoom:19 }).addTo(propMap);
  propTile.bringToBack();
  document.querySelectorAll('.map-type-option').forEach(el => {
    el.style.background = el.dataset.type === type ? '#f1f5f9' : '';
  });
}

function initMap() {
  const el = document.getElementById('prop-detail-map');
  if (!el) return;
  if (propMap) { propMap.remove(); propMap = null; propTile = null; }

  propMap = L.map(el, {
    center: [PROP.lat || 40.758, PROP.lng || -73.985],
    zoom: 16,
    zoomControl: true,
    scrollWheelZoom: true,
  });
  setMapType('satellite');

  /* Building marker */
  const bldgSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/></svg>`;
  const icon = L.divIcon({
    className:'',
    html:`<div style="width:32px;height:32px;border-radius:6px;background:#2563eb;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;">${bldgSvg}</div>`,
    iconSize:[32,32], iconAnchor:[16,16],
  });
  /* Building marker popup */
  const popupHTML = `
  <div class="pp">
    <div class="pp-header">
      <span class="pp-title">${PROP.name}</span>
      <span class="pp-cat">· ${PROP.cat}</span>
    </div>
    <div class="pp-body">
      <div class="pp-row"><span class="pp-k">Location</span><span class="pp-v">${PROP.location}</span></div>
      <div class="pp-row"><span class="pp-k">Value</span><span class="pp-v">${PROP.value}</span></div>
      <div class="pp-row"><span class="pp-k">Occupancy</span><span class="pp-v">${PROP.occupancy}</span></div>
      <div class="pp-row"><span class="pp-k">Size</span><span class="pp-v">${PROP.size}</span></div>
      <div class="pp-row"><span class="pp-k">Risk Rating</span><span class="pp-v" style="color:${PROP.riskColor}">${PROP.risk}</span></div>
      <div class="pp-row"><span class="pp-k">Status</span><span class="pp-v" style="color:${PROP.statusColor}">${PROP.status}</span></div>
      <div class="pp-row"><span class="pp-k">Last Inspection</span><span class="pp-v">${PROP.inspection}</span></div>
    </div>
  </div>`;

  L.marker([PROP.lat || 40.758, PROP.lng || -73.985], { icon })
    .bindPopup(popupHTML, { className:'prop-popup', maxWidth:280, minWidth:280, closeButton:true, autoPanPadding:[30,30] })
    .addTo(propMap);

  /* Layers toggle */
  const btn  = document.getElementById('map-layers-btn');
  const menu = document.getElementById('map-layers-menu');
  if (btn && menu) {
    btn.addEventListener('click', e => { e.stopPropagation(); menu.style.display = menu.style.display === 'none' ? 'block' : 'none'; });
    document.addEventListener('click', () => { menu.style.display = 'none'; });
    menu.addEventListener('click', e => e.stopPropagation());
    document.querySelectorAll('.map-type-option').forEach(opt => {
      opt.addEventListener('mouseenter', () => { if (opt.style.background !== 'rgb(241, 245, 249)') opt.style.background = '#f8fafc'; });
      opt.addEventListener('mouseleave', () => { if (opt.style.background !== 'rgb(241, 245, 249)') opt.style.background = ''; });
      opt.addEventListener('click', () => { setMapType(opt.dataset.type); menu.style.display = 'none'; });
    });
  }

  /* Zoom icons */
  const zin  = el.querySelector('.leaflet-control-zoom-in');
  const zout = el.querySelector('.leaflet-control-zoom-out');
  if (zin)  zin.innerHTML  = `<span style="font-size:18px;line-height:30px;display:block;text-align:center;">+</span>`;
  if (zout) zout.innerHTML = `<span style="font-size:20px;line-height:30px;display:block;text-align:center;">&minus;</span>`;
}

/* ---- Render ---- */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      ${Content()}
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  setTimeout(initMap, 50);
};
window.render();
</script>
