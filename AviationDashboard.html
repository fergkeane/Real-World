/* ----------- HELPERS ----------- */
function flag(cc, size='sm') {
  if (!cc) return '';
  const h = size === 'md' ? 20 : 14;
  const w = size === 'md' ? 28 : 20;
  return `<img src="https://flagcdn.com/w40/${cc}.png" srcset="https://flagcdn.com/w80/${cc}.png 2x" alt="${cc.toUpperCase()}" width="${w}" height="${h}" class="inline-block rounded-[2px] ring-1 ring-ink-200/80 object-cover" style="width:${w}px;height:${h}px" loading="lazy" />`;
}

function tabs(tabs, active, groupAttr) {
  return `
  <div class="ds-tabs is-stretch" data-tab-group="${groupAttr}">
    <span class="ds-tab-pill is-init" data-tab-pill></span>
    ${tabs.map(t => `
      <button ${groupAttr}="${t}" aria-selected="${t===active}" class="ds-tab" style="font-size:12px; padding:6px 12px;">
        <span class="ds-tab-label">${t}</span>
      </button>
    `).join('')}
  </div>`;
}
function positionTabPills() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.ds-tabs').forEach(group => {
      const pill   = group.querySelector('[data-tab-pill]');
      const active = group.querySelector('.ds-tab[aria-selected="true"]');
      if (!pill || !active) return;
      const gRect = group.getBoundingClientRect();
      const aRect = active.getBoundingClientRect();
      if (!aRect.width) return;
      pill.style.width     = aRect.width + 'px';
      pill.style.transform = `translateX(${aRect.left - gRect.left}px)`;
      requestAnimationFrame(() => pill.classList.remove('is-init'));
    });
  });
}

        return `

/* ----------- MAP ----------- */
let map = null;
let currentMapType = 'satellite';
let tileLayer = null;

const MAP_TYPES = {
  satellite: { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', bg: '#0b1e2e' },
  street:    { url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', bg: '#f8fafc' },
  dark:      { url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', bg: '#0b1e2e' },
  light:     { url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', bg: '#e0ebe9' },
};

function setMapType(type) {
  if (!map || !MAP_TYPES[type]) return;
  currentMapType = type;
  if (tileLayer) map.removeLayer(tileLayer);
  tileLayer = L.tileLayer(MAP_TYPES[type].url, { attribution: '', subdomains: 'abcd', maxZoom: 19 }).addTo(map);
  document.getElementById('avia-map').style.background = MAP_TYPES[type].bg;
  document.querySelectorAll('[data-map-type]').forEach(b => {
    const isOn = b.dataset.mapType === type;
    const lbl = b.querySelector('[data-label]');
    const chk = b.querySelector('[data-check]');
    if (lbl) lbl.style.fontWeight = isOn ? '700' : '400';
    if (chk) chk.style.opacity = isOn ? '1' : '0';
  });
}

function initMap() {
  const c = document.getElementById('avia-map');
  if (!c) return;

  // If map exists but container was torn down by re-render, destroy it
  if (map) {
    if (!document.body.contains(map.getContainer())) {
      map.remove(); map = null; tileLayer = null;
    } else {
      map.invalidateSize();
      return;
    }
  }
  map = L.map(c, {
    center: [30, 20],
    zoom: 2,
    minZoom: 2,
    maxZoom: 6,
    zoomControl: true,
    scrollWheelZoom: true,
  });
  setMapType(currentMapType);

  // Airports
  AIRPORTS_LATLNG.forEach(a => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="airport-icon"><svg viewBox="0 0 24 24" class="w-4 h-4 text-white" fill="currentColor"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg></div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 16],
    });
    L.marker([a.lat, a.lng], { icon })
      .bindPopup(buildAirportPopupHTML(a), { className:'avia-popup', maxWidth:320, minWidth:300, closeButton:true, autoPanPadding:[30,30] })
      .bindTooltip(buildAirportTooltipHTML(a), { className:'airport-tip', direction:'top', offset:[0,-14], opacity:1 })
      .on('popupopen', () => { sessionStorage.setItem('selectedAirport', JSON.stringify(a)); })
      .addTo(map);
  });

  // Planes
  const planeMarkers = [];
  PLANES.forEach((p, i) => {
    const planeSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>`;
    const icon = L.divIcon({
      className: '',
      html: `<div style="transform:rotate(${p.rot}deg); color:#eab308; width:24px; height:24px; display:flex; align-items:center; justify-content:center; filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">${planeSvg}</div>`,
      iconSize: [24, 24],
      iconAnchor: [12, 12],
    });
    const marker = L.marker([p.lat, p.lng], { icon })
      .bindPopup(buildFlightPopupHTML(p), { className:'avia-popup', maxWidth:320, minWidth:300, closeButton:true, autoPanPadding:[30,30] })
      .bindTooltip(buildFlightTooltipHTML(p), { className:'airport-tip', direction:'top', offset:[0,-12], opacity:1 })
      .on('popupopen', () => { try { sessionStorage.setItem('selectedAircraft', JSON.stringify(p)); } catch(e){} })
      .addTo(map);
    marker._portfolio = PORTFOLIOS[i % PORTFOLIOS.length].name;
    planeMarkers.push(marker);
  });

  function applyAviationFilter() {
    planeMarkers.forEach(m => {
      const show = state.portfolioFilter.has(m._portfolio);
      if (show && !map.hasLayer(m)) m.addTo(map);
      if (!show && map.hasLayer(m)) map.removeLayer(m);
    });
  }
  applyAviationFilter();

  // Custom zoom controls
  const zin = document.querySelector('.leaflet-control-zoom-in');
  const zout = document.querySelector('.leaflet-control-zoom-out');
  if (zin) zin.innerHTML = `<span class="inline-flex items-center justify-center h-full w-full">${Ico.plus}</span>`;
  if (zout) zout.innerHTML = `<span class="inline-flex items-center justify-center h-full w-full">${Ico.minus}</span>`;

  // Fullscreen toggle
  const fsBtn = document.getElementById('map-fullscreen');
  const container = document.getElementById('map-container');
  if (fsBtn && container) {
    fsBtn.onclick = () => {
      const isFs = container.classList.toggle('is-fullscreen');
      fsBtn.innerHTML = isFs ? Ico.minimize : Ico.maximize;
      fsBtn.title = isFs ? 'Exit fullscreen' : 'Toggle fullscreen';
      document.body.style.overflow = isFs ? 'hidden' : '';
      setTimeout(() => map.invalidateSize(), 260);
    };
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && container.classList.contains('is-fullscreen')) fsBtn.onclick();
    });
  }

  // Map type selector
  const layersBtn = document.getElementById('map-layers-btn');
  const layersMenu = document.getElementById('map-layers-menu');
  if (layersBtn && layersMenu) {
    layersBtn.onclick = (e) => { e.stopPropagation(); layersMenu.classList.toggle('hidden'); portfolioMenu && portfolioMenu.classList.add('hidden'); };
    layersMenu.querySelectorAll('[data-map-type]').forEach(opt => {
      opt.onclick = (e) => { e.stopPropagation(); setMapType(opt.dataset.mapType); layersMenu.classList.add('hidden'); };
    });
    document.addEventListener('click', () => layersMenu.classList.add('hidden'));
  }

  // Portfolio filter
  const portfolioBtn  = document.getElementById('map-portfolio-btn');
  const portfolioMenu = document.getElementById('map-portfolio-menu');
  if (portfolioBtn && portfolioMenu) {
    const syncPortfolioUI = () => {
      portfolioMenu.querySelectorAll('.po-row').forEach(row => {
        row.querySelector('.po-cb').checked = state.portfolioFilter.has(row.dataset.pfolio);
      });
    };
    portfolioBtn.onclick = (e) => { e.stopPropagation(); portfolioMenu.classList.toggle('hidden'); layersMenu && layersMenu.classList.add('hidden'); };
    portfolioMenu.onclick = (e) => e.stopPropagation();
    portfolioMenu.querySelectorAll('.po-row').forEach(row => {
      row.onclick = (e) => {
        e.stopPropagation();
        const p = row.dataset.pfolio;
        if (state.portfolioFilter.has(p)) state.portfolioFilter.delete(p); else state.portfolioFilter.add(p);
        syncPortfolioUI(); applyAviationFilter();
      };
    });
    const poAll  = document.getElementById('po-all');
    const poNone = document.getElementById('po-none');
    if (poAll)  poAll.onclick  = (e) => { e.stopPropagation(); state.portfolioFilter = new Set(PORTFOLIOS.map(p=>p.name)); syncPortfolioUI(); applyAviationFilter(); };
    if (poNone) poNone.onclick = (e) => { e.stopPropagation(); state.portfolioFilter = new Set();                          syncPortfolioUI(); applyAviationFilter(); };
    document.addEventListener('click', () => portfolioMenu.classList.add('hidden'));
  }
  setMapType('satellite');
}

/* ----------- CONTENT ----------- */
function Content() {
  return `
  <div class="px-4 lg:px-6 py-4 space-y-3">
    <section class="grid grid-cols-1 lg:grid-cols-3 gap-3 avia-top-row">
      ${PortfolioCard()}
      ${AirportCard()}
      ${NotamCard()}
    </section>
    <section class="bg-white rounded-xl border border-ink-200 shadow-card overflow-hidden flex flex-col" id="map-container" style="height:calc(100vh - 380px); min-height:400px;">
      <div class="p-3 border-b border-ink-100 flex items-center justify-between gap-3 flex-wrap shrink-0">
        <div class="flex items-center gap-2">
          <div class="ds-tabs" data-tab-group="data-view">
            <span class="ds-tab-pill is-init" data-tab-pill></span>
            <button data-view="Map"  aria-selected="${state.viewMode==='Map'}"  class="ds-tab" style="font-size:12px;padding:6px 14px;"><span class="ds-tab-label" style="display:inline-flex;align-items:center;gap:5px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>Map</span></button>
            <button data-view="List" aria-selected="${state.viewMode==='List'}" class="ds-tab" style="font-size:12px;padding:6px 14px;"><span class="ds-tab-label" style="display:inline-flex;align-items:center;gap:5px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>List</span></button>
          </div>
        </div>
        ${state.viewMode === 'List' ? `
        <div class="relative w-full sm:w-72">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-ink-400 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/></svg>
          <input id="airport-search" type="search" value="${state.airportSearch.replace(/"/g,'&quot;')}" placeholder="Search airports, code, country..." class="w-full pl-8 pr-3 py-1.5 text-xs border border-ink-200 rounded-lg focus:outline-none focus:border-brand-400" />
        </div>` : ''}
      </div>
      ${state.viewMode === 'List' ? AirportListContent() : MapContent()}
    </section>
  </div>`;
}

function MapContent() {
  return `
    <div class="relative flex-1" style="min-height:0;">
      <div id="avia-map" class="absolute inset-0"></div>
      <button id="map-fullscreen" class="map-btn map-btn-fs absolute z-[400]" title="Toggle fullscreen" style="top:12px; left:12px;">${Ico.maximize}</button>
      <div class="absolute top-3 right-3 z-[400] flex flex-col gap-1 items-end">
        <div class="relative">
          <button id="map-layers-btn" class="map-btn" title="Layers">${Ico.layers}</button>
          <div id="map-layers-menu" class="hidden absolute top-0 right-[calc(100%+8px)] w-[160px] bg-white border border-ink-200 rounded-xl shadow-card overflow-hidden py-1">
            ${[
              { id:'satellite', label:'Satellite' },
              { id:'street',    label:'Street View' },
              { id:'dark',      label:'Dark Mode' },
              { id:'light',     label:'Light Mode' },
            ].map(o => `
              <button data-map-type="${o.id}" class="map-type-opt w-full flex items-center justify-between px-3 py-2 text-sm text-ink-700 hover:bg-ink-50 transition-colors">
                <span data-label>${o.label}</span>
                <span class="text-brand-600 opacity-0" data-check>${Ico.check}</span>
              </button>`).join('')}
          </div>
        </div>
        <div class="relative">
          <button id="map-portfolio-btn" class="map-btn" title="Filter by portfolio"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></button>
          <div id="map-portfolio-menu" class="hidden absolute top-0 right-[calc(100%+8px)] w-[240px] bg-white border border-ink-200 rounded-xl shadow-card-hover overflow-hidden flex flex-col" style="max-height:420px;">
            <div class="px-3 py-2.5 border-b border-ink-200 flex items-center justify-between">
              <div class="text-sm font-bold text-ink-800">Filter Portfolios</div>
              <div class="flex items-center gap-1">
                <button id="po-all"  class="h-6 px-2 rounded-md border border-ink-200 text-[11px] font-semibold text-ink-700 hover:bg-ink-50 active:bg-ink-100">All</button>
                <button id="po-none" class="h-6 px-2 rounded-md border border-ink-200 text-[11px] font-semibold text-ink-700 hover:bg-ink-50 active:bg-ink-100">None</button>
              </div>
            </div>
            <div class="px-3 py-2 bg-ink-50 border-b border-ink-200 text-[11px] font-semibold uppercase tracking-micro text-ink-600">Portfolio</div>
            <div class="overflow-y-auto scroll-thin py-1">
              ${PORTFOLIOS.map(p => `
                <div class="po-row flex items-center gap-2.5 px-3 py-1.5 cursor-pointer hover:bg-ink-50" data-pfolio="${p.name}">
                  <input type="checkbox" class="po-cb h-4 w-4 rounded border-ink-300 accent-brand-600 pointer-events-none" checked />
                  <span class="text-[13px] text-ink-700 truncate">${p.name}</span>
                </div>`).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

function AirportListContent() {
  const q = state.airportSearch.trim().toLowerCase();
  const rows = AIRPORT_LIST.filter(a =>
    !q || a.name.toLowerCase().includes(q) || a.code.toLowerCase().includes(q) || a.country.toLowerCase().includes(q)
  );

  return `
    <div class="flex-1 overflow-y-auto scroll-thin min-h-0">
      <div class="px-4 py-2.5 grid grid-cols-[1fr_140px_260px] gap-6 text-[11px] font-semibold tracking-micro uppercase text-ink-500 border-b border-ink-100 sticky top-0 bg-white items-center">
        <span>Airport <span class="text-ink-300">${window.dsSortInd(false)}</span></span>
        <span>Code <span class="text-ink-300">${window.dsSortInd(false)}</span></span>
        <span>Country <span class="text-ink-300">${window.dsSortInd(false)}</span></span>
      </div>
      <div class="divide-y divide-ink-50">
        ${rows.map(a => `
          <a href="AirportDetails.html" class="px-4 py-3 grid grid-cols-[1fr_140px_260px] gap-6 items-center text-sm hover:bg-ink-50 transition-colors">
            <span class="text-brand-600 font-semibold hover:underline truncate">${a.name}</span>
            <span class="text-ink-700 tracking-wide">${a.code}</span>
            <span class="flex items-center gap-2 text-ink-700 min-w-0">
              ${flag(a.cc)}
              <span class="truncate">${a.country}</span>
            </span>
          </a>
        `).join('') || `<div class="px-4 py-8 text-center text-sm text-ink-400">No airports match "${state.airportSearch}".</div>`}
      </div>
    </div>`;
}

/* ----------- RENDER + WIRING ----------- */
window.render = function render() {
  if (map) { map.remove(); map = null; tileLayer = null; }
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col">
      ${SC.Topbar()}
      ${Content()}
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  const wireTab = (attr, stateKey) => {
    document.querySelectorAll(`[${attr}]`).forEach(b => b.onclick = () => {
      const v = b.getAttribute(attr);
      if (state[stateKey] === v) return;
      state[stateKey] = v;
      const group = b.closest('.ds-tabs');
      if (group) {
        group.querySelectorAll('.ds-tab').forEach(t => t.setAttribute('aria-selected', String(t === b)));
        positionTabPills();
        setTimeout(() => render(), 220);
      } else { render(); }
    });
  };
  wireTab('data-portfolio-tab', 'portfolioTab');
  wireTab('data-airport-tab',   'airportTab');
  wireTab('data-notam-tab',     'notamTab');
  const airportTabSel = document.getElementById('airport-tab-mobile-sel');
  if (airportTabSel) airportTabSel.onchange = () => { state.airportTab = airportTabSel.value; render(); };

  /* Alerts filter dropdown */
  const alertSel = document.getElementById('alert-filter-sel');
  if (alertSel) alertSel.onchange = () => { state.alertFilter = alertSel.value; render(); };

  /* Airport list search */
  const airportSearch = document.getElementById('airport-search');
  if (airportSearch) {
    let t;
    airportSearch.addEventListener('input', () => {
      clearTimeout(t);
      const v = airportSearch.value;
      t = setTimeout(() => {
        state.airportSearch = v;
        render();
        const next = document.getElementById('airport-search');
        if (next) { next.focus(); next.setSelectionRange(v.length, v.length); }
      }, 150);
    });
  }

  /* Portfolio name → details page */
  document.querySelectorAll('[data-avi-pf-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.aviPfIdx);
      if (isNaN(idx) || idx < 0) return;
      const p   = PORTFOLIOS[idx];
      sessionStorage.setItem('selectedAviationPortfolio', JSON.stringify({
        name: p.name, assets: p.assets, exposure: p.exposure,
      }));
      location.href = 'AviationPortfolioDetails.html';
    });
  });

  /* Portfolio Groups expand/collapse */
  document.querySelectorAll('[data-avi-group-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      const gi = parseInt(btn.dataset.aviGroupIdx);
      if (state.expandedGroups.has(gi)) state.expandedGroups.delete(gi);
      else state.expandedGroups.add(gi);
      render();
    });
  });
  requestAnimationFrame(positionTabPills);
  window.addEventListener('resize', positionTabPills, { passive: true });
  document.querySelectorAll('[data-view]').forEach(b => b.onclick = () => {
    const v = b.dataset.view;
    if (state.viewMode === v) return;
    state.viewMode = v;
    const group = b.closest('.ds-tabs');
    if (group) {
      group.querySelectorAll('.ds-tab').forEach(t => t.setAttribute('aria-selected', String(t === b)));
      positionTabPills();
      setTimeout(() => render(), 220);
    } else { render(); }
  });
  setTimeout(initMap, 50);
};
window.render();
</script>
