  .ds-tab-label{position:relative;z-index:1;display:inline-flex;align-items:center;gap:6px;}

function detectAreas(q) {
  const ql = q.toLowerCase();
  return AREAS.filter(a => a.keywords.some(k => ql.includes(k))).map(a => a.id);
}

function renderMD(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<strong style="font-size:14px">$1</strong>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`)
    .split('\n\n').map(p => p.trim() ? (p.startsWith('<') ? p : `<p>${p}</p>`) : '').join('');
}

/* ── Core actions ─────────────────────────────────────────────────────────── */
function sendMessage(content) {
  if (!content.trim() || isLoading) return;
  messages.push({ role:'user', content, id:++msgCounter });

  // Push form message — user fills it out before AI responds
  formState = {
    selectedPortfolios: [],
    selectedAreas: detectAreas(content),
    portfolioSearch: '', areaSearch: '',
    dateFrom: monthAgo(), dateTo: today(),
    assetType: 'all',
  };
  messages.push({ role:'form', id:++msgCounter, question:content });
  rerenderChat();
}

async function generateReport() {
  const formMsg = messages.find(m => m.role === 'form');
  if (!formMsg || isLoading) return;

  // Collect live form values
  const df = document.getElementById('date-from');
  const dt = document.getElementById('date-to');
  const at = document.getElementById('asset-type');
  if (df) formState.dateFrom = df.value;
  if (dt) formState.dateTo   = dt.value;
  if (at) formState.assetType = at.value;

  const fs = formState;
  const selPF   = PORTFOLIOS.filter(p => fs.selectedPortfolios.includes(p.id)).map(p => p.name);
  const selArea = AREAS.filter(a => fs.selectedAreas.includes(a.id)).map(a => a.name);

  // Remove form, add confirmation, start generating
  messages = messages.filter(m => m.role !== 'form');
  formState = null;
  messages.push({
    role:'confirm', id:++msgCounter,
    portfolios: selPF.length, areas: selArea.length,
    dateFrom: fs.dateFrom, dateTo: fs.dateTo, assetType: fs.assetType,
  });
  isLoading = true;
  rerenderChat();

  const prompt = `You are an AI assistant for Real World, a maritime risk and insurance analytics platform.
Generate a detailed, professional report for the following query:
Question: "${formMsg.question}"
Selected Portfolios: ${selPF.length ? selPF.join(', ') : 'All portfolios'}
High-Risk Areas: ${selArea.length ? selArea.join(', ') : 'All areas'}
Date Range: ${fs.dateFrom} to ${fs.dateTo}
Asset Type Filter: ${fs.assetType === 'all' ? 'All asset types' : fs.assetType}

Provide a concise, structured report with key metrics, risk findings, and recommendations. Use markdown formatting.`;

  try {
    const response = await window.claude.complete({ messages:[{role:'user',content:prompt}] });
    messages.push({ role:'assistant', content:response, id:++msgCounter });
  } catch(e) {
    messages.push({ role:'assistant', content:'I encountered an error generating your report. Please try again.', id:++msgCounter });
  }
  isLoading = false;
  rerenderChat();
}

/* ── Render & wire ────────────────────────────────────────────────────────── */
function rerenderChat() {
  const area = document.getElementById('chat-area');
  if (!area) return;
  area.innerHTML = messages.length === 0 ? welcomeHTML() : chatHTML();
  const msgs = document.getElementById('msg-scroll');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
  wireChat();
}

function wireChat() {
  /* Input & send */
  const input   = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  if (input) {
    input.focus();
    input.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(input.value); input.value=''; } });
  }
  if (sendBtn) sendBtn.addEventListener('click', () => { if(input){ sendMessage(input.value); input.value=''; } });

  /* Suggested chips */
  document.querySelectorAll('[data-q]').forEach(chip => chip.addEventListener('click', () => sendMessage(chip.dataset.q)));

  /* Portfolio checkboxes */
  document.querySelectorAll('[data-pf]').forEach(row => {
    row.addEventListener('click', () => {
      const id = row.dataset.pf;
      if (!formState) return;
      if (formState.selectedPortfolios.includes(id)) formState.selectedPortfolios = formState.selectedPortfolios.filter(x=>x!==id);
      else formState.selectedPortfolios.push(id);
      rerenderChat();
    });
  });

  /* Portfolio search */
  const pfSearch = document.getElementById('pf-search');
  if (pfSearch) pfSearch.addEventListener('input', e => {
    if (formState) formState.portfolioSearch = e.target.value;
    rerenderChat();
  });

  /* Area checkboxes */
  document.querySelectorAll('[data-area]').forEach(row => {
    row.addEventListener('click', () => {
      const id = row.dataset.area;
      if (!formState) return;
      if (formState.selectedAreas.includes(id)) formState.selectedAreas = formState.selectedAreas.filter(x=>x!==id);
      else formState.selectedAreas.push(id);
      rerenderChat();
    });
  });

  /* Area search */
  const aSearch = document.getElementById('area-search');
  if (aSearch) aSearch.addEventListener('input', e => {
    if (formState) formState.areaSearch = e.target.value;
    rerenderChat();
  });

  /* Generate */
  const genBtn = document.getElementById('gen-report-btn');
  if (genBtn) genBtn.addEventListener('click', generateReport);
}

function wireFleetTab() {
  const search = document.getElementById('fleet-search');
  if (search) {
    search.oninput = (e) => {
      fleetQuery = e.target.value;
      fleetPage = 1;
      const contentEl = document.getElementById('reports-content');
      if (contentEl) {
        contentEl.innerHTML = tabContent();
        wireFleetTab();
        const s2 = document.getElementById('fleet-search');
        if (s2) { s2.focus(); s2.setSelectionRange(s2.value.length, s2.value.length); }
      }
    };
    search.onfocus = () => { search.style.borderColor = '#93c5fd'; search.style.boxShadow = '0 0 0 3px rgba(37,99,235,.12)'; search.style.background = '#fff'; };
    search.onblur  = () => { search.style.borderColor = '#e2e8f0'; search.style.boxShadow = ''; search.style.background = '#f8fafc'; };
  }
  const pp = document.getElementById('fleet-per-page');
  if (pp) pp.onchange = () => { fleetPerPage = parseInt(pp.value); fleetPage = 1; document.getElementById('reports-content').innerHTML = tabContent(); wireFleetTab(); };
  const prev = document.getElementById('fleet-prev');
  const next = document.getElementById('fleet-next');
  if (prev) prev.onclick = () => { if (fleetPage > 1) { fleetPage--; document.getElementById('reports-content').innerHTML = tabContent(); wireFleetTab(); } };
  if (next) next.onclick = () => { const tp = Math.max(1, Math.ceil(FLEET_REPORTS.length / fleetPerPage)); if (fleetPage < tp) { fleetPage++; document.getElementById('reports-content').innerHTML = tabContent(); wireFleetTab(); } };
  document.querySelectorAll('.fleet-act-btn').forEach(b => {
    b.onmouseenter = () => { b.style.background = '#f8fafc'; b.style.borderColor = '#cbd5e1'; };

}

function riskColor(r) { return r <= 10 ? '#16a34a' : r <= 25 ? '#f59e0b' : '#dc2626'; }
function riskDonut(r, size = 132) {
  const stroke = 14;
  const radius = (size - stroke) / 2;
  const circ = 2 * Math.PI * radius;
  const pct = Math.min(100, Math.max(0, r));
  const dash = (pct / 100) * circ;
  const color = riskColor(r);
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="#e2e8f0" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="${color}" stroke-width="${stroke}"
              stroke-dasharray="${dash} ${circ - dash}" stroke-dashoffset="${circ/4}" stroke-linecap="round"
              transform="rotate(-90 ${size/2} ${size/2})"
              style="transform-origin:${size/2}px ${size/2}px;transform:none"/>
      <text x="50%" y="46%" text-anchor="middle" dominant-baseline="middle" style="font:500 11px 'Inter',sans-serif;fill:#94a3b8">Risk Score</text>
      <text x="50%" y="62%" text-anchor="middle" dominant-baseline="middle" style="font:700 26px 'Inter',sans-serif;fill:#0f172a;letter-spacing:-.02em">${r}</text>
    </svg>`;
}

function wireCompetitorTab() {
  const search = document.getElementById('comp-search');
  if (search) {
    search.oninput = (e) => {
      compQuery = e.target.value;
      compDropdownOpen = !!compQuery;
      rerenderCompTab(true);
    };
    search.onfocus = () => {
      search.style.borderColor = '#93c5fd';
      search.style.boxShadow = '0 0 0 3px rgba(37,99,235,.12)';
      search.style.background = '#fff';
      if (compQuery) { compDropdownOpen = true; rerenderCompTab(true); }
    };
    search.onblur = () => {
      search.style.borderColor = '#e2e8f0';
      search.style.boxShadow = '';
      search.style.background = '#f8fafc';
      // Defer hide so click on dropdown registers — but skip the close if focus is still
      // on the (re-rendered) search input or a dropdown item.
      setTimeout(() => {
        const ae = document.activeElement;
        const stillInSearch = ae && (ae.id === 'comp-search' || (ae.closest && ae.closest('#comp-dropdown')));
        if (stillInSearch) return;
        compDropdownOpen = false;
        rerenderCompTab(false);
      }, 150);
    };
  }
  document.querySelectorAll('.comp-dd-item').forEach(b => {
    b.onmouseenter = () => { b.style.background = '#f1f5f9'; };
    b.onmouseleave = () => { b.style.background = 'transparent'; };
    b.onmousedown = (e) => { e.preventDefault(); }; // prevent blur
    b.onclick = () => {
      const name = b.dataset.cname;
      if (name && !compSelected.includes(name)) compSelected.push(name);
      compQuery = '';
      compDropdownOpen = false;
      rerenderCompTab(false);
    };
  });
}

function rerenderCompTab(restoreFocus) {
  const contentEl = document.getElementById('reports-content');
  if (!contentEl) return;
  contentEl.innerHTML = tabContent();
  wireCompetitorTab();
  if (restoreFocus) {
    const s = document.getElementById('comp-search');
    if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
  }
}

  requestAnimationFrame(() => {
    const group  = document.getElementById('reports-tabs');
    const pill   = document.getElementById('reports-pill');
    const active = group && group.querySelector('.ds-tab[aria-selected="true"]');
    if (!pill || !active) return;
    const gRect = group.getBoundingClientRect();
    const aRect = active.getBoundingClientRect();
    pill.style.width     = aRect.width + 'px';
    pill.style.transform = `translateX(${aRect.left - gRect.left}px)`;
    requestAnimationFrame(() => pill.classList.remove('is-init'));
  });

  // Mobile dropdown — mirrors tab state
  const tabDD = document.getElementById('reports-tabs-dd');
  function switchTab(next){
    activeTab = next;
    document.querySelectorAll('[data-tab]').forEach(b => b.setAttribute('aria-selected', String(b.dataset.tab === next)));
    if (tabDD && tabDD.value !== next) tabDD.value = next;
    const grp = document.getElementById('reports-tabs');
    const pl  = document.getElementById('reports-pill');
    const act = grp && grp.querySelector('.ds-tab[aria-selected="true"]');
    if (grp && pl && act && grp.offsetParent !== null) {
      const gR = grp.getBoundingClientRect();
      const aR = act.getBoundingClientRect();
      pl.style.width = aR.width + 'px';
      pl.style.transform = `translateX(${aR.left - gR.left}px)`;
    }
    const contentEl = document.getElementById('reports-content');
    if (contentEl) {
      contentEl.innerHTML = tabContent();
      if (activeTab === 'builder') rerenderChat();
      if (activeTab === 'fleet')   wireFleetTab();
      if (activeTab === 'comp')    wireCompetitorTab();
    }
  }
  if (tabDD) tabDD.addEventListener('change', () => switchTab(tabDD.value));
  document.querySelectorAll('[data-tab]').forEach(btn => btn.addEventListener('click', () => {
    // legacy click handler kept for the pill animation below; route through switchTab for content
    activeTab = btn.dataset.tab;
    if (tabDD) tabDD.value = activeTab;
    // Update aria-selected without re-rendering the tab bar (preserves pill animation)
    document.querySelectorAll('[data-tab]').forEach(b => b.setAttribute('aria-selected', String(b === btn)));
    // Animate pill to new position
    const group = document.getElementById('reports-tabs');
    const pill  = document.getElementById('reports-pill');
    if (group && pill) {
      const gRect = group.getBoundingClientRect();
      const aRect = btn.getBoundingClientRect();
      pill.style.width     = aRect.width + 'px';
      pill.style.transform = `translateX(${aRect.left - gRect.left}px)`;
    }
    // Swap only the content area
    const contentEl = document.getElementById('reports-content');
    if (contentEl) {
      contentEl.innerHTML = tabContent();
      if (activeTab === 'builder') rerenderChat();
      if (activeTab === 'fleet')   wireFleetTab();
      if (activeTab === 'comp')    wireCompetitorTab();
    }
  }));
  if (activeTab === 'builder') rerenderChat();
  if (activeTab === 'fleet')   wireFleetTab();
  if (activeTab === 'comp')    wireCompetitorTab();
};

window.render();
</script>
</body>
</html>
