<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Administration — Real World</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  .scroll-thin::-webkit-scrollbar{width:5px}.scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
  /* Tables */
  .adm-tbl{width:100%;border-collapse:collapse}
  .adm-tbl th{padding:10px 14px;font-size:12px;font-weight:600;color:var(--text-muted,#6B7280);text-align:left;border-bottom:1px solid #f1f5f9;white-space:nowrap;background:var(--slate-50,#F9FAFB);text-transform:uppercase;letter-spacing:.04em}
  .adm-tbl td{padding:11px 14px;font-size:13px;color:#334155;border-bottom:1px solid #f8fafc;vertical-align:middle}
  .adm-tbl tr:last-child td{border-bottom:0}
  .adm-tbl tbody tr:hover td{background:#fafafa}
  /* Badges */
  .badge{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:6px;display:inline-block}
  .badge-yes     {background:#dcfce7;color:#16a34a}
  .badge-active  {background:#dcfce7;color:#16a34a}
  .badge-inactive{background:#f1f5f9;color:#64748b}
  .badge-pending {background:#fff7ed;color:#ea580c}
  /* Tabs */
  .utab{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;border:0;font-family:inherit;transition:background .15s,color .15s}
  .utab.active{background:#2563eb;color:#fff}
  .utab:not(.active){background:transparent;color:#64748b;border:1px solid #e2e8f0}
  .utab:not(.active):hover{background:#f8fafc}
  /* Pagination */
  .pgbtn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;color:#334155;cursor:pointer;font-size:13px;font-weight:600;transition:background .1s}
  .pgbtn:hover:not([disabled]):not(.pactive){background:#f1f5f9}
  .pgbtn[disabled]{opacity:.4;cursor:not-allowed}
  .pgbtn.pactive{background:#2563eb;color:#fff;border-color:#2563eb}
  /* Search */
  .srch-wrap{position:relative}
  .srch-wrap input{height:34px;padding:0 10px 0 30px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;color:#334155;outline:none;font-family:inherit;background:#f8fafc;transition:border-color .15s,box-shadow .15s}
  .srch-wrap input:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.12);background:#fff}
  /* Action dots */
  .dots-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;border:0;background:transparent;color:#94a3b8;cursor:pointer;font-size:18px;font-weight:700;line-height:1}
  .dots-btn:hover{background:#f1f5f9;color:#334155}
</style>
</head>
<body class="bg-slate-100 text-slate-900">
<div id="app" class="h-screen w-full flex overflow-hidden"></div>

<script>

<script>
const SC = window.sharedChrome;

/* ── Data ─────────────────────────────────────────────────────────────────── */

const PENDING = [
  { name:'James O\'Sullivan', email:'james.osullivan@irishmarine.ie', invited:'15th May 2026', invitedBy:'Paul Kiernan' },
  { name:'Priya Sharma',      email:'priya.sharma@indiaocean.in',     invited:'14th May 2026', invitedBy:'Alex Norwood' },

const ORGS = [
  { name:'Air Charter 365',         status:'Active',   members:25, created:'1/15/2024' },
  { name:'eTutor',                  status:'Active',   members:12, created:'2/8/2024'  },
  { name:'Altcoins',                status:'Inactive', members:8,  created:'1/22/2024' },
  { name:'PAMS',                    status:'Active',   members:15, created:'3/5/2024'  },
  { name:'Christ Uni',              status:'Active',   members:45, created:'2/18/2024' },
  { name:'Central',                 status:'Pending',  members:0,  created:'3/12/2024' },
  { name:'Edell',                   status:'Active',   members:18, created:'1/30/2024' },
  { name:'IAS',                     status:'Active',   members:32, created:'2/25/2024' },
  { name:'MobaRoche',               status:'Active',   members:22, created:'3/1/2024'  },
  { name:'Ashfield Fleet Consultancy',status:'Active', members:38, created:'1/10/2024' },

/* ── State ────────────────────────────────────────────────────────────────── */
let ST = {
  userTab:'registered', userSearch:'', userPage:1, userPerPage:10,
  orgSearch:'', orgPage:1,
};

/* ── SVGs ─────────────────────────────────────────────────────────────────── */
const USER_ICO  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`;
const EMAIL_ICO = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>`;
const CLOCK_ICO = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
const DOC_ICO   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
const USERS_ICO = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
const CAL_ICO   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
const SRCH_ICO  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
const CHEV_L    = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>`;
const CHEV_R    = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>`;

/* ── Helpers ──────────────────────────────────────────────────────────────── */
function pager(page, total, perPage, prevId, nextId, ...pageIds) {
  const totalPages = Math.max(1, Math.ceil(total / perPage));
  return dsPagination({
    page, totalPages, totalItems: total, perPage,
    perPageOptions: [10, 25, 50],
    label: 'items',
  });
}

/* ── User table ───────────────────────────────────────────────────────────── */
function userSection() {
  const q = ST.userSearch.toLowerCase();
  const src = ST.userTab === 'registered' ? ALL_USERS : [];
  const filtered = src.filter(u => !q || u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q));
  const total = filtered.length;
  const start = (ST.userPage - 1) * ST.userPerPage;
  const rows  = filtered.slice(start, start + ST.userPerPage);
  const end   = Math.min(start + ST.userPerPage, total);

  const body = ST.userTab === 'registered' ? `
  <table class="adm-tbl">
    <thead><tr>
      <th style="min-width:160px">Name</th>
      <th style="min-width:220px">Email</th>
      <th style="min-width:200px">Last Login</th>
      <th style="min-width:80px">Admin</th>
      <th style="min-width:60px">Actions</th>
    </tr></thead>
    <tbody>
      ${rows.map(u => `<tr>
        <td><div style="display:flex;align-items:center;gap:7px;color:#0f172a;font-weight:500">${USER_ICO} ${u.name}</div></td>
        <td><div style="display:flex;align-items:center;gap:6px;color:#2563eb">${EMAIL_ICO} ${u.email}</div></td>
        <td><div style="display:flex;align-items:center;gap:6px;color:#64748b">${CLOCK_ICO} ${u.lastLogin}</div></td>
        <td>${u.admin ? `<span class="badge badge-yes">Yes</span>` : `<span style="font-size:13px;color:#64748b">No</span>`}</td>
        <td><button class="dots-btn">···</button></td>
      </tr>`).join('')}
    </tbody>
  </table>
  <div style="padding:0" id="admin-user-pagination">
    ${pager(ST.userPage, total, ST.userPerPage, 'u-prev','u-next','upg')}
  </div>` : `
  <table class="adm-tbl">
    <thead><tr>
      <th>Name</th><th>Email</th><th>Invited</th><th>Invited By</th><th>Actions</th>
    </tr></thead>
    <tbody>
      ${PENDING.map(p => `<tr>
        <td style="font-weight:500;color:#0f172a">${p.name}</td>
        <td style="color:#2563eb">${p.email}</td>
        <td style="color:#64748b">${p.invited}</td>
        <td style="color:#334155">${p.invitedBy}</td>
        <td><button class="dots-btn">···</button></td>
      </tr>`).join('')}
    </tbody>
  </table>
  <div style="padding:10px 14px;border-top:1px solid #f1f5f9;font-size:12px;color:#64748b">${PENDING.length} pending invitation${PENDING.length!==1?'s':''}</div>`;

  return `
  <!-- User Management -->
  <div style="margin-bottom:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h2 style="font-size:17px;font-weight:700;color:#0f172a">User Management</h2>
      <button style="display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:8px;background:#2563eb;color:#fff;font-size:13px;font-weight:600;border:0;cursor:pointer;font-family:inherit" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">
        ${USER_ICO} Add Users
      </button>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 3px rgba(15,23,42,.06);overflow:hidden">
      <!-- Tabs + search -->
      <div style="padding:12px 14px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="display:flex;gap:6px;flex:1">
          <button class="utab ${ST.userTab==='registered'?'active':''}" data-utab="registered">${USER_ICO} Registered Users</button>
          <button class="utab ${ST.userTab==='pending'?'active':''}"     data-utab="pending">${EMAIL_ICO} Pending Invitations</button>
        </div>
        <div class="srch-wrap">
          <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);display:flex">${SRCH_ICO}</span>
          <input id="user-search" type="text" placeholder="Search users..." value="${ST.userSearch.replace(/"/g,'&quot;')}" style="width:200px" />
        </div>
      </div>
      <!-- Table -->
      ${body}
    </div>
  </div>`;
}

/* ── Org table ────────────────────────────────────────────────────────────── */
function orgSection() {
  const q = ST.orgSearch.toLowerCase();
  const filtered = ORGS.filter(o => !q || o.name.toLowerCase().includes(q));
  const total = filtered.length;
  const start = (ST.orgPage - 1) * 10;
  const rows  = filtered.slice(start, start + 10);
  const end   = Math.min(start + 10, total);

  return `
  <!-- Organisation Management -->
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h2 style="font-size:17px;font-weight:700;color:#0f172a">Organisation Management</h2>
      <button style="display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:8px;background:#2563eb;color:#fff;font-size:13px;font-weight:600;border:0;cursor:pointer;font-family:inherit" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">
        + Create New Organisation
      </button>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 3px rgba(15,23,42,.06);overflow:hidden">
      <!-- Header + search -->
      <div style="padding:12px 14px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;font-weight:600;color:#334155">All Organisations</span>
        <div class="srch-wrap">
          <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);display:flex">${SRCH_ICO}</span>
          <input id="org-search" type="text" placeholder="Search organisations..." value="${ST.orgSearch.replace(/"/g,'&quot;')}" style="width:200px" />
        </div>
      </div>
      <!-- Table -->
      <table class="adm-tbl">
        <thead><tr>
          <th style="min-width:200px">Name</th>
          <th style="min-width:110px">Status</th>
          <th style="min-width:110px">Members</th>
          <th style="min-width:120px">Created</th>
          <th style="min-width:60px">Actions</th>
        </tr></thead>
        <tbody>
          ${rows.map(o => {
            const badgeCls = o.status==='Active'?'badge-active':o.status==='Inactive'?'badge-inactive':'badge-pending';
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:7px;font-weight:500;color:#0f172a">${DOC_ICO} ${o.name}</div></td>
              <td><span class="badge ${badgeCls}">${o.status}</span></td>
              <td><div style="display:flex;align-items:center;gap:6px;color:#334155">${USERS_ICO} ${o.members}</div></td>
              <td><div style="display:flex;align-items:center;gap:6px;color:#64748b">${CAL_ICO} ${o.created}</div></td>
              <td><button class="dots-btn">···</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div id="admin-org-pagination">
        ${pager(ST.orgPage, total, 10, 'o-prev','o-next','opg')}
      </div>
    </div>
  </div>`;
}

/* ── Render & wire ────────────────────────────────────────────────────────── */
let _main = null;

function rc() {
  if (!_main) return;
  _main.innerHTML = `
  <div class="scroll-thin" style="flex:1;overflow-y:auto;padding:16px">
    ${userSection()}
    ${orgSection()}
  </div>`;
  wire();
}

function wire() {
  /* User tabs */
  document.querySelectorAll('[data-utab]').forEach(b => b.addEventListener('click', () => {
    ST.userTab = b.dataset.utab; ST.userPage = 1; rc();
  }));

  /* User search */
  const us = document.getElementById('user-search');
  if (us) {
    us.addEventListener('input', e => { ST.userSearch = e.target.value; ST.userPage = 1; rc(); });
    us.addEventListener('focus', e => { e.target.style.borderColor='#93c5fd'; e.target.style.boxShadow='0 0 0 3px rgba(59,130,246,.12)'; e.target.style.background='#fff'; });
    us.addEventListener('blur',  e => { e.target.style.borderColor='#e2e8f0'; e.target.style.boxShadow=''; e.target.style.background='#f8fafc'; });
  }

  /* Org search */
  const os = document.getElementById('org-search');
  if (os) {
    os.addEventListener('input', e => { ST.orgSearch = e.target.value; ST.orgPage = 1; rc(); });
    os.addEventListener('focus', e => { e.target.style.borderColor='#93c5fd'; e.target.style.boxShadow='0 0 0 3px rgba(59,130,246,.12)'; e.target.style.background='#fff'; });
    os.addEventListener('blur',  e => { e.target.style.borderColor='#e2e8f0'; e.target.style.boxShadow=''; e.target.style.background='#f8fafc'; });
  }

  /* User pagination */
  /* User pagination */
  const userPag = document.getElementById('admin-user-pagination');
  if (userPag) dsWirePagination(userPag.querySelector('.ds-pagination-wrap'), {
    onPage:    (p) => { ST.userPage = p; rc(); },
    onPerPage: (n) => { ST.userPerPage = n; ST.userPage = 1; rc(); },
  });

  /* Org pagination */
  const orgPag = document.getElementById('admin-org-pagination');
  if (orgPag) dsWirePagination(orgPag.querySelector('.ds-pagination-wrap'), {
    onPage:    (p) => { ST.orgPage = p; rc(); },
  });
}

/* ── Main render ──────────────────────────────────────────────────────────── */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      <main id="adm-main" class="flex-1 min-h-0 overflow-hidden flex flex-col bg-slate-100"></main>
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  _main = document.getElementById('adm-main');
  rc();
};

window.render();
</script>
</body>
</html>
