<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ports — Real World</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body { font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .text-ink-900{color:#0f172a}.text-ink-700{color:#334155}
  .text-ink-600{color:#475569}.text-ink-500{color:#64748b}.text-ink-400{color:#94a3b8}
  .bg-ink-100{background:#f1f5f9}.bg-ink-50{background:#f8fafc}
  .border-ink-100{border-color:#f1f5f9}.border-ink-200{border-color:#e2e8f0}
  .shadow-card{box-shadow:0 1px 2px rgba(15,23,42,.08),0 0 0 1px rgba(15,23,42,.02)}
  .scroll-thin::-webkit-scrollbar{width:5px}.scroll-thin::-webkit-scrollbar-track{background:transparent}
  .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}

  /* Map fills content area */
  #ports-map { position:absolute; inset:0; background:#0b2a3a; }
  .leaflet-control-zoom,.leaflet-bar { border:1px solid #e2e8f0 !important; box-shadow:0 1px 2px rgba(15,23,42,.08) !important; border-radius:8px !important; overflow:hidden; }
  .leaflet-bar a { background:#fff !important; color:#334155 !important; line-height:30px !important; }
  .leaflet-bar a:hover { background:#f1f5f9 !important; }
  .leaflet-top.leaflet-left { top:52px !important; }
  .map-btn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:#fff; border:1px solid #e2e8f0; border-radius:8px; color:#334155; box-shadow:0 1px 2px rgba(15,23,42,.08); cursor:pointer; }
  .map-btn:hover { background:#f1f5f9; }

  /* Port marker */
  .port-marker { width:30px; height:30px; border-radius:50%; background:#2563eb; border:2px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.3); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .port-marker-sanctioned { width:30px; height:30px; border-radius:50%; background:#dc2626; border:2px solid #fff; box-shadow:0 2px 8px rgba(220,38,38,.5); display:flex; align-items:center; justify-content:center; cursor:pointer; animation:pulse-red 2s infinite; }
  @keyframes pulse-red { 0%,100%{box-shadow:0 2px 8px rgba(220,38,38,.5)} 50%{box-shadow:0 0 0 6px rgba(220,38,38,.15),0 2px 8px rgba(220,38,38,.4)} }
  /* Port labels */
  .port-label { background:#0f172a !important; border:0 !important; border-radius:5px !important; color:#fff !important; font-size:11px !important; font-weight:600 !important; padding:3px 7px !important; white-space:nowrap !important; box-shadow:0 2px 6px rgba(0,0,0,.3) !important; }
  .port-label::before { border-top-color:#0f172a !important; }

  /* Popup */
  .port-popup .leaflet-popup-content-wrapper { padding:0; border-radius:12px; overflow:hidden; box-shadow:0 10px 30px rgba(15,23,42,.25); }
  .port-popup .leaflet-popup-content { margin:0; width:280px !important; font-family:'Inter',sans-serif; }
  .port-popup .leaflet-popup-tip { background:#fff; }
  .port-popup .leaflet-popup-close-button { color:#fff !important; top:8px !important; right:10px !important; font-size:22px !important; font-weight:300 !important; width:24px !important; height:24px !important; opacity:.85; }
  .port-popup .leaflet-popup-close-button:hover { background:rgba(255,255,255,.2) !important; color:#fff !important; opacity:1; }
  .pp-header { background:#2563eb; color:#fff; padding:12px 14px 10px; }
  .pp-title { font-size:14px; font-weight:700; }
  .pp-sub { font-size:11px; font-weight:500; opacity:.75; margin-left:5px; }
  .pp-body { background:#fff; }
  .pp-row { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; border-bottom:1px solid #f1f5f9; font-size:13px; }
  .pp-row:last-child { border-bottom:0; }
  .pp-k { color:#64748b; font-weight:500; }
  .pp-v { font-weight:700; color:#0f172a; }
  .pp-cta { display:block; width:calc(100% - 28px); margin:4px 14px 14px; background:#fff; color:#2563eb; border:1.5px solid #2563eb; border-radius:8px; padding:9px 12px; font-weight:700; font-size:12.5px; cursor:pointer; text-align:center; transition:background .15s; }
  .pp-cta:hover { background:#eff6ff; }

  /* View toggle — pill tabs */
  .ds-tabs{position:relative;display:inline-flex;gap:4px;padding:4px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:9999px;}
  .ds-tab{position:relative;font:inherit;font-size:13px;font-weight:600;padding:7px 16px;background:transparent;border:0;border-radius:9999px;color:#64748b;cursor:pointer;transition:color 140ms ease;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .ds-tab:hover{color:#0f172a;}
  .ds-tab[aria-selected="true"]{color:#fff;}
  .ds-tab-pill{position:absolute;top:4px;left:0;height:calc(100% - 8px);background:#2563eb;border-radius:9999px;box-shadow:0 1px 2px rgba(15,23,42,.12);z-index:0;transition:transform 320ms cubic-bezier(.34,1.2,.64,1),width 320ms cubic-bezier(.34,1.2,.64,1);pointer-events:none;}
  .ds-tab-pill.is-init{transition:none;}
  .ds-tab-label{position:relative;z-index:1;display:inline-flex;align-items:center;gap:6px;}

  /* List view */
  .ports-table { width:100%; border-collapse:collapse; }
  .ports-table th { padding:10px 14px; font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.05em; text-align:left; border-bottom:1px solid #e2e8f0; background:#fff; white-space:nowrap; }
  .ports-table td { padding:11px 14px; font-size:13px; color:#334155; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
  .ports-table tr:hover td { background:#f8fafc; }
  .port-link { color:#2563eb; font-weight:600; cursor:pointer; }
  .port-link:hover { color:#1d4ed8; }

  /* Map type menu */
  .map-type-opt { padding:8px 12px; font-size:12px; font-weight:600; color:#0f172a; cursor:pointer; display:flex; align-items:center; gap:8px; }
  .map-type-opt:hover { background:#f8fafc; }
</style>
</head>
<body class="bg-ink-100 text-ink-900 antialiased">
<div id="app" class="h-screen w-full flex overflow-hidden"></div>

<script>

window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

<script>
const SC = window.sharedChrome;
const Ico = SC.I;

/* ---- Map type state ---- */
let showLabels = false;

let viewMode = 'Map';

/* ---- Port data ---- */
window.__ports = [
  { name:'Port of Shanghai',       country:'China',        lat:31.3743, lng:121.5389, terminals:30, type:'Container' },
  { name:'Port of Singapore',       country:'Singapore',    lat:1.2655,  lng:103.8200, terminals:24, type:'Container' },

  { name:'Port of Mumbai',          country:'India',        lat:18.9388, lng:72.8355,  terminals:13, type:'Container' },
  { name:'Port of Dubai (Jebel Ali)',country:'UAE',         lat:24.9857, lng:55.0272,  terminals:22, type:'Container' },
  { name:'Port of Piraeus',         country:'Greece',       lat:37.9490, lng:23.6442,  terminals:9,  type:'Container' },

  { name:'Port of Valencia',        country:'Spain',        lat:39.4437, lng:-0.3196,  terminals:7,  type:'Container' },

  { name:'Port of Marseille',       country:'France',       lat:43.2965, lng:5.3698,   terminals:10, type:'Container' },

  { name:'Port of Shenzhen',        country:'China',        lat:22.5429, lng:113.9373, terminals:17, type:'Container' },
  { name:'Port of Guangzhou',       country:'China',        lat:23.1291, lng:113.2644, terminals:14, type:'Container' },
  { name:'Port of Tianjin',         country:'China',        lat:38.9884, lng:117.7462, terminals:13, type:'Container' },
  { name:'Port of Tanjung Pelepas', country:'Malaysia',     lat:1.3644,  lng:103.5503, terminals:15, type:'Container' },
  { name:'Port of Port Klang',      country:'Malaysia',     lat:3.0011,  lng:101.4010, terminals:11, type:'Container' },
  { name:'Port of Jakarta',         country:'Indonesia',    lat:-6.1048, lng:106.8755, terminals:8,  type:'Container' },
  { name:'Port of Sydney',          country:'Australia',    lat:-33.8615,lng:151.2090, terminals:7,  type:'Container' },
  { name:'Port of Melbourne',       country:'Australia',    lat:-37.8409,lng:144.9190, terminals:9,  type:'Container' },
  { name:'Port of Cape Town',       country:'South Africa', lat:-33.9106,lng:18.4341,  terminals:6,  type:'Container' },
  /* Sanctioned Russian ports */
  { name:'Port of Astrakhan',    country:'Russia', lat:46.3497, lng:48.0408, terminals:4, type:'Cargo',     sanctioned:true },
  { name:'Port of Makhachkala',  country:'Russia', lat:42.9849, lng:47.5047, terminals:3, type:'Cargo',     sanctioned:true },
  { name:'Port of Ust-Luga',     country:'Russia', lat:59.6833, lng:28.4167, terminals:6, type:'Energy',    sanctioned:true },
  { name:'Port of Primorsk',     country:'Russia', lat:60.3667, lng:28.6333, terminals:3, type:'Energy',    sanctioned:true },
  { name:'Port of Novorossiysk', country:'Russia', lat:44.7233, lng:37.7683, terminals:8, type:'Container', sanctioned:true },
  { name:'Port of Murmansk',     country:'Russia', lat:68.9792, lng:33.0925, terminals:5, type:'Cargo',     sanctioned:true },
  { name:'Port of Tuapse',       country:'Russia', lat:44.1006, lng:39.0764, terminals:4, type:'Energy',    sanctioned:true },
];

/* ---- Anchor icon SVG ---- */
const ANCHOR_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>`;

/* ---- Popup HTML ---- */
function portPopupHTML(p, idx) {
  const sanctionBadge = p.sanctioned
    ? `<div style="background:#fef2f2;border-bottom:1px solid #fecaca;padding:7px 14px;display:flex;align-items:center;gap:7px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        <span style="font-size:11px;font-weight:700;color:#dc2626;letter-spacing:.03em;">SANCTIONED PORT</span>
      </div>`
    : '';
  return `
  <div>
    <div class="pp-header" style="background:${p.sanctioned?'#dc2626':'#2563eb'}">
      <span class="pp-title">${p.name}</span>
      <span class="pp-sub">· ${p.country}</span>
    </div>
    ${sanctionBadge}
    <div class="pp-body">
      <div class="pp-row"><span class="pp-k">Latitude:</span><span class="pp-v">${p.lat.toFixed(4)}°</span></div>
      <div class="pp-row"><span class="pp-k">Longitude:</span><span class="pp-v">${p.lng.toFixed(4)}°</span></div>
      <div class="pp-row"><span class="pp-k">No. of Terminals:</span><span class="pp-v">${p.terminals}</span></div>
    </div>
    <button class="pp-cta" style="color:${p.sanctioned?'#dc2626':'#2563eb'};border-color:${p.sanctioned?'#dc2626':'#2563eb'};" onclick="sessionStorage.setItem('selectedPort', JSON.stringify(window.__ports[${idx}])); window.location.href='PortDetails.html'">View Details</button>
  </div>`;
}

/* ---- Map ---- */
let portsMap = null;
let portsTile = null;
const MAP_TILES = {
  satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  street:    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  dark:      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  light:     'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
};

function setMapType(type) {
  if (!portsMap) return;
  if (portsTile) portsMap.removeLayer(portsTile);
  portsTile = L.tileLayer(MAP_TILES[type], { attribution:'', maxZoom:19 }).addTo(portsMap);
  portsTile.bringToBack();
  document.querySelectorAll('[data-map-type]').forEach(opt => {
    const chk = opt.querySelector('[data-check]');
    if (chk) chk.style.opacity = opt.dataset.mapType === type ? '1' : '0';
  });
}

function initMap() {
  const el = document.getElementById('ports-map');
  if (!el) return;
  if (portsMap) { portsMap.remove(); portsMap = null; portsTile = null; }

  portsMap = L.map(el, { center:[20, 10], zoom:2, zoomControl:true, scrollWheelZoom:true });
  setMapType('satellite');

  window.__ports.forEach((p, idx) => {
    const markerClass = p.sanctioned ? 'port-marker-sanctioned' : 'port-marker';
    const icon = L.divIcon({
      className: '',
      html: `<div class="${markerClass}">${ANCHOR_SVG}</div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 15],
    });
    const marker = L.marker([p.lat, p.lng], { icon });
    marker.bindTooltip(p.name, { permanent: showLabels, direction:'top', className:'port-label', offset:[0,-18] });
    marker.bindPopup(portPopupHTML(p, idx), { className:'port-popup', maxWidth:280, minWidth:280, closeButton:true, autoPanPadding:[30,30] });
    marker.addTo(portsMap);
  });

  /* Zoom icons */
  setTimeout(() => {
    const zin  = el.querySelector('.leaflet-control-zoom-in');
    const zout = el.querySelector('.leaflet-control-zoom-out');
    if (zin)  zin.innerHTML  = `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>`;
    if (zout) zout.innerHTML = `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></span>`;
  }, 100);

  const btn  = document.getElementById('layers-btn');
  const menu = document.getElementById('layers-menu');
  if (btn && menu) {
    btn.addEventListener('click', e => { e.stopPropagation(); menu.classList.toggle('hidden'); });
    document.addEventListener('click', () => { if (menu) menu.classList.add('hidden'); });
    menu.addEventListener('click', e => e.stopPropagation());
    menu.querySelectorAll('[data-map-type]').forEach(opt => {
      opt.addEventListener('click', () => {
        setMapType(opt.dataset.mapType);
        menu.classList.add('hidden');
        menu.querySelectorAll('[data-check]').forEach(c => c.style.opacity = '0');
        const chk = opt.querySelector('[data-check]');
        if (chk) chk.style.opacity = '1';
      });
    });
    const initChk = menu.querySelector('[data-map-type="satellite"] [data-check]');
    if (initChk) initChk.style.opacity = '1';
  }

  /* Labels toggle */
  const labelsBtn = document.getElementById('labels-btn');
  if (labelsBtn) {
    labelsBtn.addEventListener('click', () => {
      showLabels = !showLabels;
      labelsBtn.style.background  = showLabels ? '#eff6ff' : '';
      labelsBtn.style.borderColor = showLabels ? '#bfdbfe' : '';
      labelsBtn.style.color       = showLabels ? '#2563eb' : '';
      if (portsMap) {
        portsMap.eachLayer(layer => {
          if (layer.getTooltip && layer.getTooltip()) {
            const tt = layer.getTooltip();
            tt.options.permanent = showLabels;
            layer.unbindTooltip();
            layer.bindTooltip(tt.getContent(), { permanent: showLabels, direction:'top', className:'port-label', offset:[0,-18] });
          }
        });
      }
    });
  }

  /* Fullscreen */
  const fsBtn = document.getElementById('fs-btn');
  if (fsBtn) {
    fsBtn.addEventListener('click', () => {
      const mapWrap = document.getElementById('map-wrap');
      if (!mapWrap) return;
      const isFs = mapWrap.classList.toggle('ports-is-fs');
      if (isFs) { mapWrap.style.cssText = 'position:fixed;inset:0;z-index:9999;'; document.body.style.overflow = 'hidden'; }
      else       { mapWrap.style.cssText = ''; document.body.style.overflow = ''; }
      fsBtn.innerHTML = isFs ? Ico.minimize : Ico.maximize;
      fsBtn.title = isFs ? 'Exit fullscreen' : 'Toggle fullscreen';
      setTimeout(() => portsMap && portsMap.invalidateSize(), 200);
    });
  }
}

/* ---- Content ---- */
function MapView() {
  return `
  <div id="map-wrap" class="relative flex-1">
    <div id="ports-map"></div>
    <!-- Fullscreen btn — top-left matching Marine Dashboard -->
    <button id="fs-btn" class="map-btn absolute z-[400]" style="top:12px;left:12px;" title="Toggle fullscreen">${Ico.maximize}</button>
    <!-- Right controls column — top-right matching Marine Dashboard -->
    <div class="absolute z-[400] flex flex-col gap-1 items-end" style="top:12px;right:12px;">
      <!-- Map type -->
      <div class="relative">
        <button id="layers-btn" class="map-btn" title="Map type">${Ico.layers}</button>
        <div id="layers-menu" class="hidden absolute top-0 right-[calc(100%+8px)] w-[160px] bg-white border border-ink-200 rounded-xl shadow-card-hover overflow-hidden py-1">
          ${[
            { id:'satellite', label:'Satellite' },
            { id:'street',    label:'Street View' },
            { id:'dark',      label:'Dark Mode' },
            { id:'light',     label:'Light Mode' },
          ].map(o => `
            <button data-map-type="${o.id}" class="map-type-opt w-full flex items-center justify-between px-3 py-2 text-sm text-ink-700 hover:bg-ink-50 transition-colors">
              <span>${o.label}</span>
              <span class="text-brand-600 opacity-0" data-check>${Ico.check}</span>
            </button>`).join('')}
        </div>
      </div>
      <!-- Labels toggle -->
      <button id="labels-btn" class="map-btn ${showLabels ? 'bg-brand-50 border-brand-200 text-brand-600' : ''}" title="Toggle port labels">${Ico.tag}</button>
    </div>
  </div>`;
}

function ListView() {
  return `
  <div class="flex-1 overflow-y-auto scroll-thin">
    <table class="ports-table">
      <thead>
        <tr>
          <th>Port Name</th>
          <th>Country</th>
          <th>Latitude</th>
          <th>Longitude</th>
          <th>Terminals</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody>
        ${window.__ports.map(p => `
          <tr>
            <td><span class="port-link">${p.name}${p.sanctioned?` <span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;background:#fef2f2;color:#dc2626;vertical-align:middle;">SANCTIONED</span>`:''}</span></td>
            <td>${p.country}</td>
            <td class="tabular-nums">${p.lat.toFixed(4)}°</td>
            <td class="tabular-nums">${p.lng.toFixed(4)}°</td>
            <td class="tabular-nums font-semibold">${p.terminals}</td>
            <td><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:${p.sanctioned?'#fef2f2':'#eff6ff'};color:${p.sanctioned?'#dc2626':'#2563eb'};">${p.type}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function Content() {
  const mapIco  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>`;
  const listIco = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`;
  return `
  <div class="flex-1 overflow-hidden px-4 py-4" style="display:flex;flex-direction:column;">
    <div class="bg-white rounded-xl border border-ink-200 shadow-card flex flex-col overflow-hidden flex-1">
      <!-- Card header: view toggle + controls -->
      <div class="shrink-0 px-4 py-3 flex items-center gap-3 border-b border-ink-100">
        <div class="ds-tabs" id="ports-view-tabs">
          <span class="ds-tab-pill is-init" id="ports-tab-pill"></span>
          <button class="ds-tab" data-view="Map" aria-selected="${viewMode==='Map'}">
            <span class="ds-tab-label">${mapIco} Map</span>
          </button>
          <button class="ds-tab" data-view="List" aria-selected="${viewMode==='List'}">
            <span class="ds-tab-label">${listIco} List</span>
          </button>
        </div>
        <span class="text-xs text-ink-400 ml-1">${window.__ports.length} ports worldwide</span>
      </div>
      <!-- Card body -->
      ${viewMode === 'Map' ? MapView() : ListView()}
    </div>
  </div>`;
}

/* ---- Pill tab positioning ---- */
function positionTabPill() {
  requestAnimationFrame(() => {
    const group  = document.getElementById('ports-view-tabs');
    const pill   = document.getElementById('ports-tab-pill');
    const active = group && group.querySelector('.ds-tab[aria-selected="true"]');
    if (!pill || !active) return;
    const gRect = group.getBoundingClientRect();
    const aRect = active.getBoundingClientRect();
    pill.style.width     = aRect.width + 'px';
    pill.style.transform = `translateX(${aRect.left - gRect.left}px)`;
    requestAnimationFrame(() => pill.classList.remove('is-init'));
  });
}

/* ---- Render ---- */
window.render = function() {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      ${Content()}
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();

  /* View toggle */
  document.querySelectorAll('[data-view]').forEach(b => b.addEventListener('click', () => {
    viewMode = b.dataset.view;
    render();
    if (viewMode === 'Map') setTimeout(initMap, 50);
  }));

  positionTabPill();
  window.addEventListener('resize', positionTabPill, { passive: true });

  if (viewMode === 'Map') setTimeout(initMap, 50);
};
window.render();
</script>
</body>
</html>
