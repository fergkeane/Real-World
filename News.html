<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>News — Real World</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;color:#0f172a}
  .scroll-thin::-webkit-scrollbar{width:6px;height:6px}
  .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}

  /* Category dropdown (replaces pill tabs) */
  .cat-dd{position:relative;display:inline-flex}
  .cat-btn{height:36px;padding:0 12px;border:1px solid #e2e8f0;background:#fff;border-radius:10px;font:inherit;font-size:13px;font-weight:600;color:#0f172a;display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s, box-shadow .15s;min-width:160px}
  .cat-btn:hover{border-color:#cbd5e1}
  .cat-btn[aria-expanded="true"]{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  .cat-btn .cat-cur-ico{color:#475569;flex-shrink:0;display:inline-flex}
  .cat-btn .cat-cur-label{flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cat-btn .cat-chev{color:#94a3b8;flex-shrink:0;transition:transform .15s}
  .cat-btn[aria-expanded="true"] .cat-chev{transform:rotate(180deg)}
  .cat-pop{position:absolute;top:calc(100% + 6px);left:0;min-width:200px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 8px 24px -4px rgba(15,23,42,.12);z-index:30;padding:6px}
  .cat-opt{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#334155;font-weight:500;background:none;border:0;width:100%;text-align:left;font-family:inherit}
  .cat-opt:hover{background:#f8fafc}
  .cat-opt[aria-selected="true"]{background:#eff6ff;color:#1d4ed8}
  .cat-opt .cat-opt-ico{flex-shrink:0;color:#64748b;display:inline-flex}
  .cat-opt[aria-selected="true"] .cat-opt-ico{color:#2563eb}
  .cat-opt .cat-opt-check{margin-left:auto;color:#2563eb;opacity:0}
  .cat-opt[aria-selected="true"] .cat-opt-check{opacity:1}

  /* Source dropdown */
  .src-btn{height:36px;padding:0 12px;border:1px solid #e2e8f0;background:#fff;border-radius:10px;font:inherit;font-size:13px;font-weight:500;color:#334155;display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s, box-shadow .15s;max-width:100%;min-width:0}
  .src-btn > span:not(.src-dot){white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .src-btn:hover{border-color:#cbd5e1}
  .src-btn[aria-expanded="true"]{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  .src-pop{position:absolute;top:calc(100% + 6px);right:0;width:260px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 8px 24px -4px rgba(15,23,42,.12);z-index:30;padding:6px;max-height:340px;overflow-y:auto}
  .src-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#334155}
  .src-row:hover{background:#f8fafc}
  .src-row input{accent-color:#2563eb}
  .src-foot{display:flex;justify-content:space-between;padding:8px 10px 4px;border-top:1px solid #f1f5f9;margin-top:4px}
  .src-mini{font-size:12px;color:#2563eb;background:none;border:0;cursor:pointer;font-weight:600;font-family:inherit}
  .src-mini:hover{text-decoration:underline}

  /* Source pop — anchored right on small screens so it never overflows viewport */
  @media (max-width:560px){
    .src-pop{right:0;left:auto;width:min(280px, calc(100vw - 24px))}
    .cat-pop{left:0;width:min(240px, calc(100vw - 24px))}
  }

  /* Search */
  .search-wrap{position:relative;flex:1;min-width:160px;max-width:320px}
  .search-input{height:36px;width:100%;padding:0 12px 0 34px;border:1px solid #e2e8f0;border-radius:10px;font:inherit;font-size:13px;background:#fff;color:#0f172a;outline:none;transition:border-color .15s, box-shadow .15s}
  @media (min-width:720px){.search-wrap{width:260px;flex:none}}
  .search-input:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  .search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94a3b8}

  /* News card */
  .news-card{display:flex;flex-direction:column;background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;height:100%}
  .news-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px -8px rgba(15,23,42,.12);border-color:#cbd5e1}
  .news-thumb{position:relative;aspect-ratio:16/9;background:#f1f5f9;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .news-thumb svg.bg-pattern{position:absolute;inset:0;width:100%;height:100%;opacity:.18}
  .news-thumb .glyph{position:relative;width:64px;height:64px;color:#fff;opacity:.95}
  .news-cat{position:absolute;top:10px;left:10px;padding:3px 10px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:rgba(255,255,255,.95);backdrop-filter:blur(4px);color:#0f172a;box-shadow:0 1px 2px rgba(15,23,42,.08)}
  .news-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
  .news-title{font-size:15px;font-weight:700;line-height:1.35;color:#0f172a;text-wrap:pretty;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .news-card:hover .news-title{color:#1d4ed8}
  .news-snippet{font-size:13px;color:#64748b;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .news-meta{margin-top:auto;display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid #f1f5f9;font-size:11.5px;color:#94a3b8}
  .news-source{display:flex;align-items:center;gap:6px;font-weight:600;color:#475569}
  .src-dot{width:14px;height:14px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;letter-spacing:0}
  .ext-ico{color:#94a3b8;flex-shrink:0}
  .news-card:hover .ext-ico{color:#2563eb}

  /* Two-column grid on all sizes; scale to 3 cols on wide viewports. */
  .news-grid{display:grid;gap:12px;grid-template-columns:repeat(2,minmax(0,1fr))}
  @media (min-width:720px){.news-grid{gap:16px}}
  @media (min-width:1180px){.news-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
  @media (min-width:1180px){.news-grid > .featured{grid-column:span 2}.news-grid > .featured .news-thumb{aspect-ratio:21/9}.news-grid > .featured .news-title{font-size:20px;-webkit-line-clamp:2}.news-grid > .featured .news-snippet{-webkit-line-clamp:3}}

  /* Small-screen card density */
  @media (max-width:560px){
    .news-card{border-radius:12px}
    .news-body{padding:10px 11px 12px;gap:5px}
    .news-title{font-size:13px;-webkit-line-clamp:3;line-height:1.3}
    .news-snippet{display:none}
    .news-meta{padding-top:8px;font-size:10.5px}
    .news-cat{font-size:9px;padding:2px 7px;top:7px;left:7px}
    .news-thumb .glyph{width:42px;height:42px}
    .src-dot{width:12px;height:12px;font-size:7px}
  }

  /* Page padding scales down on small screens */
  .news-shell{max-width:1400px;margin:0 auto;padding:22px 28px 60px}
  @media (max-width:720px){.news-shell{padding:16px 14px 48px}}

  /* Category color accents */
  .cat-marine   { --c1:#0891b2; --c2:#0e7490 }
  .cat-property { --c1:#7c3aed; --c2:#6d28d9 }
  .cat-aviation { --c1:#2563eb; --c2:#1d4ed8 }
  .cat-offshore { --c1:#059669; --c2:#047857 }
  .cat-regulatory{--c1:#ea580c; --c2:#c2410c }
  .news-thumb{background:linear-gradient(135deg,var(--c1),var(--c2))}

  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:#94a3b8;text-align:center}
  .empty svg{margin-bottom:14px}
  .empty h3{font-size:16px;color:#475569;font-weight:600;margin-bottom:6px}
  .empty p{font-size:13.5px;max-width:340px;line-height:1.55}

  /* Toolbar — wraps gracefully on narrow screens */
  .news-toolbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .news-toolbar h1{font-size:22px;font-weight:800;color:#0f172a;letter-spacing:-0.01em}
  .news-toolbar p{font-size:13px;color:#64748b}
  .news-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;justify-content:flex-end;min-width:0}
  @media (max-width:720px){
    .news-toolbar h1{font-size:18px}
    .news-toolbar p{font-size:12px}
    .news-controls{width:100%;justify-content:flex-start}
  }
  .filter-row{margin-top:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  .chip-tag{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 8px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:999px;font-size:11px;font-weight:600;color:#475569}
  .chip-x{cursor:pointer;color:#94a3b8;font-weight:700;line-height:1}
  .chip-x:hover{color:#0f172a}
</style>
</head>
<body class="bg-slate-100 text-slate-900">
<div id="app" class="min-h-screen w-full flex overflow-hidden"></div>

<script>
window.PAGE = { id:'news', title:'News', crumb:'Overview' };
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "accent": "blue",
  "sidebarExpanded": false,
  "showSparklines": true
}/*EDITMODE-END*/;
</script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="shared/chrome.js?v=11"></script>
<script src="news-data.js"></script>
<script src="news-page.js"></script>
</body>
</html>
