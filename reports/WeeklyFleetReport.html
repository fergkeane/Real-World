<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Weekly Fleet Monitoring Report — Real World</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: { sans:['Inter','ui-sans-serif','system-ui','sans-serif'], display:['Exo','Inter','sans-serif'] },
      colors: {
        brand: {50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a'},
        ink:   {900:'#0f172a',800:'#1e293b',700:'#334155',600:'#475569',500:'#64748b',400:'#94a3b8',300:'#cbd5e1',200:'#e2e8f0',100:'#f1f5f9',50:'#f8fafc'},
      },
      boxShadow: {
        'card':'0 1px 2px 0 rgb(15 23 42 / 0.04), 0 1px 3px 0 rgb(15 23 42 / 0.06)',
      },
    }},
  };
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4,h5,h6,.font-display{font-family:'Exo','Inter',sans-serif;letter-spacing:-.005em}
  .scroll-thin::-webkit-scrollbar{width:6px;height:6px}
  .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
  .tracking-micro{letter-spacing:.04em}

  /* Report container — A4-ish doc shell sitting on light grey app bg */
  .report-shell{max-width:1180px;margin:0 auto;padding:18px 22px 60px;display:flex;flex-direction:column;gap:14px}
  .report-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 1px 3px rgba(15,23,42,.05);overflow:hidden}

  /* Section headers (compact horizontal heading bar) */
  .sec-head{padding:14px 22px;border-bottom:1px solid #f1f5f9;font-size:13px;font-weight:700;color:#0f172a;letter-spacing:.02em;text-transform:none}
  .sec-body{padding:20px 22px}

  /* Top meta bar */
  .meta-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:10px 22px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
  .meta-item{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:#475569}
  .meta-item .lbl{color:#94a3b8;font-weight:500}
  .meta-item .val{color:#0f172a;font-weight:600;font-variant-numeric:tabular-nums}
  .meta-actions{display:flex;align-items:center;gap:8px}
  .meta-btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;font-size:12.5px;font-weight:600;color:#334155;cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s}
  .meta-btn:hover{background:#f8fafc;border-color:#cbd5e1}
  .meta-btn svg{color:#64748b}

  /* Summary stat cards (light blue boxes) */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:8px}
  .stat-card{background:var(--brand-50,#eff6ff);border:1px solid var(--brand-100,#dbeafe);border-radius:10px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  .stat-card .stat-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--brand-600,#2563eb);margin-bottom:2px}
  .stat-card .stat-num{font-family:'Exo','Inter',sans-serif;font-size:30px;font-weight:700;color:var(--brand-700,#1d4ed8);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .stat-card .stat-label{font-size:11.5px;font-weight:500;color:#475569}
  @media(max-width:760px){ .stat-grid{grid-template-columns:repeat(2,1fr)} }

  /* Vessel list table */
  .v-table{width:100%;border-collapse:collapse;font-size:12.5px}
  .v-table th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:#0f172a;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #e2e8f0;white-space:nowrap}
  .v-table td{padding:11px 12px;border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:middle}
  .v-table tr:last-child td{border-bottom:0}
  .v-table tr:hover td{background:#f8fafc}
  .v-table td.vname a{color:var(--brand-600,#2563eb);font-weight:700;letter-spacing:.02em;text-decoration:none;font-size:12.5px}
  .v-table td.vname a:hover{text-decoration:underline}
  .v-table .imo{color:#475569;font-variant-numeric:tabular-nums}
  .v-table .alerts-cell{color:#0f172a;font-weight:700;font-variant-numeric:tabular-nums}
  .v-table tr.v-group td{background:#f1f5f9;color:#0f172a;font-weight:700;font-size:11.5px;letter-spacing:.02em;padding:9px 12px;border-bottom:1px solid #e2e8f0;border-top:1px solid #e2e8f0}
  .v-table tr.v-group:first-child td{border-top:0}
  .v-table .flag-cell{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:#334155}
  .v-table .flag-img{width:22px;height:16px;object-fit:cover;border:1px solid #e2e8f0;border-radius:2px;flex-shrink:0;display:block}

  /* Alert Type Summary table — header matches system table style */
  .alert-table{width:100%;border-collapse:collapse;font-size:13px}
  .alert-table thead th{text-align:left;padding:10px 16px;font-size:11px;font-weight:700;color:#0f172a;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #e2e8f0;white-space:nowrap}
  .alert-table thead th:last-child{width:220px}
  .alert-table tbody td{padding:12px 16px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
  .alert-table tbody tr:last-child td{border-bottom:0}
  .alert-table tbody tr:hover td{background:#f8fafc}
  .alert-table .at-name{display:inline-flex;align-items:center;gap:11px;color:var(--brand-600,#2563eb);font-weight:600;font-size:13px}
  .alert-table .at-name svg{width:19px;height:19px;color:var(--brand-600,#2563eb);flex-shrink:0}
  .alert-table .at-desc{margin-top:4px;padding-left:30px;font-size:11.5px;color:#64748b;line-height:1.5;max-width:560px}
  /* Custom masked icon — inherits currentColor so it themes (blue in table, white on navy card) */
  .icon-suspicious{display:inline-block;width:23px;height:23px;flex-shrink:0;background-color:currentColor;-webkit-mask:url('../images/icon-alert-suspicious-activity.svg') center/contain no-repeat;mask:url('../images/icon-alert-suspicious-activity.svg') center/contain no-repeat}
  .icon-port-call{display:inline-block;width:23px;height:23px;flex-shrink:0;background-color:currentColor;-webkit-mask:url('../images/icon-alert-sanctioned-port-call.svg') center/contain no-repeat;mask:url('../images/icon-alert-sanctioned-port-call.svg') center/contain no-repeat}
  .ra-table .notif .ni .icon-port-call{width:17px;height:17px}
  .ra-table .notif .ni .icon-suspicious{width:17px;height:17px}
  .icon-location-sts{display:inline-block;width:23px;height:23px;flex-shrink:0;background-color:currentColor;-webkit-mask:url('../images/icon-alert-location-sts.svg') center/contain no-repeat;mask:url('../images/icon-alert-location-sts.svg') center/contain no-repeat}
  .ra-table .notif .ni .icon-location-sts{width:17px;height:17px}
  .icon-vessel-sts{display:inline-block;width:23px;height:23px;flex-shrink:0;background-color:currentColor;-webkit-mask:url('../images/icon-alert-vessel-sts.svg') center/contain no-repeat;mask:url('../images/icon-alert-vessel-sts.svg') center/contain no-repeat}
  .ra-table .notif .ni .icon-vessel-sts{width:17px;height:17px}
  .icon-loitering{display:inline-block;width:23px;height:23px;flex-shrink:0;background-color:currentColor;-webkit-mask:url('../images/icon-alert-loitering.svg') center/contain no-repeat;mask:url('../images/icon-alert-loitering.svg') center/contain no-repeat}
  .ra-table .notif .ni .icon-loitering{width:17px;height:17px}
  .icon-identity{display:inline-block;width:23px;height:23px;flex-shrink:0;background-color:currentColor;-webkit-mask:url('../images/icon-alert-identity-tampering.svg') center/contain no-repeat;mask:url('../images/icon-alert-identity-tampering.svg') center/contain no-repeat}
  .icon-flag-hopping{display:inline-block;width:23px;height:23px;flex-shrink:0;background-color:currentColor;-webkit-mask:url('../images/icon-alert-flag-hopping.svg') center/contain no-repeat;mask:url('../images/icon-alert-flag-hopping.svg') center/contain no-repeat}
  .alert-table .at-count{color:var(--brand-700,#1d4ed8);font-weight:600;font-variant-numeric:tabular-nums}
  .alert-table tr.at-flagged td:first-child{border-left:3px solid #dc2626}

  /* Vessel details body */
  .vd-head{display:flex;align-items:flex-start;gap:14px;padding:18px 22px 8px}
  .vd-flag-block{display:flex;align-items:flex-start;gap:14px;flex:1;min-width:0}
  .vd-flag{width:46px;height:32px;border:1px solid #e2e8f0;border-radius:3px;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;background:#f8fafc;flex-shrink:0}
  .vd-flag img{width:100%;height:100%;object-fit:cover;display:block}
  .vd-title{font-family:'Exo','Inter',sans-serif;font-size:18px;font-weight:700;color:var(--brand-600,#2563eb);letter-spacing:.01em;line-height:1.15}
  .vd-sub{font-size:11.5px;color:#64748b;margin-top:3px;line-height:1.5}
  .vd-sub .sep{margin:0 6px;color:#cbd5e1}

  /* Risk gauge block (matches VesselDetails page) */
  .vd-body{display:grid;grid-template-columns:260px 1fr;gap:22px;padding:8px 22px 18px;align-items:flex-start}
  .risk-block{display:flex;flex-direction:column;align-items:stretch;gap:10px;padding-top:2px}
  .risk-label{font-size:10px;font-weight:600;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;text-align:center}
  .gauge-card{background:#f8fafc;border-radius:12px;padding:12px 8px 10px;display:flex;flex-direction:column;align-items:center}
  .gauge-card svg.gauge-svg{width:100%;max-width:200px;height:auto;overflow:visible}
  .gauge-pill{display:flex;align-items:center;gap:4px;margin-top:-14px;margin-bottom:2px}
  .gauge-pill .pill-lbl{font-size:10px;font-weight:700;letter-spacing:.06em}
  .risk-guide{display:flex;flex-direction:column;gap:6px}
  .rg-card{border-radius:10px;padding:8px 9px;border:1px solid transparent}
  .rg-card .rg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
  .rg-card .rg-ico{width:24px;height:24px;border-radius:999px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .rg-card .rg-name{font-size:11px;font-weight:700;line-height:1.1}
  .rg-card .rg-range{font-size:9.5px;color:#64748b;margin-top:1px}
  .rg-card .rg-pct{margin-left:auto;font-size:12.5px;font-weight:800;color:#0f172a;flex-shrink:0;font-variant-numeric:tabular-nums}
  .rg-card .rg-bar{height:4px;background:#e2e8f0;border-radius:999px;overflow:hidden}
  .rg-card .rg-bar > span{display:block;height:100%;border-radius:999px}

  /* Property grid */
  .prop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px 28px}
  .prop{display:flex;flex-direction:column;gap:3px;min-width:0}
  .prop .pk{font-size:10.5px;font-weight:500;color:#94a3b8;letter-spacing:.01em}
  .prop .pv{font-size:12.5px;font-weight:600;color:#0f172a;line-height:1.4;word-break:break-word}
  .prop .pv.flag-val{display:inline-flex;align-items:center;gap:8px}
  .prop .pv.flag-val .flag-img{width:22px;height:16px;object-fit:cover;border:1px solid #e2e8f0;border-radius:2px;display:block;flex-shrink:0}
  @media(max-width:780px){ .vd-body{grid-template-columns:1fr} .prop-grid{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:520px){ .prop-grid{grid-template-columns:1fr} }

  /* Vessel Details spec table (right of risk gauge) */
  .vd-spec{min-width:0}
  .vd-spec-head{font-size:11px;font-weight:700;color:#0f172a;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px;padding-bottom:9px;border-bottom:1px solid #e2e8f0}
  .spec-table{width:100%;border-collapse:collapse;font-size:12.5px}
  .spec-table th{text-align:left;font-weight:500;color:#94a3b8;font-size:10.5px;letter-spacing:.01em;padding:9px 12px 9px 0;vertical-align:top;white-space:nowrap;width:1%}
  .spec-table td{padding:9px 28px 9px 0;color:#0f172a;font-weight:600;vertical-align:top;line-height:1.4;word-break:break-word}
  .spec-table tr{border-bottom:1px solid #f1f5f9}
  .spec-table tr:last-child{border-bottom:0}
  .spec-table td.flagval span{display:inline-flex;align-items:center;gap:8px}
  .spec-table td.flagval .flag-img{width:22px;height:16px;object-fit:cover;border:1px solid #e2e8f0;border-radius:2px;display:block;flex-shrink:0}

  /* Recent activity sub-block */
  .ra-wrap{border-top:1px solid #f1f5f9;padding:14px 22px 18px;background:#fcfdff}
  .ra-title{font-size:12.5px;font-weight:700;color:#0f172a;margin-bottom:10px;letter-spacing:.01em}
  .ra-table{width:100%;border-collapse:collapse;font-size:12px}
  .ra-table th{text-align:left;padding:8px 10px;font-size:10.5px;font-weight:700;color:#0f172a;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #e2e8f0;white-space:nowrap}
  .ra-table td{padding:9px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle;color:#334155}
  .ra-table tr:last-child td{border-bottom:0}
  .ra-table .notif{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:#334155;font-weight:500}
  .ra-table .notif .ni{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;background:#fef3c7;color:#d97706;flex-shrink:0}
  .ra-table .notif .ni svg{width:14px;height:14px}
  .ra-table .notif .ni.blue{background:var(--brand-100,#dbeafe);color:var(--brand-600,#2563eb)}
  .ra-table .notif .ni.red{background:#fee2e2;color:#dc2626}
  .ra-table .notif .ni.amber{background:#fef3c7;color:#d97706}
  .ra-table .date{color:#475569;font-variant-numeric:tabular-nums;white-space:nowrap;font-size:11.5px}
  .ra-table .ra-note{margin-top:5px;display:flex;align-items:flex-start;gap:5px;font-size:11px;font-weight:500;color:#e07d18;line-height:1.45}
  .ra-table .ra-note svg{width:13px;height:13px;flex-shrink:0;margin-top:1px}

  /* Risk Indicator Descriptions (blue card) */
  .rid-card{background:linear-gradient(180deg,var(--brand-800,#1e3a8a) 0%, var(--brand-700,#1e40af) 100%);border-radius:14px;padding:22px 26px;color:#fff;box-shadow:0 1px 3px rgba(15,23,42,.08)}
  .rid-title{font-family:'Exo','Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand-200,#bfdbfe);margin-bottom:18px}
  .rid-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px 28px}
  .rid-item{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:6px 4px}
  .rid-item .rid-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:10px}
  .rid-item .rid-name{font-family:'Exo','Inter',sans-serif;font-size:12.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;margin-top:2px}
  .rid-item .rid-desc{font-size:11.5px;color:var(--brand-200,#bfdbfe);line-height:1.5;max-width:260px}
  @media(max-width:760px){ .rid-grid{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:480px){ .rid-grid{grid-template-columns:1fr} }

  /* Disclaimers */
  .disc{padding:14px 22px;color:#64748b;font-size:11px;line-height:1.65}
  .disc .disc-title{font-weight:700;color:#0f172a;font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
  .disc p{margin-bottom:3px}
  .disc strong{color:#334155;font-weight:600}

  /* Floating vessel navigation — appears once first vessel card is reached */
  .vessel-fnav{position:fixed;right:24px;bottom:28px;display:flex;flex-direction:column;gap:4px;background:#fff;border:1px solid #e2e8f0;border-radius:999px;padding:5px;box-shadow:0 10px 28px rgba(15,23,42,.16);z-index:40;opacity:0;transform:translateY(10px) scale(.96);pointer-events:none;transition:opacity .22s var(--ease-out,ease),transform .22s var(--ease-out,ease)}
  .vessel-fnav.is-visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
  .vessel-fnav .fnav-btn{width:40px;height:40px;border-radius:999px;border:0;background:transparent;color:#475569;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,color .15s}
  .vessel-fnav .fnav-btn:hover{background:var(--brand-50,#eff6ff);color:var(--brand-600,#2563eb)}
  .vessel-fnav .fnav-btn:disabled{opacity:.3;cursor:default}
  .vessel-fnav .fnav-btn:disabled:hover{background:transparent;color:#475569}
  .vessel-fnav .fnav-sep{height:1px;background:#f1f5f9;margin:1px 6px}
  .vessel-fnav .fnav-list{color:var(--brand-600,#2563eb)}
  .vessel-fnav .fnav-list:hover{background:var(--brand-600,#2563eb);color:#fff}
  .vessel-fnav .fnav-btn svg{width:20px;height:20px}

  /* ---- Mobile: stack table rows (label over value) ---- */
  @media (max-width: 720px) {
    .report-shell{padding:12px 12px 56px;gap:12px}
    .sec-head{padding:12px 16px}
    .sec-body{padding:16px}
    .sec-body[style*="padding:0"]{padding:14px !important}
    .rid-card{padding:18px 16px}

    /* Meta bar: full-width action group, buttons stretch but stay inline */
    .meta-actions{width:100%;display:flex;gap:8px}
    .meta-actions .meta-btn{flex:1;justify-content:center}

    .v-table, .alert-table, .ra-table,
    .v-table tbody, .alert-table tbody, .ra-table tbody,
    .v-table tr, .alert-table tr, .ra-table tr,
    .v-table td, .alert-table td, .ra-table td { display:block; width:100%; }
    .v-table thead, .alert-table thead, .ra-table thead { display:none; }

    .v-table tr, .alert-table tr, .ra-table tr {
      border:1px solid #e2e8f0; border-radius:10px; margin:0 0 10px; padding:8px 4px; background:#fff;
    }
    .v-table tr:last-child, .alert-table tr:last-child, .ra-table tr:last-child { margin-bottom:0; }
    .v-table tr:hover td, .alert-table tbody tr:hover td, .ra-table tr:hover td { background:transparent; }

    .v-table td, .alert-table td, .ra-table td {
      border:0; padding:6px 14px;
    }
    .v-table td::before, .alert-table td::before, .ra-table td::before {
      content: attr(data-label); display:block; margin-bottom:3px;
      font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:#94a3b8;
    }
    /* keep the red flag accent on stacked flagged rows */
    .alert-table tr.at-flagged { border-left:3px solid #dc2626; }
    .alert-table tr.at-flagged td:first-child { border-left:0; }
    .alert-table .at-desc{padding-left:0}
    /* Alert Type Summary keeps a 2-column row on mobile: type left, count right */
    .alert-table tr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .alert-table td{padding:10px 14px;width:auto}
    .alert-table td:first-child{flex:1 1 auto;min-width:0}
    .alert-table .at-name{flex-wrap:wrap}
    .alert-table .at-desc{max-width:none}
    .alert-table .at-count{flex:0 0 auto;text-align:right}
    .alert-table td::before{display:none}

    /* Vessels card: compact label-left / value-right rows on mobile */
    .v-table tr{padding:2px 2px;margin-bottom:8px}
    .v-table td{display:flex;align-items:center;justify-content:space-between;gap:14px;width:auto;padding:7px 14px;border-bottom:1px solid #f1f5f9}
    .v-table td:last-child{border-bottom:0}
    .v-table td::before{margin-bottom:0;flex:0 0 auto}
    .v-table td .flag-cell{text-align:right}
    .v-table td:last-child > span{justify-content:flex-end}
    .v-table tr.v-group{border:0;background:transparent;margin:12px 0 2px;padding:0}
    .v-table tr.v-group td{display:block;background:transparent;border:0;padding:2px;font-size:11.5px}
    .v-table tr.v-group td::before{display:none}

    /* Vessel Details spec table: stack label-over-value on mobile */
    .spec-table, .spec-table tbody, .spec-table tr, .spec-table th, .spec-table td{display:block;width:auto}
    .spec-table tr{border:0}
    .spec-table th{padding:8px 0 1px;color:#94a3b8}
    .spec-table td{padding:0 0 7px;border-bottom:1px solid #f1f5f9}
    .spec-table tr:last-child td:last-child{border-bottom:0}
  }
  @media (max-width: 420px) {
    .stat-grid{grid-template-columns:1fr}
  }

  /* Print rules — collapse app chrome so the page prints clean */

/* ─────────────────────────── Risk donut ─────────────────────────── */
function riskTier(score) {
  if (score <= 10) return { label:'GOOD',         c:'#16a34a', glow:'#86efac' };
  if (score <= 25) return { label:'AVERAGE RISK', c:'#f97316', glow:'#fed7aa' };
  return                  { label:'HIGH RISK',    c:'#ef4444', glow:'#fca5a5' };
}
function RiskGauge(score) {
  const risk = riskTier(score);
  const CX = 100, CY = 108, R = 80, RO = 95, SW = 11;
  const toRad = d => d * Math.PI / 180;
  const pt    = (a, r) => [+(CX + r*Math.cos(toRad(a))).toFixed(2), +(CY + r*Math.sin(toRad(a))).toFixed(2)];
  const [sox, soy] = pt(135, RO);
  const [eox, eoy] = pt(45,  RO);
  const GAUGE_MAX = 50, GAUGE_START = 135, GAUGE_SWEEP = 270;
  const gAngle = s => GAUGE_START + (Math.min(s, GAUGE_MAX) / GAUGE_MAX) * GAUGE_SWEEP;
  const arcD = (a1, a2, r) => {
    const [x1,y1] = pt(a1, r), [x2,y2] = pt(a2, r);
    const sw = ((a2 - a1) % 360 + 360) % 360;
    return `M ${x1},${y1} A ${r},${r} 0 ${sw > 180 ? 1 : 0},1 ${x2},${y2}`;
  };
  const lerpHex = (c1, c2, t) => {
    const h = s => parseInt(s, 16);
    const f = (a, b) => Math.round(h(a) + (h(b) - h(a)) * t).toString(16).padStart(2, '0');
    return '#' + f(c1.slice(1,3),c2.slice(1,3)) + f(c1.slice(3,5),c2.slice(3,5)) + f(c1.slice(5,7),c2.slice(5,7));
  };
  const gaugeColor = s => {
    const stops = [[0,'#22c55e'],[10,'#eab308'],[25,'#f97316'],[50,'#ef4444']];
    for (let i = 0; i < stops.length - 1; i++) {
      if (s <= stops[i+1][0]) {
        const t = (s - stops[i][0]) / (stops[i+1][0] - stops[i][0]);
        return lerpHex(stops[i][1], stops[i+1][1], t);
      }
    }
    return stops[stops.length-1][1];
  };
  const N = 54;
  const segPaths = Array.from({length: N}, (_, i) => {
    const a1 = gAngle(i * GAUGE_MAX / N);
    const a2 = gAngle((i + 1) * GAUGE_MAX / N);
    const mid = (i + 0.5) * GAUGE_MAX / N;
    const filled = mid <= score;
    return `<path d="${arcD(a1, a2, R)}" fill="none" stroke="${filled ? gaugeColor(mid) : '#e2e8f0'}" stroke-width="${SW}" stroke-linecap="butt"/>`;
  }).join('');
  const glowColor = score <= 10 ? '#86efac' : score <= 25 ? '#fcd34d' : '#fca5a5';
  const fillTipA  = gAngle(Math.min(score, GAUGE_MAX));
  const fillTipB  = gAngle(Math.max(0, Math.min(score, GAUGE_MAX) - GAUGE_MAX * 0.08));
  const glowPath  = score > 0
    ? `<path d="${arcD(fillTipB, fillTipA, R)}" fill="none" stroke="${glowColor}" stroke-width="${SW + 8}" stroke-linecap="round" opacity="0.3"/>`
    : '';
  const gid = 'rsGlow_' + Math.random().toString(36).slice(2, 9);
  return `
  <svg class="gauge-svg" viewBox="0 0 200 192" preserveAspectRatio="xMidYMid meet">
    <defs>
      <radialGradient id="${gid}" cx="50%" cy="55%" r="42%">
        <stop offset="0%" stop-color="${risk.glow}" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="${risk.glow}" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <ellipse cx="100" cy="108" rx="70" ry="60" fill="url(#${gid})"/>
    <path d="M ${sox},${soy} A ${RO},${RO} 0 1,1 ${eox},${eoy}"
      fill="none" stroke="#dde4ef" stroke-width="1.5" stroke-dasharray="3 8.2" stroke-linecap="round"/>
    ${glowPath}
    ${segPaths}
    <text x="100" y="122" text-anchor="middle" font-size="52" font-weight="800" fill="#0f172a" font-family="Inter,sans-serif">${score}</text>
  </svg>`;
}
function RiskGuide(score) {
  const cards = [
    { name:'Good',       range:'0 – 10',   pct:14, c:'#16a34a', bg:'#f0fdf4', bd:'#bbf7d0', icoBg:'#dcfce7',
      ico:`<svg width="12" height="12" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>` },
    { name:'Average',    range:'10 – 25',  pct:55, c:'#d97706', bg:'#fffbeb', bd:'#fde68a', icoBg:'#fef3c7',
      ico:`<svg width="12" height="12" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/></svg>` },
    { name:'Below Avg.', range:'25 – 100', pct:31, c:'#dc2626', bg:'#fff1f2', bd:'#fecdd3', icoBg:'#fee2e2',
      ico:`<svg width="12" height="12" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>` },
  ];
  const activeIdx = score <= 10 ? 0 : score <= 25 ? 1 : 2;
  return `
  <div class="risk-guide">
    ${cards.map((c, i) => `
      <div class="rg-card" style="background:${c.bg};border-color:${c.bd};${i===activeIdx ? 'box-shadow:0 0 0 2px '+c.c+'33;' : ''}">
        <div class="rg-row">
          <div class="rg-ico" style="background:${c.icoBg}">${c.ico}</div>
          <div style="min-width:0;flex:1">
            <div class="rg-name" style="color:${c.c}">${c.name}</div>
            <div class="rg-range">${c.range}</div>
          </div>
          <div class="rg-pct">${c.pct}%</div>
        </div>
        <div class="rg-bar"><span style="width:${c.pct}%;background:${c.c}"></span></div>
      </div>`).join('')}
  </div>`;
}

function ActivityRow(a) {
  const ic = a.tone === 'red' ? 'red' : a.tone === 'blue' ? 'blue' : 'amber';
  const icon = a.tone === 'red'  ? ICO.actSend
            : a.tone === 'blue' ? ICO.actAnchor
            : ICO.actTri;
  // pick more themed icons by label keywords
  let chosen = icon;
  const L = a.label.toLowerCase();
  if      (L.includes('suspicious activity') || L.includes('dark')) chosen = '<span class="icon-suspicious"></span>';
  else if (L.includes('port call'))  chosen = '<span class="icon-port-call"></span>';
  else if (L.includes('loitering'))  chosen = '<span class="icon-loitering"></span>';
  else if (L.includes('location'))   chosen = '<span class="icon-location-sts"></span>';
  else if (L.includes('suspicious')) chosen = '<span class="icon-vessel-sts"></span>';
  else if (L.includes('compliance')) chosen = ICO.actFlag;
  else if (L.includes('declared'))   chosen = ICO.actTri;

  // Contextual warning note: explicit a.note, otherwise auto-added to high-severity (red) rows
  const NOTE_TRI = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
  const deriveNote = () => {
    if (L.includes('sts'))                                 return 'Event occurred in a heavy GNSS jamming region (Persian Gulf)';
    if (L.includes('suspicious') || L.includes('dark'))    return 'AIS transmission gap overlaps a known spoofing corridor';
    return 'Counterparty vessel appears on the OFAC SDN list';
  };
  const noteText = a.note || (a.tone === 'red' ? deriveNote() : '');

  return `
  <tr>
    <td data-label="Type"><span class="notif"><span class="ni ${ic}">${chosen}</span>${a.label}</span></td>
    <td class="date" data-label="Date">${a.date}</td>
    <td data-label="Details">${a.detail}${noteText ? `<div class="ra-note">${NOTE_TRI}<span>${noteText}</span></div>` : ''}</td>
  </tr>`;
}

  <div id="vessel-fnav" class="vessel-fnav no-print" role="navigation" aria-label="Vessel navigation" aria-hidden="true">
    <button class="fnav-btn" data-fnav="up" type="button" title="Previous vessel" aria-label="Previous vessel"><i data-lucide="chevron-up"></i></button>
    <span class="fnav-sep"></span>
    <button class="fnav-btn fnav-list" data-fnav="summary" type="button" title="Back to summary" aria-label="Back to summary"><i data-lucide="list"></i></button>
    <span class="fnav-sep"></span>
    <button class="fnav-btn" data-fnav="down" type="button" title="Next vessel" aria-label="Next vessel"><i data-lucide="chevron-down"></i></button>
  </div>`;
}

function DisclaimerCard() {
  return `
  <section class="report-card disc">
    <div class="disc-title">Disclaimers</div>
    <p>* Sanctioned/dark areas are areas for the distributed analysis of the following countries: Iran, Syria, North Korea, Cuba, Venezuela and Crimea (Russia).</p>
    <p>** Sanctioned countries are Iran, Syria, North Korea, Cuba, Venezuela and Crimea (Russia).</p>
    <p>*** Vessel lists is U.S. OFAC, SDN List, EU list of targets, UN Security Council Confidential list of targets or vessels flying flag of a sanctioned country.</p>
  </section>`;
}

/* ─────────────────────────── Render ─────────────────────────── */
window.render = function () {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      <main class="flex-1 overflow-y-auto scroll-thin" style="background:#f1f5f9">
        <div class="report-shell">
          ${MetaBar()}
          ${SummaryCard()}
          ${AlertTypeSummaryCard()}
          ${VesselsTableCard()}
          ${VESSELS.map(VesselDetailsCard).join('')}
          ${RiskDescCard()}
          ${DisclaimerCard()}
        </div>
      </main>
    </div>
    ${FloatingNav()}
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();

  // Render Lucide icons (summary stat metrics, etc.)
  if (window.lucide && typeof window.lucide.createIcons === 'function') {
    window.lucide.createIcons();
  }

  /* Floating vessel navigation: appears once the first vessel card scrolls
     near the top. Up/Down step between vessel detail cards; the list icon
     jumps back to the Summary card. */
  (function setupVesselNav() {
    const main = document.querySelector('main');
    const fnav = document.getElementById('vessel-fnav');
    if (!main || !fnav) return;
    const cards = Array.from(document.querySelectorAll('.vessel-detail-card'));
    const summary = document.getElementById('summary-card');
    if (!cards.length) return;
    const THRESHOLD = 140; // px below the scroll-viewport top that counts as "reached"

    const scrollToEl = (el) => {
      const top = main.scrollTop + (el.getBoundingClientRect().top - main.getBoundingClientRect().top) - 16;
      main.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    };
    const currentIndex = () => {
      const mt = main.getBoundingClientRect().top;
      let idx = -1;
      cards.forEach((c, i) => { if (c.getBoundingClientRect().top - mt <= THRESHOLD) idx = i; });
      return idx;
    };

    const upBtn   = fnav.querySelector('[data-fnav="up"]');
    const downBtn = fnav.querySelector('[data-fnav="down"]');
    const sumBtn  = fnav.querySelector('[data-fnav="summary"]');

    if (upBtn)   upBtn.onclick   = () => { const i = currentIndex(); scrollToEl(cards[Math.max(0, i - 1)]); };
    if (downBtn) downBtn.onclick = () => { const i = currentIndex(); if (i < cards.length - 1) scrollToEl(cards[i + 1]); };
    if (sumBtn)  sumBtn.onclick  = () => { if (summary) scrollToEl(summary); };

    const update = () => {
      const mt = main.getBoundingClientRect().top;
      const firstTop = cards[0].getBoundingClientRect().top - mt;
      const visible = firstTop <= THRESHOLD;
      fnav.classList.toggle('is-visible', visible);
      fnav.setAttribute('aria-hidden', visible ? 'false' : 'true');
      const i = currentIndex();
      if (upBtn)   upBtn.disabled   = i <= 0;
      if (downBtn) downBtn.disabled = i >= cards.length - 1;
    };
    main.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update);
    update();
  })();

  /* Vessel-name links jump to that vessel's detail card within the scroll container */
  (function setupVesselLinks() {
    const main = document.querySelector('main');
    if (!main) return;
    document.querySelectorAll('.v-table a[href^="#vessel-card-"]').forEach(a => {
      a.addEventListener('click', (e) => {
        const el = document.getElementById(a.getAttribute('href').slice(1));
        if (!el) return;
        e.preventDefault();
        const top = main.scrollTop + (el.getBoundingClientRect().top - main.getBoundingClientRect().top) - 16;
        main.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
      });
    });
  })();

  /* Chrome was authored for pages at the project root. We're one folder
     down, so retarget every relative link/image in the shell to '../'.
     Scope is the whole document because wireChrome() relocates the
     notification + user popovers out of <header> into <body> to escape
     the sticky stacking context. Run twice (now + next tick) in case
     anything in the chrome lazily re-renders. */
  const rebase = () => {
    document.querySelectorAll('a[href]').forEach(a => {
      const h = a.getAttribute('href');
      if (!h || /^(?:[a-z]+:|\/\/|#|\?|\.\.\/)/i.test(h) || h.startsWith('/')) return;
      a.setAttribute('href', '../' + h);
    });
    document.querySelectorAll('img[src]').forEach(img => {
      const s = img.getAttribute('src');
      if (!s || /^(?:[a-z]+:|\/\/|\.\.\/|data:)/i.test(s) || s.startsWith('/')) return;
      img.setAttribute('src', '../' + s);
    });
  };
  rebase();
  setTimeout(rebase, 0);

  // Print + download wiring
  const printBtn = document.getElementById('print-btn');
  if (printBtn) printBtn.addEventListener('click', () => window.print());
  const dlBtn = document.getElementById('dl-btn');
  if (dlBtn) dlBtn.addEventListener('click', () => window.print()); // demo: print-to-PDF

  // Re-stamp page title with report period
  document.title = `Weekly Fleet Monitoring Report (${REPORT_META.periodFrom} – ${REPORT_META.periodTo}) — Real World`;
};

window.render();
</script>
</body>
</html>
