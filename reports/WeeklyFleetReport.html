<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Weekly Fleet Monitoring Report — Real World</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  tailwind.config = {
    theme: { extend: {
      fontFamily: { sans:['Inter','ui-sans-serif','system-ui','sans-serif'], display:['Exo','Inter','sans-serif'] },
      colors: {
        brand: {50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a'},
        ink:   {900:'#0f172a',800:'#1e293b',700:'#334155',600:'#475569',500:'#64748b',400:'#94a3b8',300:'#cbd5e1',200:'#e2e8f0',100:'#f1f5f9',50:'#f8fafc'},
      },
      boxShadow: {
        'card':'0 1px 2px 0 rgb(15 23 42 / 0.04), 0 1px 3px 0 rgb(15 23 42 / 0.06)',
      },
    }},
  };
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4,h5,h6,.font-display{font-family:'Exo','Inter',sans-serif;letter-spacing:-.005em}
  .scroll-thin::-webkit-scrollbar{width:6px;height:6px}
  .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
  .tracking-micro{letter-spacing:.04em}

  /* Report container — A4-ish doc shell sitting on light grey app bg */
  .report-shell{max-width:1180px;margin:0 auto;padding:18px 22px 60px;display:flex;flex-direction:column;gap:14px}
  .report-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 1px 3px rgba(15,23,42,.05);overflow:hidden}

  /* Section headers (compact horizontal heading bar) */
  .sec-head{padding:14px 22px;border-bottom:1px solid #f1f5f9;font-size:13px;font-weight:700;color:#0f172a;letter-spacing:.02em;text-transform:none}
  .sec-body{padding:20px 22px}

  /* Top meta bar */
  .meta-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:10px 22px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
  .meta-item{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:#475569}
  .meta-item .lbl{color:#94a3b8;font-weight:500}
  .meta-item .val{color:#0f172a;font-weight:600;font-variant-numeric:tabular-nums}
  .meta-actions{display:flex;align-items:center;gap:8px}
  .meta-btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;font-size:12.5px;font-weight:600;color:#334155;cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s}
  .meta-btn:hover{background:#f8fafc;border-color:#cbd5e1}
  .meta-btn svg{color:#64748b}

  /* Summary stat cards (light blue boxes) */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:8px}
  .stat-card{background:#eff6ff;border:1px solid #dbeafe;border-radius:10px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  .stat-card .stat-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#2563eb;margin-bottom:2px}
  .stat-card .stat-num{font-family:'Exo','Inter',sans-serif;font-size:30px;font-weight:700;color:#1d4ed8;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .stat-card .stat-label{font-size:11.5px;font-weight:500;color:#475569}
  @media(max-width:760px){ .stat-grid{grid-template-columns:repeat(2,1fr)} }

  /* Vessel list table */
  .v-table{width:100%;border-collapse:collapse;font-size:12.5px}
  .v-table th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:#0f172a;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #e2e8f0;white-space:nowrap}
  .v-table td{padding:11px 12px;border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:middle}
  .v-table tr:last-child td{border-bottom:0}
  .v-table tr:hover td{background:#f8fafc}
  .v-table td.vname a{color:#2563eb;font-weight:700;letter-spacing:.02em;text-decoration:none;font-size:12.5px}
  .v-table td.vname a:hover{text-decoration:underline}
  .v-table .imo{color:#475569;font-variant-numeric:tabular-nums}
  .v-table .flag-cell{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:#334155}
  .v-table .flag-img{width:22px;height:16px;object-fit:cover;border:1px solid #e2e8f0;border-radius:2px;flex-shrink:0;display:block}
  .v-table .risk-chip{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 9px;border:1px solid transparent;border-radius:999px;font-size:12.5px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
  .v-table .risk-chip .risk-dot{width:7px;height:7px;border-radius:999px;flex-shrink:0}
  .v-table .risk-chip .risk-tier{font-size:9.5px;font-weight:700;letter-spacing:.04em;opacity:.85}

  /* Vessel details body */
  .vd-head{display:flex;align-items:flex-start;gap:14px;padding:18px 22px 8px}
  .vd-flag-block{display:flex;align-items:flex-start;gap:14px;flex:1;min-width:0}
  .vd-flag{width:46px;height:32px;border:1px solid #e2e8f0;border-radius:3px;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;background:#f8fafc;flex-shrink:0}
  .vd-flag img{width:100%;height:100%;object-fit:cover;display:block}
  .vd-title{font-family:'Exo','Inter',sans-serif;font-size:18px;font-weight:700;color:#2563eb;letter-spacing:.01em;line-height:1.15}
  .vd-sub{font-size:11.5px;color:#64748b;margin-top:3px;line-height:1.5}
  .vd-sub .sep{margin:0 6px;color:#cbd5e1}

  /* Risk gauge block (matches VesselDetails page) */
  .vd-body{display:grid;grid-template-columns:260px 1fr;gap:22px;padding:8px 22px 18px;align-items:flex-start}
  .risk-block{display:flex;flex-direction:column;align-items:stretch;gap:10px;padding-top:2px}
  .risk-label{font-size:10px;font-weight:600;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;text-align:center}
  .gauge-card{background:#f8fafc;border-radius:12px;padding:12px 8px 10px;display:flex;flex-direction:column;align-items:center}
  .gauge-card svg.gauge-svg{width:100%;max-width:200px;height:auto;overflow:visible}
  .gauge-pill{display:flex;align-items:center;gap:4px;margin-top:-14px;margin-bottom:2px}
  .gauge-pill .pill-lbl{font-size:10px;font-weight:700;letter-spacing:.06em}
  .risk-guide{display:flex;flex-direction:column;gap:6px}
  .rg-card{border-radius:10px;padding:8px 9px;border:1px solid transparent}
  .rg-card .rg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
  .rg-card .rg-ico{width:24px;height:24px;border-radius:999px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .rg-card .rg-name{font-size:11px;font-weight:700;line-height:1.1}
  .rg-card .rg-range{font-size:9.5px;color:#64748b;margin-top:1px}
  .rg-card .rg-pct{margin-left:auto;font-size:12.5px;font-weight:800;color:#0f172a;flex-shrink:0;font-variant-numeric:tabular-nums}
  .rg-card .rg-bar{height:4px;background:#e2e8f0;border-radius:999px;overflow:hidden}
  .rg-card .rg-bar > span{display:block;height:100%;border-radius:999px}

  /* Property grid */
  .prop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px 28px}
  .prop{display:flex;flex-direction:column;gap:3px;min-width:0}
  .prop .pk{font-size:10.5px;font-weight:500;color:#94a3b8;letter-spacing:.01em}
  .prop .pv{font-size:12.5px;font-weight:600;color:#0f172a;line-height:1.4;word-break:break-word}
  .prop .pv.flag-val{display:inline-flex;align-items:center;gap:8px}
  .prop .pv.flag-val .flag-img{width:22px;height:16px;object-fit:cover;border:1px solid #e2e8f0;border-radius:2px;display:block;flex-shrink:0}
  @media(max-width:780px){ .vd-body{grid-template-columns:1fr} .prop-grid{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:520px){ .prop-grid{grid-template-columns:1fr} }

  /* Recent activity sub-block */
  .ra-wrap{border-top:1px solid #f1f5f9;padding:14px 22px 18px;background:#fcfdff}
  .ra-title{font-size:12.5px;font-weight:700;color:#0f172a;margin-bottom:10px;letter-spacing:.01em}
  .ra-table{width:100%;border-collapse:collapse;font-size:12px}
  .ra-table th{text-align:left;padding:8px 10px;font-size:10.5px;font-weight:700;color:#0f172a;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #e2e8f0;white-space:nowrap}
  .ra-table td{padding:9px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle;color:#334155}
  .ra-table tr:last-child td{border-bottom:0}
  .ra-table .notif{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:#334155;font-weight:500}
  .ra-table .notif .ni{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;background:#fef3c7;color:#d97706;flex-shrink:0}
  .ra-table .notif .ni.blue{background:#dbeafe;color:#2563eb}
  .ra-table .notif .ni.red{background:#fee2e2;color:#dc2626}
  .ra-table .notif .ni.amber{background:#fef3c7;color:#d97706}
  .ra-table .date{color:#475569;font-variant-numeric:tabular-nums;white-space:nowrap;font-size:11.5px}

  /* Risk Indicator Descriptions (blue card) */
  .rid-card{background:linear-gradient(180deg,#1e3a8a 0%, #1e40af 100%);border-radius:14px;padding:22px 26px;color:#fff;box-shadow:0 1px 3px rgba(15,23,42,.08)}
  .rid-title{font-family:'Exo','Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#bfdbfe;margin-bottom:18px}
  .rid-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px 28px}
  .rid-item{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:6px 4px}
  .rid-item .rid-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:10px}
  .rid-item .rid-name{font-family:'Exo','Inter',sans-serif;font-size:12.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;margin-top:2px}
  .rid-item .rid-desc{font-size:11.5px;color:#bfdbfe;line-height:1.5;max-width:260px}
  @media(max-width:760px){ .rid-grid{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:480px){ .rid-grid{grid-template-columns:1fr} }

  /* Disclaimers */
  .disc{padding:14px 22px;color:#64748b;font-size:11px;line-height:1.65}
  .disc .disc-title{font-weight:700;color:#0f172a;font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
  .disc p{margin-bottom:3px}
  .disc strong{color:#334155;font-weight:600}

  /* Print rules — collapse app chrome so the page prints clean */
  @media print {
    @page { size: A4; margin: 14mm; }
    body { background:#fff !important; }
    #sidebar, header.sticky, .meta-actions, .no-print { display:none !important; }
    main { padding:0 !important; background:#fff !important; }
    .report-shell { max-width:none; padding:0; gap:10px; }
    .report-card, .meta-bar { box-shadow:none; border-color:#e2e8f0; }
    .rid-card { color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .stat-card { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .report-card { break-inside:avoid; page-break-inside:avoid; }
  }
</style>
</head>

/* Build a flagcdn <img>. w sets the requested raster width bucket
   (flagcdn supports w20, w40, w80, w160, w320, w640, w1280, w2560). */
function flagImg(code, w = 40, alt = '') {
  if (!code) return '';
  const src = `https://flagcdn.com/w${w}/${code}.png`;
  const srcset = `https://flagcdn.com/w${w*2}/${code}.png 2x`;
  return `<img class="flag-img" src="${src}" srcset="${srcset}" alt="${alt} flag" loading="lazy" />`;
}

/* ─────────────────────────── Risk donut ─────────────────────────── */
function riskTier(score) {
  if (score <= 10) return { label:'GOOD',         c:'#16a34a', glow:'#86efac' };
  if (score <= 25) return { label:'AVERAGE RISK', c:'#f97316', glow:'#fed7aa' };
  return                  { label:'HIGH RISK',    c:'#ef4444', glow:'#fca5a5' };
}
function RiskGauge(score) {
  const risk = riskTier(score);
  const CX = 100, CY = 108, R = 80, RO = 95, SW = 11;
  const toRad = d => d * Math.PI / 180;
  const pt    = (a, r) => [+(CX + r*Math.cos(toRad(a))).toFixed(2), +(CY + r*Math.sin(toRad(a))).toFixed(2)];
  const [sox, soy] = pt(135, RO);
  const [eox, eoy] = pt(45,  RO);
  const GAUGE_MAX = 50, GAUGE_START = 135, GAUGE_SWEEP = 270;
  const gAngle = s => GAUGE_START + (Math.min(s, GAUGE_MAX) / GAUGE_MAX) * GAUGE_SWEEP;
  const arcD = (a1, a2, r) => {
    const [x1,y1] = pt(a1, r), [x2,y2] = pt(a2, r);
    const sw = ((a2 - a1) % 360 + 360) % 360;
    return `M ${x1},${y1} A ${r},${r} 0 ${sw > 180 ? 1 : 0},1 ${x2},${y2}`;
  };
  const lerpHex = (c1, c2, t) => {
    const h = s => parseInt(s, 16);
    const f = (a, b) => Math.round(h(a) + (h(b) - h(a)) * t).toString(16).padStart(2, '0');
    return '#' + f(c1.slice(1,3),c2.slice(1,3)) + f(c1.slice(3,5),c2.slice(3,5)) + f(c1.slice(5,7),c2.slice(5,7));
  };
  const gaugeColor = s => {
    const stops = [[0,'#22c55e'],[10,'#eab308'],[25,'#f97316'],[50,'#ef4444']];
    for (let i = 0; i < stops.length - 1; i++) {
      if (s <= stops[i+1][0]) {
        const t = (s - stops[i][0]) / (stops[i+1][0] - stops[i][0]);
        return lerpHex(stops[i][1], stops[i+1][1], t);
      }
    }
    return stops[stops.length-1][1];
  };
  const N = 54;
  const segPaths = Array.from({length: N}, (_, i) => {
    const a1 = gAngle(i * GAUGE_MAX / N);
    const a2 = gAngle((i + 1) * GAUGE_MAX / N);
    const mid = (i + 0.5) * GAUGE_MAX / N;
    const filled = mid <= score;
    return `<path d="${arcD(a1, a2, R)}" fill="none" stroke="${filled ? gaugeColor(mid) : '#e2e8f0'}" stroke-width="${SW}" stroke-linecap="butt"/>`;
  }).join('');
  const glowColor = score <= 10 ? '#86efac' : score <= 25 ? '#fcd34d' : '#fca5a5';
  const fillTipA  = gAngle(Math.min(score, GAUGE_MAX));
  const fillTipB  = gAngle(Math.max(0, Math.min(score, GAUGE_MAX) - GAUGE_MAX * 0.08));
  const glowPath  = score > 0
    ? `<path d="${arcD(fillTipB, fillTipA, R)}" fill="none" stroke="${glowColor}" stroke-width="${SW + 8}" stroke-linecap="round" opacity="0.3"/>`
    : '';
  const gid = 'rsGlow_' + Math.random().toString(36).slice(2, 9);
  return `
  <svg class="gauge-svg" viewBox="0 0 200 192" preserveAspectRatio="xMidYMid meet">
    <defs>
      <radialGradient id="${gid}" cx="50%" cy="55%" r="42%">
        <stop offset="0%" stop-color="${risk.glow}" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="${risk.glow}" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <ellipse cx="100" cy="108" rx="70" ry="60" fill="url(#${gid})"/>
    <path d="M ${sox},${soy} A ${RO},${RO} 0 1,1 ${eox},${eoy}"
      fill="none" stroke="#dde4ef" stroke-width="1.5" stroke-dasharray="3 8.2" stroke-linecap="round"/>
    ${glowPath}
    ${segPaths}
    <text x="100" y="122" text-anchor="middle" font-size="52" font-weight="800" fill="#0f172a" font-family="Inter,sans-serif">${score}</text>
  </svg>`;
}
function RiskGuide(score) {
  const cards = [
    { name:'Good',       range:'0 – 10',   pct:14, c:'#16a34a', bg:'#f0fdf4', bd:'#bbf7d0', icoBg:'#dcfce7',
      ico:`<svg width="12" height="12" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>` },
    { name:'Average',    range:'10 – 25',  pct:55, c:'#d97706', bg:'#fffbeb', bd:'#fde68a', icoBg:'#fef3c7',
      ico:`<svg width="12" height="12" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/></svg>` },
    { name:'Below Avg.', range:'25 – 100', pct:31, c:'#dc2626', bg:'#fff1f2', bd:'#fecdd3', icoBg:'#fee2e2',
      ico:`<svg width="12" height="12" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>` },
  ];
  const activeIdx = score <= 10 ? 0 : score <= 25 ? 1 : 2;
  return `
  <div class="risk-guide">
    ${cards.map((c, i) => `
      <div class="rg-card" style="background:${c.bg};border-color:${c.bd};${i===activeIdx ? 'box-shadow:0 0 0 2px '+c.c+'33;' : ''}">

        </div>
        <div class="rg-bar"><span style="width:${c.pct}%;background:${c.c}"></span></div>
      </div>`).join('')}
  </div>`;
}

            : ICO.actTri;
  // pick more themed icons by label keywords
  let chosen = icon;
  const L = a.label.toLowerCase();
  if      (L.includes('dark'))       chosen = ICO.actSend;
  else if (L.includes('port call'))  chosen = ICO.actAnchor;
  else if (L.includes('loitering'))  chosen = ICO.actClock;
  else if (L.includes('suspicious')) chosen = ICO.actLock;
  else if (L.includes('location'))   chosen = ICO.actPin;

        <div class="prop"><span class="pk">Gross Tonnage</span><span class="pv">${d.grossTonnage}</span></div>

        <div class="prop"><span class="pk">Exhaust</span><span class="pv">${d.exhaust}</span></div>
        <div class="prop"><span class="pk">Classification Society</span><span class="pv">${d.classSoc}</span></div>
        <div class="prop"><span class="pk">DWT</span><span class="pv">${d.dwt}</span></div>

        <div class="prop"><span class="pk">Ship Builder</span><span class="pv">${d.shipBuilder}</span></div>
        <div class="prop"><span class="pk">P&amp;I Club</span><span class="pv">${d.piClub}</span></div>
        <div class="prop"><span class="pk">TEU</span><span class="pv">${d.teu}</span></div>

        <div class="prop"><span class="pk">Year Built</span><span class="pv">${d.yearBuilt}</span></div>
        <div class="prop"><span class="pk">Length</span><span class="pv">${d.length}</span></div>
        <div class="prop"><span class="pk">Last Survey</span><span class="pv">${d.lastSurvey}</span></div>

        <div class="prop" style="grid-column:span 2"><span class="pk">Manager / Operator</span><span class="pv">${d.manager}</span></div>
        <div class="prop"><span class="pk">Width</span><span class="pv">${d.width}</span></div>
      </div>
    </div>
    <div class="ra-wrap">
      <div class="ra-title">Recent Activity</div>
      <table class="ra-table">
        <thead>
          <tr><th>Notification</th><th>Date</th><th>Details</th></tr>
        </thead>
        <tbody>
          ${d.activity.map(ActivityRow).join('')}
        </tbody>
      </table>
    </div>
  </section>`;
}

function RiskDescCard() {
  return `
  <section class="rid-card">
    <div class="rid-title">Risk Indicator Descriptions</div>
    <div class="rid-grid">
      ${RISK_INDICATORS.map(r => `
        <div class="rid-item">
          <span class="rid-icon">${r.icon}</span>
          <span class="rid-name">${r.name}</span>
          <span class="rid-desc">${r.desc}</span>
        </div>
      `).join('')}
    </div>
  </section>`;
}

function DisclaimerCard() {
  return `
  <section class="report-card disc">
    <div class="disc-title">Disclaimers</div>
    <p>* Sanctioned/dark areas are areas for the distributed analysis of the following countries: Iran, Syria, North Korea, Cuba, Venezuela and Crimea (Russia).</p>
    <p>** Sanctioned countries are Iran, Syria, North Korea, Cuba, Venezuela and Crimea (Russia).</p>
    <p>*** Vessel lists is U.S. OFAC, SDN List, EU list of targets, UN Security Council Confidential list of targets or vessels flying flag of a sanctioned country.</p>
  </section>`;
}

/* ─────────────────────────── Render ─────────────────────────── */
window.render = function () {
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      ${SC.Topbar()}
      <main class="flex-1 overflow-y-auto scroll-thin" style="background:#f1f5f9">
        <div class="report-shell">
          ${MetaBar()}
          ${SummaryCard()}
          ${VesselsTableCard()}
          ${VESSELS.map(VesselDetailsCard).join('')}
          ${RiskDescCard()}
          ${DisclaimerCard()}
        </div>
      </main>
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();

  // Render Lucide icons (summary stat metrics, etc.)
  if (window.lucide && typeof window.lucide.createIcons === 'function') {
    window.lucide.createIcons();
  }

  /* Chrome was authored for pages at the project root. We're one folder
     down, so retarget every relative link/image in the shell to '../'.
     Scope is the whole document because wireChrome() relocates the
     notification + user popovers out of <header> into <body> to escape
     the sticky stacking context. Run twice (now + next tick) in case
     anything in the chrome lazily re-renders. */
  const rebase = () => {
    document.querySelectorAll('a[href]').forEach(a => {
      const h = a.getAttribute('href');
      if (!h || /^(?:[a-z]+:|\/\/|#|\?|\.\.\/)/i.test(h) || h.startsWith('/')) return;
      a.setAttribute('href', '../' + h);
    });
    document.querySelectorAll('img[src]').forEach(img => {
      const s = img.getAttribute('src');
      if (!s || /^(?:[a-z]+:|\/\/|\.\.\/|data:)/i.test(s) || s.startsWith('/')) return;
      img.setAttribute('src', '../' + s);
    });
  };
  rebase();
  setTimeout(rebase, 0);

  // Print + download wiring
  const printBtn = document.getElementById('print-btn');
  if (printBtn) printBtn.addEventListener('click', () => window.print());
  const dlBtn = document.getElementById('dl-btn');
  if (dlBtn) dlBtn.addEventListener('click', () => window.print()); // demo: print-to-PDF

  // Re-stamp page title with report period
  document.title = `Weekly Fleet Monitoring Report (${REPORT_META.periodFrom} – ${REPORT_META.periodTo}) — Real World`;
};

window.render();
</script>
</body>
</html>
