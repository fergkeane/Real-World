function flag(cc, size='sm') {
  if (!cc) return '';
  const h = size === 'md' ? 18 : 14;
  const w = size === 'md' ? 26 : 20;
  return `<img src="https://flagcdn.com/w40/${cc}.png" srcset="https://flagcdn.com/w80/${cc}.png 2x" alt="${cc.toUpperCase()}" width="${w}" height="${h}" class="inline-block rounded-[2px] ring-1 ring-ink-200/80 object-cover" style="width:${w}px;height:${h}px" loading="lazy" />`;
}

function tabs(tabs, active, attr, stretch = false) {
  return `
  <div class="ds-tabs${stretch ? ' is-stretch' : ''}" data-tab-group="${attr}">
    <span class="ds-tab-pill is-init" data-tab-pill></span>
    ${tabs.map(t => {
      const upArrow = `<svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5M5 12l7-7 7 7"/></svg>`;
      const downArrow = `<svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12l7 7 7-7"/></svg>`;
      const scoreBadge = t.scoreBadge ? `<span class="ml-1.5 inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full text-[10px] font-bold ${t.scoreBadge.tone.bg} ${t.scoreBadge.tone.text}">${t.scoreBadge.value}${t.scoreBadge.up ? upArrow : downArrow}</span>` : '';
      const iBadge = t.badge ? `<span class="ml-1 inline-flex items-center justify-center text-[9px] font-bold bg-orange-500 text-white rounded-full" style="width:14px;height:14px;flex-shrink:0;">${t.badge}</span>` : '';
      const iconHtml = t.icon ? `<span class="inline-flex items-center" style="width:14px;height:14px;flex-shrink:0;">${SC.I[t.icon]}</span>` : '';
      return `
      <button ${attr}="${t.k}" aria-selected="${t.k===active}" class="ds-tab" style="font-size:13px; padding:7px 16px;">
        <span class="ds-tab-label">
          ${iconHtml}${t.k}${iBadge}${scoreBadge}
        </span>
      </button>`;
    }).join('')}
  </div>`;
}

function iconTabs(tabs, active, attr) {
  return `
  <div class="ds-tabs" data-tab-group="${attr}">
    <span class="ds-tab-pill is-init" data-tab-pill></span>
    ${tabs.map(t => `
      <button ${attr}="${t.k}" aria-selected="${t.k===active}" class="ds-tab" style="font-size:12px; padding:8px 14px;">
        <span class="ds-tab-label">
          ${t.icon ? `<span class="inline-flex items-center" style="width:14px;height:14px;flex-shrink:0;">${SC.I[t.icon]}</span>` : ''}
          <span>${t.k}</span>
        </span>
      </button>`).join('')}
  </div>`;
}

function positionTabPills() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.ds-tabs').forEach(group => {
      const pill   = group.querySelector('[data-tab-pill]');
      const active = group.querySelector('.ds-tab[aria-selected="true"]');
      if (!pill || !active) return;
      const gRect = group.getBoundingClientRect();
      const aRect = active.getBoundingClientRect();
      if (!aRect.width) return;
      pill.style.width     = aRect.width + 'px';
      pill.style.transform = `translateX(${aRect.left - gRect.left}px)`;
      requestAnimationFrame(() => pill.classList.remove('is-init'));
    });
  });
}

// Overall Compliance pill badge with a status-coloured dot.
function complianceBadge(status) {
  const s = (status || '').toLowerCase();
  let dot, text, bg, border;
  if (s === 'sanctioned' || s === 'high risk' || s === 'non-compliant') {
    dot = '#dc2626'; text = '#b91c1c'; bg = '#fef2f2'; border = '#fee2e2';
  } else if (s === 'warning' || s === 'under review' || s === 'flagged' || s === 'medium risk') {
    dot = '#d97706'; text = '#b45309'; bg = '#fffbeb'; border = '#fef3c7';
  } else if (s === 'ok' || s === 'compliant' || s === 'clear' || s === 'low risk') {
    dot = '#16a34a'; text = '#15803d'; bg = '#f0fdf4'; border = '#dcfce7';
  } else {
    dot = '#9ca3af'; text = '#4b5563'; bg = '#f9fafb'; border = '#e5e7eb';
  }
  return `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[11px] font-semibold" style="background:${bg};color:${text};border:1px solid ${border};">`
    + `<span class="w-1.5 h-1.5 rounded-full" style="background:${dot};"></span>${status}</span>`;
}

              <svg class="w-3 h-3 transition-transform" style="transform:${expanded?'rotate(180deg)':'rotate(0deg)'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>

          </div>
          ${expanded ? `
          <div class="px-4 pb-3 space-y-1.5 text-xs">
            <div><span class="font-semibold text-ink-900">Location:</span> <span class="text-ink-700">${c.location}</span></div>

  } else if (state.topRightTab === 'Risk Score') {
    const rsScore = 58, rs2025 = 32, rs2024 = 6, rs2023 = 4;
    const rsDelta25   = rsScore - rs2025;   // current (main gauge) vs 2025
    const rsDelta2025 = rs2025  - rs2024;   // 2025 card vs 2024
    const rsDelta24   = rs2024  - rs2023;   // 2024 card vs 2023
    const rsPct = Math.round(Math.abs(rsDelta25) / rs2025 * 100);
    const risk = rsScore <= 25
      ? { label:'GOOD', c:'#16a34a', glow:'#16a34a', pillBg:'#dcfce7', pillTxt:'#15803d' }
      : rsScore <= 50
      ? { label:'AVERAGE RISK', c:'#d97706', glow:'#fef3c7', pillBg:'#fef3c7', pillTxt:'#b45309' }
      : { label:'BELOW AVERAGE', c:'#dc2626', glow:'#fee2e2', pillBg:'#fee2e2', pillTxt:'#dc2626' };
    // Year score → band colour (matches the gauge bands: green ≤25, orange ≤50, red >50)
    const yearColor = s => s <= 25 ? '#16a34a' : s <= 50 ? '#d97706' : '#dc2626';
    const yearPill  = s => s <= 25 ? { bg:'#dcfce7', txt:'#15803d' } : s <= 50 ? { bg:'#fef3c7', txt:'#b45309' } : { bg:'#fee2e2', txt:'#dc2626' };
    // Gauge geometry: 270° arc, start=135° (7:30 o'clock), sweep clockwise
    const CX=100, CY=108, R=80, RO=95, SW=11;
    const toRad = d => d * Math.PI / 180;
    const pt = (a, r) => [+(CX + r*Math.cos(toRad(a))).toFixed(2), +(CY + r*Math.sin(toRad(a))).toFixed(2)];
    const [sx,sy]   = pt(135, R);   // arc track start
    const [ex,ey]   = pt(45,  R);   // arc track end (135+270=405≡45°)
    const [sox,soy] = pt(135, RO);  // outer dot ring start
    const [eox,eoy] = pt(45,  RO);  // outer dot ring end
    // Smooth gradient gauge: 54 fine arc segments, each with interpolated color
    const GAUGE_MAX = 100, GAUGE_START = 135, GAUGE_SWEEP_DEG = 270;
    const gAngle = s => GAUGE_START + (Math.min(s, GAUGE_MAX) / GAUGE_MAX) * GAUGE_SWEEP_DEG;
    const arcD = (a1, a2, r) => {
      const [x1,y1] = pt(a1, r), [x2,y2] = pt(a2, r);
      const sw = ((a2 - a1) % 360 + 360) % 360;
      return `M ${x1},${y1} A ${r},${r} 0 ${sw > 180 ? 1 : 0},1 ${x2},${y2}`;
    };
    // Banded segment color: green ≤25, orange ≤50, red >50
    const gaugeColor = s => (s <= 25 ? '#16a34a' : s <= 50 ? '#d97706' : '#dc2626');
    const whiteCasing = `<path d="${arcD(gAngle(0), gAngle(GAUGE_MAX), R)}" fill="none" stroke="#ffffff" stroke-width="${SW}" stroke-linecap="butt"/>`;
    // Continuous band arcs — divider only between the main bands (at 25 & 50)
    const BANDS = [[0,25,'#16a34a'],[25,50,'#d97706'],[50,100,'#dc2626']];
    const BAND_GAP = 1.4; // degrees of separation between main bands
    const segPaths = BANDS.map(([bs, be, col], bi) => {
      const aStart = gAngle(bs) + (bi > 0 ? BAND_GAP / 2 : 0);
      const aEnd   = gAngle(be) - (bi < BANDS.length - 1 ? BAND_GAP / 2 : 0);
      const fillEnd = Math.max(bs, Math.min(rsScore, be));
      const aFill = gAngle(fillEnd);
      let out = '';
      if (fillEnd > bs) out += `<path d="${arcD(aStart, Math.min(aFill, aEnd), R)}" fill="none" stroke="${col}" stroke-width="${SW}" stroke-linecap="butt"/>`;
      if (fillEnd < be) out += `<path d="${arcD(Math.max(aFill, aStart), aEnd, R)}" fill="none" stroke="#e5e7eb" stroke-width="${SW}" stroke-linecap="butt"/>`;
      return out;
    }).join('');
    const glowColor = rsScore <= 25 ? '#16a34a' : rsScore <= 50 ? '#d97706' : '#fee2e2';
    const fillTipA = gAngle(Math.min(rsScore, GAUGE_MAX));
    const fillTipB = gAngle(Math.max(0, Math.min(rsScore, GAUGE_MAX) - GAUGE_MAX * 0.08));
    const glowPath = rsScore > 0 ? `<path d="${arcD(fillTipB, fillTipA, R)}" fill="none" stroke="${glowColor}" stroke-width="${SW + 8}" stroke-linecap="round" opacity="0.3"/>` : '';
    body = `
    <div style="padding:12px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <!-- Gauge -->
        <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;">
          <div style="position:relative;width:100%;max-width:185px;">
            <svg viewBox="0 0 200 192" style="width:100%;height:auto;overflow:visible;" preserveAspectRatio="xMidYMid meet">
              <defs>
                <radialGradient id="rsGaugeGlow" cx="50%" cy="55%" r="42%">
                  <stop offset="0%" stop-color="${risk.glow}" stop-opacity="0.55"/>
                  <stop offset="100%" stop-color="${risk.glow}" stop-opacity="0"/>
                </radialGradient>
              </defs>

    <div class="px-4 py-3 border-t border-ink-200">

        Download Historical Events

}

/* ----------- MAP ----------- */
let map = null;
let tileLayer = null;
let currentMapType = 'satellite';

const MAP_TYPES = {
  satellite: { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', sub:'abc' },
  street:    { url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', sub:'abcd' },
  dark:      { url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', sub:'abcd' },
  light:     { url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', sub:'abcd' },
};

function setMapType(type) {
  if (!map || !MAP_TYPES[type]) return;
  currentMapType = type;
  if (tileLayer) map.removeLayer(tileLayer);
  const t = MAP_TYPES[type];
  tileLayer = L.tileLayer(t.url, { maxZoom:19, subdomains: t.sub || 'abc', attribution:'' }).addTo(map);
  document.querySelectorAll('[data-vessel-map-type]').forEach(b => {
    b.querySelector('[data-check]').style.opacity = b.dataset.vesselMapType === type ? '1' : '0';
  });
}
function initMap() {
  const c = document.getElementById('vessel-map');
  if (!c) return;

  // If map exists but its container was torn down by a re-render, destroy it first
  if (map) {
    if (!document.body.contains(map.getContainer())) {
      map.remove();
      map = null;
    } else {
      map.invalidateSize();
      wireMapControls();
      return;
    }
  }

  map = L.map(c, {
    center: [35, 25],
    zoom: 5,
    zoomControl: true,
    scrollWheelZoom: true,
    attributionControl: false,
  });

  setMapType('satellite');

  // Route polyline (example path: Suez → Med)
  const route = [
    [29.9, 32.6],   // Suez Canal
    [31.5, 29.9],   // Alexandria
    [33.5, 27.2],
    [35.5, 24.0],   // current position
    [37.0, 21.5],
    [38.2, 20.5],   // Crete area
  ];
  L.polyline(route, { color:'#2d7ffb', weight:2.5, opacity:0.7, dashArray:'6 4' }).addTo(map);

  // Vessel marker — stored globally so wireTimeline can move it
  const vesselIcon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:#dc2626;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(239,68,68,.6)"></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
  window._vesselMarker = L.marker([35.5, 24.0], { icon: vesselIcon })
    .addTo(map)
    .bindPopup('<b>FRESH BREEZE</b><br>Lat 35.5° N &nbsp;Lon 24.0° E<br>Speed: 8.2 kts');
  window._vesselRoute = route;

  // Origin / destination pins
  const pinIcon = (color) => L.divIcon({
    className: '',
    html: `<div style="width:10px;height:10px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
    iconSize: [10, 10], iconAnchor: [5, 5],
  });
  L.marker([29.9, 32.6], { icon: pinIcon('#9ca3af') }).addTo(map).bindPopup('Suez Canal');
  L.marker([38.2, 20.5], { icon: pinIcon('#2e7d4f') }).addTo(map).bindPopup('Hamburg (via Med)');

  // Force a size recalculation once layout is stable
  setTimeout(() => map && map.invalidateSize(), 200);

  wireMapControls();
}

function wireMapControls() {
  const fsBtnEl = document.getElementById('map-fullscreen');
  const cardEl  = document.getElementById('vessel-tracking-card');
  const expandIcon   = document.getElementById('fs-expand-icon');
  const collapseIcon = document.getElementById('fs-collapse-icon');
  const layersBtn  = document.getElementById('map-layers-btn');
  const layersMenu = document.getElementById('map-layers-menu');

  if (fsBtnEl && cardEl) {
    fsBtnEl.onclick = () => {
      const isFs = cardEl.classList.toggle('is-fullscreen');
      if (expandIcon)   expandIcon.style.display   = isFs ? 'none' : '';
      if (collapseIcon) collapseIcon.style.display = isFs ? ''     : 'none';
      setTimeout(() => map && map.invalidateSize(), 80);
    };
  }

  if (layersBtn && layersMenu) {
    layersBtn.onclick = (e) => { e.stopPropagation(); layersMenu.classList.toggle('hidden'); };
    layersMenu.querySelectorAll('[data-vessel-map-type]').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); setMapType(btn.dataset.vesselMapType); layersMenu.classList.add('hidden'); };
    });
    document.addEventListener('click', () => layersMenu.classList.add('hidden'));
  }

  // Sync check marks
  setMapType(currentMapType);
}

function wireTimeline() {
  const slider = document.getElementById('timeline-slider');
  const fill   = document.getElementById('timeline-fill');
  const thumb  = document.getElementById('timeline-thumb');
  const tsEl   = document.getElementById('timeline-timestamp');
  if (!slider || !fill || !thumb) return;

  const startMs = new Date('2025-10-07T09:00:00Z').getTime();
  const endMs   = new Date('2025-10-09T09:00:00Z').getTime();

  function interpolateRoute(t) {
    const route = window._vesselRoute;
    if (!route) return null;
    t = Math.max(0, Math.min(1, t));
    const total = route.length - 1;
    const pos   = t * total;
    const idx   = Math.floor(pos);
    const frac  = pos - idx;
    const a = route[Math.min(idx, route.length - 1)];
    const b = route[Math.min(idx + 1, route.length - 1)];
    return [a[0] + (b[0] - a[0]) * frac, a[1] + (b[1] - a[1]) * frac];
  }

  function formatTs(t) {
    const d = new Date(startMs + t * (endMs - startMs));
    return d.toUTCString().replace('GMT', 'GMT');
  }

  const updatePos = (pct) => {
    state.timelinePos = Math.max(0, Math.min(1, pct));
    fill.style.width  = (state.timelinePos * 100) + '%';
    thumb.style.left  = (state.timelinePos * 100) + '%';
    if (tsEl) tsEl.textContent = formatTs(state.timelinePos);
    // Move vessel marker
    if (window._vesselMarker) {
      const pos = interpolateRoute(state.timelinePos);
      if (pos) window._vesselMarker.setLatLng(pos);
    }
  };

  updatePos(state.timelinePos);

  const onDrag = (clientX) => {
    const rect = slider.getBoundingClientRect();
    updatePos((clientX - rect.left) / rect.width);
  };

  slider.addEventListener('mousedown', (e) => {
    onDrag(e.clientX);
    const onMove = (e) => onDrag(e.clientX);
    const onUp   = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Touch support
  slider.addEventListener('touchstart', (e) => {
    onDrag(e.touches[0].clientX);
    const onMove = (e) => onDrag(e.touches[0].clientX);
    const onEnd  = () => { slider.removeEventListener('touchmove', onMove); slider.removeEventListener('touchend', onEnd); };
    slider.addEventListener('touchmove', onMove);
    slider.addEventListener('touchend', onEnd);
  }, { passive: true });
}

/* ----------- CONTENT ----------- */
function Content() {
  return `
  <div class="px-4 lg:px-6 py-4 space-y-3">
    <section class="grid grid-cols-1 md:grid-cols-12 gap-3 vessel-top-section">
      <div class="md:col-span-4" style="height:440px;">${VesselDetailsCard()}</div>
      <div class="md:col-span-2" style="height:440px;">${PolicyDetailsCard()}</div>
      <div class="md:col-span-2" style="height:440px;">${PortCallsCard()}</div>
      <div class="md:col-span-4" style="height:440px;">${CasualtyRiskCard()}</div>
    </section>
    <section>
      ${InspectionTable()}
    </section>
    <section>
      ${EnvironmentalRatingCard()}
    </section>
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-3" style="min-height:500px;">
      ${HistoricalEventsCard()}
      ${VesselTrackingCard()}
    </section>
  </div>`;
}

/* ----------- RENDER + WIRING ----------- */
window.render = function render() {
  // Tear down Leaflet before replacing the DOM so it can be cleanly re-created
  if (map) { map.remove(); map = null; }
  document.getElementById('app').innerHTML = `
    ${SC.Sidebar()}
    <div class="flex-1 min-w-0 flex flex-col">
      ${SC.Topbar()}
      ${Content()}
    </div>
    ${SC.TweaksPanel()}
  `;
  SC.wireChrome();
  const wireTab = (attr, stateKey) => {
    document.querySelectorAll(`[${attr}]`).forEach(b => b.onclick = () => {
      const v = b.getAttribute(attr);
      if (state[stateKey] === v) return;
      state[stateKey] = v;
      const group = b.closest('.ds-tabs');
      if (group) {
        group.querySelectorAll('.ds-tab').forEach(t => t.setAttribute('aria-selected', String(t === b)));
        positionTabPills();
        setTimeout(() => render(), 220);
      } else { render(); }
    });
  };
  wireTab('data-top-tab',         'topTab');
  wireTab('data-top-right-tab',   'topRightTab');
  wireTab('data-section-tab',     'sectionTab');
  wireTab('data-bottom-left-tab', 'bottomLeftTab');
  const sectionTabSel = document.getElementById('section-tab-mobile-sel');
  if (sectionTabSel) sectionTabSel.onchange = () => { state.sectionTab = sectionTabSel.value; render(); };
  const bottomLeftTabSel = document.getElementById('bottom-left-tab-mobile-sel');
  if (bottomLeftTabSel) bottomLeftTabSel.onchange = () => { state.bottomLeftTab = bottomLeftTabSel.value; render(); };
  // Casualty expand/collapse
  document.querySelectorAll('[data-casualty]').forEach(btn => {
    btn.onclick = () => {
      const i = parseInt(btn.getAttribute('data-casualty'));
      if (state.casualtyExpanded.has(i)) state.casualtyExpanded.delete(i);
      else state.casualtyExpanded.add(i);
      render();
    };
  });
  requestAnimationFrame(positionTabPills);
  window.addEventListener('resize', positionTabPills, { passive: true });
  // Inject icons after chrome loads
  if (window.I) {
    document.querySelectorAll('[data-icon]').forEach(el => {
      const iconName = el.getAttribute('data-icon');
      if (window.I[iconName]) {
        el.innerHTML = window.I[iconName];
      }
    });
  }
  setTimeout(initMap, 50);
  setTimeout(wireTimeline, 100);
};
window.render();
</script>
