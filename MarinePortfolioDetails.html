/* ── Donut chart SVG ── */
function DonutSVG() {
  const cx=90, cy=90, R=65, r=44;
  const segs = [ { pct:10, c:'#16a34a' }, { pct:15, c:'#f97316' }, { pct:75, c:'#dc2626' } ];
  let ang = -Math.PI/2;
  const paths = segs.map(s => {
    const a = (s.pct/100)*2*Math.PI;
    const ea = ang+a;
    const [x1,y1] = [cx+R*Math.cos(ang), cy+R*Math.sin(ang)];
    const [x2,y2] = [cx+R*Math.cos(ea),  cy+R*Math.sin(ea)];
    const [ix1,iy1]=[cx+r*Math.cos(ang),  cy+r*Math.sin(ang)];
    const [ix2,iy2]=[cx+r*Math.cos(ea),   cy+r*Math.sin(ea)];
    const lg = a>Math.PI?1:0;
    const d=`M${x1.toFixed(2)} ${y1.toFixed(2)} A${R} ${R} 0 ${lg} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} L${ix2.toFixed(2)} ${iy2.toFixed(2)} A${r} ${r} 0 ${lg} 0 ${ix1.toFixed(2)} ${iy1.toFixed(2)}Z`;
    ang = ea;
    return `<path d="${d}" fill="${s.c}" stroke="#fff" stroke-width="1.5"/>`;
  });
  return `<svg viewBox="0 0 180 180" width="150" height="150">
    ${paths.join('')}
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="10" fill="#64748b" font-family="Open Sans,sans-serif">Avg. Risk:</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="26" font-weight="800" fill="#dc2626" font-family="Exo,Open Sans,sans-serif">100</text>
  </svg>`;
}

/* ── Tab pill positioning ── */
function positionTabPills() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.ds-tabs').forEach(group => {
      const pill   = group.querySelector('[data-tab-pill]');
      const active = group.querySelector('.ds-tab[aria-selected="true"]');
      if (!pill || !active) return;
      const gRect = group.getBoundingClientRect();
      const aRect = active.getBoundingClientRect();
      if (!aRect.width) return;
      pill.style.width     = aRect.width + 'px';
      pill.style.transform = `translateX(${aRect.left - gRect.left}px)`;
      requestAnimationFrame(() => pill.classList.remove('is-init'));
    });
  });
}

  document.getElementById('app').innerHTML = `

      ${SC.Topbar()}

          ${PanelPortfolioDetails()}
          ${PanelPortfolioActivity()}
          ${PanelRiskBreakdown()}
          ${PanelCompliance()}

        <!-- Analysis section -->
        <div class="bg-white rounded-xl border border-ink-200 shadow-card overflow-hidden mb-3">
          ${AnalysisTabBar()}
          <div class="p-3" id="analysis-content">
            ${analysisTab === 'PSC Analysis' ? PSCContent() : `<div class="py-8 text-center text-ink-400 text-sm">${analysisTab} — coming soon</div>`}
          </div>
        </div>
        <!-- Policy list -->
        ${PolicySection()}
      </main>
    </div>
    ${SC.TweaksPanel()}
  `;

  SC.wireChrome();
  requestAnimationFrame(positionTabPills);
  window.addEventListener('resize', positionTabPills, { passive:true });

  /* Analysis tabs */
  document.querySelectorAll('[data-atab]').forEach(btn => {
    btn.onclick = () => {
      analysisTab = btn.dataset.atab;
      const group = btn.closest('.ds-tabs');
      if (group) {
        group.querySelectorAll('.ds-tab').forEach(t => t.setAttribute('aria-selected', String(t === btn)));
        positionTabPills();
      }
      const ac = document.getElementById('analysis-content');
      if (ac) ac.innerHTML = analysisTab === 'PSC Analysis' ? PSCContent() : `<div class="py-8 text-center text-ink-400 text-sm">${analysisTab} — coming soon</div>`;
    };
  });

  /* Policy view switcher */
  document.querySelectorAll('[data-pvw]').forEach(btn => {
    btn.onclick = () => {
      policyView = btn.dataset.pvw;
      const group = btn.closest('.ds-tabs');
      if (group) {
        group.querySelectorAll('.ds-tab').forEach(t => t.setAttribute('aria-selected', String(t === btn)));
        positionTabPills();
        setTimeout(() => window.render(), 220);
      } else { window.render(); }
    };
  });

  /* Policy pagination */
  document.querySelectorAll('[data-ppage]').forEach(btn => {
    btn.onclick = () => { policyPage = parseInt(btn.dataset.ppage); window.render(); };
  });
  const pp = document.getElementById('pag-prev');
  const pn = document.getElementById('pag-next');
  const total = Math.ceil(POLICIES.length / POLICY_PAGE_SIZE);
  if (pp) pp.onclick = () => { if (policyPage > 1) { policyPage--; window.render(); } };
  if (pn) pn.onclick = () => { if (policyPage < total) { policyPage++; window.render(); } };
};

window.render();
</script>
