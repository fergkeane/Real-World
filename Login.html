<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  /* Ken Burns slow zoom on the active slide */
  @keyframes kb { from{transform:scale(1.04)} to{transform:scale(1.16)} }
  .kb-active{ animation: kb 8s ease-out forwards; transform-origin:center; }
  /* Fade/slide-in for rotating copy */
  @keyframes kbfade { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .kb-fadein{ animation: kbfade .9s ease-out both; }
</style>
